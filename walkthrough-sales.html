<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Module — Interactive Walkthrough</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif; background:#111; color:#fff; height:100vh; overflow:hidden; }

.walkthrough { height:100vh; display:flex; flex-direction:column; }

/* Top bar */
.wt-header { background:#1a1a1a; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; flex-shrink:0; }
.wt-header-left { display:flex; align-items:center; gap:10px; }
.wt-header-left img { width:32px; height:32px; object-fit:contain; }
.wt-title { font-size:14px; font-weight:700; }
.wt-progress { display:flex; align-items:center; gap:8px; font-size:12px; color:#888; }
.wt-progress-bar { width:200px; height:4px; background:#333; border-radius:2px; overflow:hidden; }
.wt-progress-fill { height:100%; background:#2E8B3E; transition:width 0.3s; }

/* Main content */
.wt-body { flex:1; display:flex; overflow:hidden; }

/* Left: mockup screen */
.wt-screen { flex:1; background:#1A1F1A; display:flex; align-items:center; justify-content:center; padding:20px; position:relative; }
.wt-mockup { background:#242C24; border:1px solid #2E3A2E; border-radius:12px; width:100%; max-width:700px; min-height:400px; padding:24px; position:relative; overflow:hidden; }
.wt-mockup-title { font-size:16px; font-weight:800; color:#E8F0E0; margin-bottom:16px; }

/* Right: description panel */
.wt-panel { width:360px; background:#1a1a1a; border-left:1px solid #333; padding:24px; overflow-y:auto; display:flex; flex-direction:column; }
.wt-step-badge { display:inline-block; background:#2E8B3E; color:#fff; padding:4px 12px; border-radius:12px; font-size:12px; font-weight:700; margin-bottom:12px; }
.wt-step-title { font-size:20px; font-weight:800; margin-bottom:8px; line-height:1.3; }
.wt-step-title-cn { font-size:16px; color:#888; margin-bottom:16px; }
.wt-step-desc { font-size:14px; color:#ccc; line-height:1.8; margin-bottom:16px; }
.wt-step-desc .ui { background:#333; border:1px solid #555; border-radius:4px; padding:1px 6px; font-size:12px; font-family:monospace; color:#6B9E5E; }
.wt-step-tip { background:rgba(232,160,32,0.1); border:1px solid rgba(232,160,32,0.3); border-radius:8px; padding:10px 14px; font-size:13px; color:#F5C04A; margin-bottom:16px; }

/* Navigation */
.wt-nav { margin-top:auto; display:flex; gap:8px; padding-top:16px; border-top:1px solid #333; }
.wt-btn { flex:1; padding:12px; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.wt-btn-prev { background:#333; color:#fff; }
.wt-btn-prev:hover { background:#444; }
.wt-btn-next { background:#2E8B3E; color:#fff; }
.wt-btn-next:hover { background:#257A34; }
.wt-btn:disabled { opacity:0.3; cursor:not-allowed; }

/* Mockup elements */
.mock-btn { display:inline-block; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:700; cursor:default; }
.mock-btn-primary { background:#4A7C3F; color:#fff; }
.mock-btn-outline { background:transparent; border:1px solid #2E3A2E; color:#D0DCC0; }
.mock-input { background:#1E261E; border:1px solid #2E3A2E; border-radius:8px; padding:8px 12px; color:#D0DCC0; font-size:13px; width:100%; }
.mock-card { background:#1A1F1A; border:1px solid #2E3A2E; border-radius:10px; padding:12px 16px; margin-bottom:8px; }
.mock-badge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; }
.mock-badge-blue { background:rgba(58,122,200,0.15); color:#6AA8E8; }
.mock-badge-gold { background:rgba(232,160,32,0.12); color:#F5C04A; }
.mock-badge-green { background:rgba(74,124,63,0.15); color:#6B9E5E; }
.mock-badge-purple { background:rgba(140,90,210,0.15); color:#B08AE8; }
.mock-status-banner { padding:6px 14px; border-radius:8px 8px 0 0; font-size:12px; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:0.5px; }

/* Highlight pulse */
@keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(46,139,62,0.4); } 50% { box-shadow:0 0 0 12px rgba(46,139,62,0); } }
.highlight { animation:pulse 1.5s infinite; border:2px solid #2E8B3E !important; position:relative; }
.highlight::after { content:'👆 点击这里'; position:absolute; bottom:-24px; left:50%; transform:translateX(-50%); font-size:11px; color:#2E8B3E; white-space:nowrap; font-weight:700; }

/* Arrow pointer */
@keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
.arrow-pointer { position:absolute; font-size:24px; animation:bounce 1s infinite; z-index:10; }

/* Slide transitions */
.slide { display:none; }
.slide.active { display:block; }

/* Mobile */
@media (max-width:768px) {
  .wt-body { flex-direction:column; }
  .wt-panel { width:100%; max-height:50vh; border-left:none; border-top:1px solid #333; }
  .wt-screen { min-height:250px; }
  .wt-mockup { min-height:200px; padding:16px; }
  .wt-progress-bar { width:100px; }
}
</style>
</head>

var currentStep = 0;
var autoTimer = null;

function wtRender() {
  var s = steps[currentStep];
  document.getElementById('wt-screen').innerHTML = s.screen();
  var desc = '<div class="wt-step-badge">步骤 ' + (currentStep + 1) + ' / ' + steps.length + '</div>';
  desc += '<div class="wt-step-title">' + s.title + '</div>';
  desc += '<div class="wt-step-title-cn">' + s.titleCn + '</div>';
  desc += '<div class="wt-step-desc">' + s.desc + '</div>';
  if (s.tip) desc += '<div class="wt-step-tip">💡 ' + s.tip + '</div>';
  document.getElementById('wt-desc').innerHTML = desc;
  document.getElementById('wt-step-num').textContent = (currentStep + 1) + ' / ' + steps.length;
  document.getElementById('wt-progress-fill').style.width = ((currentStep + 1) / steps.length * 100) + '%';
  document.getElementById('wt-prev').disabled = currentStep === 0;
  document.getElementById('wt-next').disabled = currentStep === steps.length - 1;
  document.getElementById('wt-next').textContent = currentStep === steps.length - 2 ? '完成 ✓' : '下一步 →';
}

function wtGo(dir) {
  currentStep = Math.max(0, Math.min(steps.length - 1, currentStep + dir));
  wtRender();
}

function wtAutoPlay() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('wt-auto-btn').textContent = '▶ Auto'; return; }
  document.getElementById('wt-auto-btn').textContent = '⏸ Stop';
  autoTimer = setInterval(function() {
    if (currentStep >= steps.length - 1) { clearInterval(autoTimer); autoTimer = null; document.getElementById('wt-auto-btn').textContent = '▶ Auto'; return; }
    wtGo(1);
  }, 5000);
}

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); wtGo(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); wtGo(-1); }
});

wtRender();
</script>
