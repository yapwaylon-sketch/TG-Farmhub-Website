<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/logo-agribusiness.png">
  <title>Oil Palm Growth — TG FarmHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css?v=2" />
  <link rel="stylesheet" href="oilpalmgrowth.css?v=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="shared.js?v=2"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;">
        <div class="sidebar-logo"><img src="assets/logo-agribusiness.png" alt="TG"></div>
        <div>
          <div class="sidebar-brand-text">Oil Palm Growth</div>
          <div style="font-size:10px;color:var(--text-muted);">&lt; TG FarmHub</div>
        </div>
      </a>
    </div>
    <div id="company-switcher"></div>
    <nav class="sidebar-nav" aria-label="Module navigation">
      <div class="nav-item active" data-page="batches" onclick="opgGotoBatchesTab()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18"/><path d="M3 12h18"/><path d="M3 17h18"/></svg>
        <span class="nav-label">Batches</span>
      </div>
      <div class="nav-item" data-page="suppliers" onclick="switchTab('suppliers')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-label">Suppliers</span>
      </div>
      <div class="nav-item" data-page="reports" onclick="switchTab('reports')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Reports</span>
      </div>
    </nav>
    <div id="sidebar-user" style="padding:8px 16px;border-top:1px solid var(--border);margin-top:auto;">
      <div id="sidebar-user-info" style="display:flex;align-items:center;gap:8px;padding:6px 0 8px;font-size:12px;color:var(--text-muted);">
        <span id="sidebar-user-name"></span>
      </div>
      <button onclick="location.href='index.html'" class="btn btn-outline" style="width:100%;justify-content:center;padding:6px 0;font-size:11px;gap:4px;margin-bottom:4px;">← Back to Hub</button>
      <button onclick="doLogout()" class="btn btn-outline" style="width:100%;justify-content:center;padding:6px 0;font-size:11px;gap:4px;color:var(--red);border-color:var(--red);">Logout</button>
    </div>
  </div>

  <main id="main-content" role="main" class="main-content">
    <div id="tab-batches" class="page active"></div>
    <div id="tab-suppliers" class="page"></div>
    <div id="tab-reports" class="page"></div>
  </main>
  </div><!-- /#app -->

  <div id="modal-host"></div>

  <script>
    // Supabase client (sb) is provided by shared.js as a global.
    // Do NOT re-declare SUPABASE_URL/SUPABASE_KEY here — that throws a SyntaxError
    // and halts the entire inline script (functions never get defined).

    // === State ===
    let currentUser = null;
    let currentTab = 'batches';
    let suppliers = [];
    let batches = [];
    let varieties = [];
    let collectionsByBatch = {};  // {batch_id: total_collected_qty}
    let midCullsByBatch = {};     // {batch_id: total_mid_mn_cull_qty}
    let batchesFilter = { stage: 'all', supplier: 'all', variety: 'all' };
    let selectedBatchId = null;   // when set, renderBatchesTab delegates to opgRenderDetail
    // Per-section unlock state. Resets every time opgRenderDetail runs (= every time
    // the user opens a batch detail page). Admin-only "Unlock for edit" buttons flip
    // the relevant flag and re-render that one section.
    let opgUnlocked = { procurement: false, payment: false };

    // Document slots for batch detail Documents section. `slot` is used as the storage path stem
    // (procurement/{batch_id}/{slot}.{ext}), and `key` is the DB column on oilpalm_batches.
    const OPG_DOC_SLOTS = [
      { key: 'proforma_url',         slot: 'proforma',         label: 'Proforma Invoice' },
      { key: 'k3_chit_url',          slot: 'k3_chit',          label: 'K3 Chit' },
      { key: 'airwaybill_url',       slot: 'airwaybill',       label: 'Airwaybill' },
      { key: 'official_invoice_url', slot: 'official_invoice', label: 'Official Invoice' },
      { key: 'phyto_cert_url',       slot: 'phyto_cert',       label: 'Phytosanitary Certificate' },
      { key: 'l3_1_url',             slot: 'l3_1',             label: 'L3.1 Form (from supplier)' }
    ];

    // === Init ===
    document.addEventListener('DOMContentLoaded', async () => {
      // Session guard — match the codebase pattern (shared.js does NOT export ensureSession/currentUser)
      const userData = localStorage.getItem('tgfarmhub_user');
      if (!userData) { location.href = 'index.html'; return; }
      try { currentUser = JSON.parse(userData); } catch (e) { location.href = 'index.html'; return; }

      // Force company to Agribusiness for this module
      setCompanyId('tg_agribusiness');

      // Inject company switcher (redirect to hub if Agro Fruits selected)
      if (typeof injectCompanySwitcher === 'function') {
        injectCompanySwitcher();
        document.querySelectorAll('.company-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var cid = btn.getAttribute('data-company');
            if (cid !== 'tg_agribusiness') {
              setCompanyId(cid);
              location.href = 'index.html';
            }
          });
        });
      }

      // Inject user badge / start inactivity timer (graceful no-op if helpers absent)
      if (typeof injectUserBadge === 'function') injectUserBadge(currentUser);
      if (typeof startInactivityTimer === 'function') startInactivityTimer();

      const nameEl = document.getElementById('sidebar-user-name');
      if (nameEl) nameEl.textContent = currentUser.displayName || currentUser.username || currentUser.name || '';

      await Promise.all([
        loadSuppliers(),
        loadBatches(),
        loadVarieties(),
        loadCollectionAggregates(),
        loadMidCullAggregates()
      ]);
      // Task 1.8: scan selling-stage batches and flip to sold_out where available <= 0.
      // Must run AFTER Promise.all (needs `batches` populated). Refresh `batches` after
      // in case any flipped, so renderBatchesTab paints the correct stage badges.
      await autoFlipSoldOut();
      await loadBatches();
      renderBatchesTab();
    });

    function doLogout() {
      try { localStorage.removeItem('tgfarmhub_user'); } catch (e) {}
      try { localStorage.removeItem('tg_session'); } catch (e) {}
      location.href = 'index.html';
    }

    function switchTab(name) {
      currentTab = name;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === name));
      document.querySelectorAll('.main-content > .page').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
      if (name === 'batches')   renderBatchesTab();
      if (name === 'suppliers') renderSuppliersTab();
      if (name === 'reports')   renderReportsTab();
    }

    // === Loaders (stub) ===
    async function loadSuppliers() {
      const data = await sbQuery(sb.from('oilpalm_suppliers').select('*').eq('company_id', getCompanyId()).order('name'));
      suppliers = data || [];
    }
    async function loadBatches() {
      const data = await sbQuery(sb.from('oilpalm_batches').select('*').eq('company_id', getCompanyId()).order('created_at', { ascending: false }));
      batches = data || [];
    }
    async function loadVarieties() {
      // crop_varieties is shared. Filter by oil palm crop.
      const crops = await sbQuery(sb.from('crops').select('id,name'));
      const oilPalm = (crops || []).find(c => /oil\s*palm/i.test(c.name));
      if (!oilPalm) { varieties = []; return; }
      const data = await sbQuery(sb.from('crop_varieties').select('id,name,crop_id').eq('crop_id', oilPalm.id).order('name'));
      varieties = data || [];
    }
    async function loadCollectionAggregates() {
      // oilpalm_collections HAS company_id — filter scoped per company
      const data = await sbQuery(sb.from('oilpalm_collections').select('batch_id,qty').eq('company_id', getCompanyId()));
      collectionsByBatch = {};
      (data || []).forEach(c => { collectionsByBatch[c.batch_id] = (collectionsByBatch[c.batch_id] || 0) + c.qty; });
    }
    async function loadMidCullAggregates() {
      // oilpalm_batch_events has NO company_id column (per CLAUDE.md "Tables WITHOUT company_id" pattern) — DO NOT add the filter
      const data = await sbQuery(sb.from('oilpalm_batch_events').select('batch_id,event_type,qty').eq('event_type', 'cull'));
      midCullsByBatch = {};
      (data || []).forEach(e => { midCullsByBatch[e.batch_id] = (midCullsByBatch[e.batch_id] || 0) + e.qty; });
    }

    // === Batches tab ===
    function renderBatchesTab() {
      // When a batch is selected, the tab content becomes the detail page.
      if (selectedBatchId) { opgRenderDetail(); return; }

      const supplierMap = Object.fromEntries(suppliers.map(s => [s.id, s.name]));
      const varietyMap  = Object.fromEntries(varieties.map(v => [v.id, v.name]));

      const filtered = batches.filter(b => {
        if (batchesFilter.stage !== 'all' && b.status !== batchesFilter.stage) return false;
        if (batchesFilter.supplier !== 'all' && b.supplier_id !== batchesFilter.supplier) return false;
        if (batchesFilter.variety !== 'all' && b.variety_id !== batchesFilter.variety) return false;
        return true;
      });

      const rows = filtered.map(b => {
        const planted = b.qty_planted || 0;
        const mn      = b.qty_mn_start || 0;
        const collected = collectionsByBatch[b.id] || 0;
        const midCulls  = midCullsByBatch[b.id] || 0;
        const available = mn > 0 ? Math.max(0, mn - midCulls - collected) : 0;
        const age = b.date_planted ? Math.floor((Date.now() - new Date(b.date_planted).getTime()) / 86400000) : null;
        const ready = b.date_planted ? addMonths(b.date_planted, 10) : null;

        return `
          <tr onclick="opgOpenBatchDetail('${b.id}')" style="cursor:pointer">
            <td>${esc(b.batch_number)}</td>
            <td>${esc(supplierMap[b.supplier_id] || '—')}</td>
            <td>${esc(varietyMap[b.variety_id] || '—')}</td>
            <td><span class="opg-stage-badge opg-stage-${b.status}">${stageLabel(b.status)}</span></td>
            <td>${fmtNum(b.ordered_qty || 0)}</td>
            <td>${planted ? fmtNum(planted) : '—'}</td>
            <td>${mn ? fmtNum(mn) : '—'}</td>
            <td>${available ? fmtNum(available) : '—'}</td>
            <td>${age != null ? age + 'd' : '—'}</td>
            <td>${ready ? fmtDate(ready) : '—'}</td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="10" style="text-align:center; padding:20px; color:var(--muted)">No batches yet.</td></tr>';

      document.getElementById('tab-batches').innerHTML = `
        <div class="page-header">
          <h2>Batches</h2>
          <button class="btn btn-primary" onclick="opgOpenNewBatchModal()">+ New Batch</button>
        </div>
        <div class="filters-bar">
          <select onchange="batchesFilter.stage=this.value; renderBatchesTab()">
            <option value="all">All stages</option>
            <option value="ordered">Ordered</option>
            <option value="received">Received</option>
            <option value="pre_nursery">Pre-Nursery</option>
            <option value="main_nursery">Main Nursery</option>
            <option value="selling">Selling</option>
            <option value="sold_out">Sold Out</option>
            <option value="closed">Closed</option>
          </select>
          <select onchange="batchesFilter.supplier=this.value; renderBatchesTab()">
            <option value="all">All suppliers</option>
            ${suppliers.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}
          </select>
          <select onchange="batchesFilter.variety=this.value; renderBatchesTab()">
            <option value="all">All varieties</option>
            ${varieties.map(v => `<option value="${v.id}">${esc(v.name)}</option>`).join('')}
          </select>
        </div>
        <table class="data-table">
          <thead><tr>
            <th>Batch #</th><th>Supplier</th><th>Variety</th><th>Stage</th>
            <th>Ordered</th><th>Planted</th><th>MN qty</th><th>Available</th><th>Age</th><th>Ready Date</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      // Restore filter values (innerHTML rewrite resets <select> defaults)
      const sels = document.querySelectorAll('#tab-batches .filters-bar select');
      if (sels[0]) sels[0].value = batchesFilter.stage;
      if (sels[1]) sels[1].value = batchesFilter.supplier;
      if (sels[2]) sels[2].value = batchesFilter.variety;
    }

    function stageLabel(s) {
      return ({
        ordered: 'Ordered', received: 'Received', pre_nursery: 'Pre-Nursery', main_nursery: 'Main Nursery',
        selling: 'Selling', sold_out: 'Sold Out', closed: 'Closed'
      })[s] || s;
    }

    function addMonths(d, m) {
      const x = new Date(d);
      x.setMonth(x.getMonth() + m);
      return x.toISOString().slice(0, 10);
    }

    // === Batch detail page (Task 1.5) ===
    // Detail page replaces the entire Batches tab content while open (NOT a modal).
    // selectedBatchId state var drives the renderBatchesTab delegation at the top of that function.
    function opgOpenBatchDetail(id) {
      selectedBatchId = id;
      renderBatchesTab();
    }
    function opgCloseDetail() {
      selectedBatchId = null;
      renderBatchesTab();
    }

    function opgRenderDetail() {
      const b = batches.find(x => x.id === selectedBatchId);
      if (!b) { selectedBatchId = null; renderBatchesTab(); return; }

      // Reset per-section unlock state every time the detail page renders.
      // Admin unlock is intentionally session-local and per-batch-open.
      opgUnlocked = { procurement: false, payment: false };

      const supplier = suppliers.find(s => s.id === b.supplier_id);
      const variety  = varieties.find(v => v.id === b.variety_id);
      const ready = b.date_planted ? addMonths(b.date_planted, 10) : null;
      const age   = b.date_planted ? Math.floor((Date.now() - new Date(b.date_planted).getTime()) / 86400000) : null;

      document.getElementById('tab-batches').innerHTML = `
        <button class="btn btn-outline" onclick="opgCloseDetail()">← Back to Batches</button>

        <div class="opg-section opg-header">
          <div class="opg-header-row">
            <h2>${esc(b.batch_number)}</h2>
            <span class="opg-stage-badge opg-stage-${b.status}">${stageLabel(b.status)}</span>
            ${age != null ? `<span class="muted">Age: ${age} days</span>` : ''}
            ${ready ? `<span class="muted">Ready for Sale: ${fmtDate(ready)}</span>` : ''}
          </div>
          <div class="opg-header-row">
            <span><strong>Supplier:</strong> ${esc(supplier ? supplier.name : '—')}</span>
            <span><strong>Variety:</strong> ${esc(variety ? variety.name : '—')}</span>
          </div>
          <div class="opg-actions">
            ${b.status === 'main_nursery' ? `<button class="btn btn-primary" onclick="opgMarkSelling()">Mark as Selling</button>` : ''}
            ${b.status !== 'closed' && b.status !== 'ordered' ? `<button class="btn danger" onclick="opgCloseBatch()">Close Batch</button>` : ''}
          </div>
        </div>

        <div id="opg-procurement-section"></div>
        <div id="opg-payment-section"></div>
        <div id="opg-docs-section"></div>
        <div id="opg-receipt-section"></div>
        <div id="opg-mn-section"></div>
      `;

      opgRenderProcurementSection(b);
      opgRenderPaymentSection(b);
      opgRenderDocsSection(b);
      opgRenderReceiptSection(b);
      opgRenderMnSection(b);
    }

    function opgIsAdmin() {
      return currentUser && currentUser.role === 'admin';
    }

    function opgUnlockSection(name) {
      opgUnlocked[name] = true;
      const b = batches.find(x => x.id === selectedBatchId);
      if (!b) return;
      if (name === 'procurement') opgRenderProcurementSection(b);
      else if (name === 'payment') opgRenderPaymentSection(b);
    }

    function opgRenderProcurementSection(b) {
      const locked = b.status !== 'ordered' && !opgUnlocked.procurement;
      const ro = locked ? 'readonly' : '';
      const unlockBtn = locked && opgIsAdmin()
        ? `<button class="btn btn-tiny" onclick="opgUnlockSection('procurement')">🔓 Unlock for edit</button>`
        : '';
      const lockBanner = locked
        ? `<div class="opg-locked-banner">
             <span class="opg-locked-icon">🔒</span>
             <span class="opg-locked-text">Batch is past the <strong>Ordered</strong> stage — procurement data is final.</span>
             ${unlockBtn}
           </div>`
        : '';
      const headerBadge = locked ? '<span class="opg-locked-badge">🔒 Locked</span>' : '';

      // When LOCKED, qty/money fields render as type=text with formatted values so the
      // user sees "5,000" and "RM 15,035.00" instead of raw "5000" / "15035".
      // When UNLOCKED (admin editing), they switch back to type=number with raw values
      // so the live recompute + save flow works (browsers reject commas in type=number).
      const qtyField = (id, val) => locked
        ? `<input id="${id}" type="text" value="${fmtNum(val || 0)}" readonly />`
        : `<input id="${id}" type="number" min="0" value="${val || 0}" />`;
      const moneyField = (id, val, ro2) => locked
        ? `<input id="${id}" type="text" value="${formatRM(val || 0)}" readonly />`
        : `<input id="${id}" type="number" step="0.01" min="0" value="${val || 0}" ${ro2 ? 'readonly' : ''} />`;

      document.getElementById('opg-procurement-section').innerHTML = `
        <div class="opg-section collapsible collapsed" id="opg-section-procurement">
          <button class="opg-section-header" type="button" onclick="opgToggleSection('procurement')">
            <h3>Procurement ${headerBadge}</h3>
            <span class="opg-chevron">▸</span>
          </button>
          <div class="opg-section-body">
            ${lockBanner}
            <div class="form-grid">
              <label>Order Date <input id="opg-d-od" type="date" value="${b.order_date || ''}" ${ro} /></label>
              <label>Estimated Delivery <input id="opg-d-edd" type="date" value="${b.estimated_delivery_date || ''}" ${ro} /></label>
              <label>Actual Delivery <input id="opg-d-add" type="date" value="${b.actual_delivery_date || ''}" ${ro} /></label>
              <label>Ordered Qty ${qtyField('opg-d-qty', b.ordered_qty)}</label>
              <label>Unit Cost (RM) ${moneyField('opg-d-uc', b.unit_cost)}</label>
              <label>Gross (Ordered × Unit, RM) ${moneyField('opg-d-tc', b.total_cost, /*ro2*/true)}</label>
              <label>Cash Discount (RM) ${moneyField('opg-d-disc', b.cash_discount)}</label>
              <label>Seeds Allowance (free extras) ${qtyField('opg-d-allow', b.seeds_allowance)}</label>
              <label class="full">Notes <textarea id="opg-d-notes" ${ro}>${esc(b.notes || '')}</textarea></label>
            </div>

            <div id="opg-invoice-summary" style="margin:10px 0;padding:10px 12px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.4);border-radius:4px;font-size:13px;">
              <!-- Filled by opgRecomputeInvoice() -->
            </div>

            ${locked ? '' : '<div class="modal-actions"><button class="btn btn-primary" onclick="opgSaveProcurement()">Save Procurement</button></div>'}
          </div>
        </div>
      `;

      if (locked) {
        // Inputs hold formatted strings — feed authoritative values from the batch row.
        opgRecomputeInvoice({
          q:     Number(b.ordered_qty)     || 0,
          u:     Number(b.unit_cost)       || 0,
          disc:  Number(b.cash_discount)   || 0,
          allow: Number(b.seeds_allowance) || 0
        });
      } else {
        ['opg-d-qty','opg-d-uc','opg-d-disc','opg-d-allow'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.addEventListener('input', () => opgRecomputeInvoice());
        });
        opgRecomputeInvoice();
      }
    }

    function opgRecomputeInvoice(values) {
      // values arg: { q, u, disc, allow } — used when inputs hold formatted strings (locked mode).
      // Without it, read live from the unlocked numeric inputs.
      let q, u, disc, allow;
      if (values) {
        q = values.q; u = values.u; disc = values.disc; allow = values.allow;
      } else {
        q     = parseFloat(document.getElementById('opg-d-qty').value)   || 0;
        u     = parseFloat(document.getElementById('opg-d-uc').value)    || 0;
        disc  = parseFloat(document.getElementById('opg-d-disc').value)  || 0;
        allow = parseInt(document.getElementById('opg-d-allow').value, 10) || 0;
      }

      const gross   = q * u;
      const invoice = Math.max(0, gross - disc);
      const seeds   = q + allow;
      const cps     = seeds > 0 ? (invoice / seeds) : 0;

      // Locked mode: Gross input is type=text → write formatted "RM 15,035.00".
      // Unlocked mode: type=number → write raw "15035.00" so step/min/max still validate.
      const grossEl = document.getElementById('opg-d-tc');
      if (grossEl) grossEl.value = values ? formatRM(gross) : gross.toFixed(2);
      document.getElementById('opg-invoice-summary').innerHTML = `
        <div style="font-weight:700;color:var(--gold);margin-bottom:6px;">Invoice Summary</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 16px;align-items:baseline;">
          <span class="muted">Gross invoice</span><span><strong>${formatRM(gross)}</strong> &nbsp;<span class="muted">(${fmtNum(q)} × ${formatRM(u)})</span></span>
          <span class="muted">− Cash discount</span><span>${formatRM(disc)}</span>
          <span class="muted">Invoice total</span><span><strong style="color:var(--gold)">${formatRM(invoice)}</strong> &nbsp;<span class="muted">(final supplier bill)</span></span>
          <span class="muted">Seeds received</span><span><strong>${fmtNum(seeds)}</strong> &nbsp;<span class="muted">(${fmtNum(q)} ordered + ${fmtNum(allow)} allowance)</span></span>
          <span class="muted">Cost per seed</span><span><strong>${formatRM(cps)}</strong></span>
        </div>
      `;
    }

    async function opgSaveProcurement() {
      const id = selectedBatchId;
      const data = {
        order_date: document.getElementById('opg-d-od').value || null,
        estimated_delivery_date: document.getElementById('opg-d-edd').value || null,
        actual_delivery_date: document.getElementById('opg-d-add').value || null,
        ordered_qty: parseInt(document.getElementById('opg-d-qty').value, 10) || 0,
        unit_cost: parseFloat(document.getElementById('opg-d-uc').value) || 0,
        total_cost: parseFloat(document.getElementById('opg-d-tc').value) || 0,
        cash_discount: parseFloat(document.getElementById('opg-d-disc').value) || 0,
        seeds_allowance: parseInt(document.getElementById('opg-d-allow').value, 10) || 0,
        notes: document.getElementById('opg-d-notes').value.trim() || null
      };

      // Stage flip is one-way IDEMPOTENT: ordered → received when actual_delivery_date is first set.
      // Never auto-downgrade — once a batch advances past 'ordered' (received → pre_nursery → ...),
      // clearing actual_delivery_date by accident must not flip it back. Supervisor downgrades are
      // a separate action handled elsewhere if ever needed.
      const before = batches.find(x => x.id === id);
      if (before && before.status === 'ordered' && data.actual_delivery_date) {
        data.status = 'received';
      }

      const result = await sbMutate(() => sb.from('oilpalm_batches').update(data).eq('id', id).select());
      if (result === null) return;
      await loadBatches();
      renderBatchesTab();
      notify('Procurement saved', 'success');
    }

    // === Payment section (Task 1.6) ===
    // Single payment per batch, all fields stored on oilpalm_batches as payment_*.
    function opgRenderPaymentSection(b) {
      const slipUrl = b.payment_slip_url || '';
      const slipExt = slipUrl ? slipUrl.split('.').pop().toLowerCase().split('?')[0] : '';
      const slipLabel = slipExt === 'pdf' ? 'PDF' : 'Image';
      const slipLink = slipUrl
        ? `<a href="${slipUrl}" target="_blank">${slipLabel} ↗</a>`
        : '<span class="muted">No slip uploaded</span>';

      const locked = !!b.payment_date && !opgUnlocked.payment;
      const ro = locked ? 'readonly' : '';
      const dis = locked ? 'disabled' : '';
      const unlockBtn = locked && opgIsAdmin()
        ? `<button class="btn btn-tiny" onclick="opgUnlockSection('payment')">🔓 Unlock for edit</button>`
        : '';
      const lockBanner = locked
        ? `<div class="opg-locked-banner">
             <span class="opg-locked-icon">🔒</span>
             <span class="opg-locked-text">Payment has been recorded — data is final.</span>
             ${unlockBtn}
           </div>`
        : '';
      const headerBadge = locked ? '<span class="opg-locked-badge">🔒 Locked</span>' : '';

      const amountField = locked
        ? `<input id="opg-pay-amount" type="text" value="${formatRM(b.payment_amount || 0)}" readonly />`
        : `<input id="opg-pay-amount" type="number" step="0.01" min="0" value="${b.payment_amount != null ? b.payment_amount : ''}" />`;

      document.getElementById('opg-payment-section').innerHTML = `
        <div class="opg-section collapsible collapsed" id="opg-section-payment">
          <button class="opg-section-header" type="button" onclick="opgToggleSection('payment')">
            <h3>Payment ${headerBadge}</h3>
            <span class="opg-chevron">▸</span>
          </button>
          <div class="opg-section-body">
            ${lockBanner}
            <div class="form-grid">
              <label>Date <input id="opg-pay-date" type="date" value="${b.payment_date || ''}" ${ro} /></label>
              <label>Amount (RM) ${amountField}</label>
              <label>Method
                <select id="opg-pay-method" ${dis}>
                  <option value="">—</option>
                  <option value="cash"   ${b.payment_method === 'cash'   ? 'selected' : ''}>Cash</option>
                  <option value="bank"   ${b.payment_method === 'bank'   ? 'selected' : ''}>Bank Transfer</option>
                  <option value="cheque" ${b.payment_method === 'cheque' ? 'selected' : ''}>Cheque</option>
                </select>
              </label>
              <label>Reference <input id="opg-pay-ref" value="${esc(b.payment_reference || '')}" ${ro} /></label>
              <label class="full">Slip (image or PDF)
                <input type="file" id="opg-pay-slip" accept="image/*,application/pdf" ${dis} />
                <div class="muted" style="font-size:12px;margin-top:4px">Current: ${slipLink}</div>
              </label>
              <label class="full">Notes <textarea id="opg-pay-notes" ${ro}>${esc(b.payment_notes || '')}</textarea></label>
            </div>
            ${locked ? '' : '<div class="modal-actions"><button class="btn btn-primary" onclick="opgSavePayment()">Save Payment</button></div>'}
          </div>
        </div>
      `;
    }

    async function opgSavePayment() {
      const id = selectedBatchId;
      const before = batches.find(x => x.id === id);
      if (!before) return;
      const slipFileEl = document.getElementById('opg-pay-slip');
      const slipFile = slipFileEl && slipFileEl.files && slipFileEl.files[0] ? slipFileEl.files[0] : null;
      let slipUrl = before.payment_slip_url || null;

      if (slipFile) {
        const ext  = slipFile.name.split('.').pop();
        const path = `procurement/${id}/payment-slip.${ext}`;
        const upload = await sb.storage.from('oilpalm-photos').upload(path, slipFile, { upsert: true, contentType: slipFile.type });
        if (upload.error) { notify('Slip upload failed: ' + upload.error.message, 'error'); return; }
        slipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      }

      const amtRaw = document.getElementById('opg-pay-amount').value;
      const data = {
        payment_date:      document.getElementById('opg-pay-date').value || null,
        payment_amount:    amtRaw === '' ? null : (parseFloat(amtRaw) || 0),
        payment_method:    document.getElementById('opg-pay-method').value || null,
        payment_reference: document.getElementById('opg-pay-ref').value.trim() || null,
        payment_slip_url:  slipUrl,
        payment_notes:     document.getElementById('opg-pay-notes').value.trim() || null
      };

      const result = await sbMutate(() => sb.from('oilpalm_batches').update(data).eq('id', id).select());
      if (result === null) return;
      await loadBatches();
      renderBatchesTab();
      notify('Payment saved', 'success');
    }

    // === Documents section (Task 1.6) ===
    // 5 fixed slots driven by OPG_DOC_SLOTS. Each slot holds 1 file (replaceable).
    function opgRenderDocsSection(b) {
      const slotsHtml = OPG_DOC_SLOTS.map(s => {
        const url = b[s.key];
        const ext = url ? url.split('.').pop().toLowerCase().split('?')[0] : '';
        const label = ext === 'pdf' ? 'PDF' : 'Image';
        const fileCell = url
          ? `<a href="${url}" target="_blank">${label} ↗</a>`
          : '<span class="muted">No file</span>';
        return `
          <div class="opg-doc-slot">
            <div class="opg-doc-label">${esc(s.label)}</div>
            <div class="opg-doc-file">${fileCell}</div>
            <div>
              <input type="file" id="opg-doc-${s.key}" accept="image/*,application/pdf" style="display:none" onchange="opgUploadDoc('${s.key}', this.files[0])" />
              <button class="btn btn-tiny" onclick="document.getElementById('opg-doc-${s.key}').click()">${url ? 'Replace' : 'Upload'}</button>
              ${url ? `<button class="btn btn-tiny danger" onclick="opgClearDoc('${s.key}')">Remove</button>` : ''}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('opg-docs-section').innerHTML = `
        <div class="opg-section collapsible collapsed" id="opg-section-documents">
          <button class="opg-section-header" type="button" onclick="opgToggleSection('documents')">
            <h3>Documents</h3>
            <span class="opg-chevron">▸</span>
          </button>
          <div class="opg-section-body">
          ${slotsHtml}
          </div>
        </div>
      `;
    }

    function opgToggleSection(name) {
      const el = document.getElementById('opg-section-' + name);
      if (el) el.classList.toggle('collapsed');
    }

    // Clicking the Batches sidebar nav-item always returns to the list, even
    // if a batch detail view is currently open.
    function opgGotoBatchesTab() {
      selectedBatchId = null;
      renderBatchesTab();
      switchTab('batches');
    }

    async function opgUploadDoc(field, file) {
      if (!file) return;
      const id = selectedBatchId;
      const slotDef = OPG_DOC_SLOTS.find(s => s.key === field);
      if (!slotDef) { notify('Unknown document slot', 'error'); return; }
      const ext  = file.name.split('.').pop();
      const path = `procurement/${id}/${slotDef.slot}.${ext}`;
      const btn = event && event.target;
      btnLoading(btn, true);
      const upload = await sb.storage.from('oilpalm-photos').upload(path, file, { upsert: true, contentType: file.type });
      if (upload.error) { notify('Upload failed: ' + upload.error.message, 'error'); btnLoading(btn, false); return; }
      const url = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      const result = await sbMutate(() => sb.from('oilpalm_batches').update({ [field]: url }).eq('id', id).select());
      if (result === null) { btnLoading(btn, false); return; }
      await loadBatches();
      renderBatchesTab();
      notify('Document uploaded', 'success');
    }

    async function opgClearDoc(field) {
      const id = selectedBatchId;
      const result = await sbMutate(() => sb.from('oilpalm_batches').update({ [field]: null }).eq('id', id).select());
      if (result === null) return;
      await loadBatches();
      renderBatchesTab();
      notify('Document removed', 'success');
    }

    // === Receipt + Plant + Transplant (Task 1.7) ===
    function opgRenderReceiptSection(b) {
      const planted = b.qty_planted || 0;
      document.getElementById('opg-receipt-section').innerHTML = `
        <div class="opg-section">
          <h3>Receipt + Planting</h3>
          ${b.status === 'received' && !b.date_planted
            ? `<p class="muted">Stage: Received. Record planting to advance to Pre-Nursery.</p>
               <button class="btn btn-primary" onclick="opgOpenPlantModal()">Record Planting</button>`
            : b.date_planted
            ? `<div class="form-grid">
                 <label>Seeds Received <input value="${fmtNum(b.seeds_received || 0)}" readonly /></label>
                 <label>Seeds Damaged <input value="${fmtNum(b.seeds_damaged || 0)}" readonly /></label>

      `;
    }

    function opgOpenPlantModal() {
      const b = batches.find(x => x.id === selectedBatchId) || {};
      const expectedReceived = (Number(b.ordered_qty) || 0) + (Number(b.seeds_allowance) || 0);
      showModal(`
        <h3>Record Planting</h3>
        <p class="muted">Stage: Received → Pre-Nursery.</p>
        <div class="form-grid">
          <label>Seeds Received <input id="opg-plant-rcvd" type="number" min="1" value="${expectedReceived || ''}" /></label>
          <label>Seeds Damaged <input id="opg-plant-dmg" type="number" min="0" value="0" /></label>
          <label>Total Planted <input id="opg-plant-total" readonly /></label>
          <label>Date Planted <input id="opg-plant-date" type="date" value="${new Date().toISOString().slice(0,10)}" /></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('opg-plant-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opgSavePlantEvent()">Save</button>
        </div>
      `, 'opg-plant-overlay');
      const recompute = () => {
        const r = parseInt(document.getElementById('opg-plant-rcvd').value, 10) || 0;
        const d = parseInt(document.getElementById('opg-plant-dmg').value, 10) || 0;
        document.getElementById('opg-plant-total').value = fmtNum(Math.max(0, r - d));
      };
      document.getElementById('opg-plant-rcvd').addEventListener('input', recompute);
      document.getElementById('opg-plant-dmg').addEventListener('input', recompute);
      recompute();  // initial Total Planted from pre-filled Seeds Received
    }

    async function opgSavePlantEvent() {
      const id = selectedBatchId;
      const rcvd = parseInt(document.getElementById('opg-plant-rcvd').value, 10);
      const dmg  = parseInt(document.getElementById('opg-plant-dmg').value, 10) || 0;
      const date = document.getElementById('opg-plant-date').value;
      if (!rcvd || rcvd < 1) { notify('Seeds Received required', 'error'); return; }
      if (dmg < 0 || dmg >= rcvd) { notify('Damaged must be between 0 and Received', 'error'); return; }
      if (!date) { notify('Date required', 'error'); return; }

      const planted = rcvd - dmg;

      const eventId = await dbNextId('OE');
      if (!eventId) { notify('Failed to generate event ID', 'error'); return; }
      const evResult = await sbMutate(() => sb.from('oilpalm_batch_events').insert({
        id: eventId,
        batch_id: id,
        event_type: 'plant',
        qty: planted,
        event_date: date,
        logged_by: currentUser.username,
        notes: `Received ${rcvd}, damaged ${dmg}, planted ${planted}`
      }).select());
      if (evResult === null) return;

      const result = await sbMutate(() => sb.from('oilpalm_batches').update({
        status: 'pre_nursery',
        date_planted: date,
        seeds_received: rcvd,
        seeds_damaged: dmg,
        qty_planted: planted
      }).eq('id', id).select());
      if (result === null) return;

      await loadBatches();
      closeModal('opg-plant-overlay');
      renderBatchesTab();
      notify('Planting recorded — batch is now in Pre-Nursery', 'success');
    }

    function opgOpenTransplantModal() {
      const b = batches.find(x => x.id === selectedBatchId);
      showModal(`
        <h3>Record Transplant (Pre-Nursery → Main Nursery)</h3>
        <p class="muted">Planted: ${fmtNum(b.qty_planted)}</p>
        <div class="form-grid">
          <label>Culls (dead/abnormal) <input id="opg-tp-culls" type="number" min="0" value="0" /></label>
          <label>Multi-germination Extras <input id="opg-tp-extras" type="number" min="0" value="0" /></label>
          <label>MN Qty (calculated) <input id="opg-tp-mn" readonly /></label>
          <label>Date Transplanted <input id="opg-tp-date" type="date" value="${new Date().toISOString().slice(0,10)}" /></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('opg-transplant-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opgSaveTransplantEvent()">Save</button>
        </div>
      `, 'opg-transplant-overlay');
      const recompute = () => {
        const c = parseInt(document.getElementById('opg-tp-culls').value, 10) || 0;
        const e = parseInt(document.getElementById('opg-tp-extras').value, 10) || 0;
        document.getElementById('opg-tp-mn').value = fmtNum(Math.max(0, (b.qty_planted || 0) - c + e));
      };
      document.getElementById('opg-tp-culls').addEventListener('input', recompute);
      document.getElementById('opg-tp-extras').addEventListener('input', recompute);
      recompute();
    }

    async function opgSaveTransplantEvent() {
      const id = selectedBatchId;
      const b  = batches.find(x => x.id === id);
      const culls   = parseInt(document.getElementById('opg-tp-culls').value, 10) || 0;
      const extras  = parseInt(document.getElementById('opg-tp-extras').value, 10) || 0;
      const date    = document.getElementById('opg-tp-date').value;
      const mn = Math.max(0, (b.qty_planted || 0) - culls + extras);
      if (!date) { notify('Date required', 'error'); return; }

      const eventId = await dbNextId('OE');
      if (!eventId) { notify('Failed to generate event ID', 'error'); return; }
      const evResult = await sbMutate(() => sb.from('oilpalm_batch_events').insert({
        id: eventId,
        batch_id: id,
        event_type: 'transplant',
        qty: mn,
        event_date: date,
        logged_by: currentUser.username,
        notes: `Culls ${culls}, extras ${extras}, MN qty ${mn}`
      }).select());
      if (evResult === null) return;

      const result = await sbMutate(() => sb.from('oilpalm_batches').update({
        status: 'main_nursery',
        date_transplanted: date,
        transplant_culls: culls,
        transplant_extras: extras,
        qty_mn_start: mn
      }).eq('id', id).select());
      if (result === null) return;

      await loadBatches();
      closeModal('opg-transplant-overlay');
      renderBatchesTab();
      notify('Transplant recorded — batch is now in Main Nursery', 'success');
    }

    // === Mid-MN cull events + stage transitions (Task 1.8) ===
    async function opgRenderMnSection(b) {
      if (!['main_nursery', 'selling', 'sold_out'].includes(b.status)) {
        document.getElementById('opg-mn-section').innerHTML = '';
        return;
      }

      // oilpalm_batch_events has NO company_id column — DO NOT add filter
      const events = await sbQuery(sb.from('oilpalm_batch_events').select('*').eq('batch_id', b.id).eq('event_type', 'cull').order('event_date', { ascending: false }));
      const cullEvents = events || [];
      const totalCulls = cullEvents.reduce((s, e) => s + (e.qty || 0), 0);
      const collected  = collectionsByBatch[b.id] || 0;
      const available  = Math.max(0, (b.qty_mn_start || 0) - totalCulls - collected);

      document.getElementById('opg-mn-section').innerHTML = `
        <div class="opg-section">
          <h3>Main Nursery — Counts &amp; Culls</h3>
          <div class="opg-mn-summary">
            <div><strong>MN Start:</strong> ${fmtNum(b.qty_mn_start || 0)}</div>
            <div><strong>Mid-MN Culls:</strong> ${fmtNum(totalCulls)}</div>
            <div><strong>Collected:</strong> ${fmtNum(collected)}</div>
            <div><strong>Available:</strong> ${fmtNum(available)}</div>
          </div>
          <button class="btn btn-tiny" onclick="opgOpenCullModal()">+ Add Cull Event</button>
          <table class="data-table" style="margin-top:12px">
            <thead><tr><th>Date</th><th>Qty</th><th>Reason</th><th>Logged By</th></tr></thead>
            <tbody>
              ${cullEvents.map(e => `
                <tr>
                  <td>${fmtDate(e.event_date)}</td>
                  <td>${fmtNum(e.qty)}</td>
                  <td>${esc(e.reason || e.notes || '—')}</td>
                  <td>${esc(e.logged_by || '—')}</td>
                </tr>
              `).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--muted)">No mid-MN culls.</td></tr>'}
            </tbody>
          </table>
        </div>
      `;
    }

    function opgOpenCullModal() {
      showModal(`
        <h3>Add Cull Event</h3>
        <div class="form-grid">
          <label>Qty Culled <input id="opg-cull-qty" type="number" min="1" /></label>
          <label>Reason <input id="opg-cull-reason" placeholder="dead, abnormal, etc." /></label>
          <label>Date <input id="opg-cull-date" type="date" value="${new Date().toISOString().slice(0,10)}" /></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('opg-cull-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opgSaveCullEvent()">Save</button>
        </div>
      `, 'opg-cull-overlay');
    }

    async function opgSaveCullEvent() {
      const id  = selectedBatchId;
      const qty = parseInt(document.getElementById('opg-cull-qty').value, 10);
      const reason = document.getElementById('opg-cull-reason').value.trim();
      const date   = document.getElementById('opg-cull-date').value;
      if (!qty || qty < 1) { notify('Qty required', 'error'); return; }
      if (!date)           { notify('Date required', 'error'); return; }

      const eventId = await dbNextId('OE');
      if (!eventId) { notify('Failed to generate event ID', 'error'); return; }
      const result = await sbMutate(() => sb.from('oilpalm_batch_events').insert({
        id: eventId,
        batch_id: id,
        event_type: 'cull',
        qty,
        reason: reason || null,
        event_date: date,
        logged_by: currentUser.username
      }).select());
      if (result === null) return;

      await loadMidCullAggregates();
      closeModal('opg-cull-overlay');
      renderBatchesTab();
      notify('Cull recorded', 'success');
    }

    function opgMarkSelling() {
      const id = selectedBatchId;
      const b  = batches.find(x => x.id === id);
      if (!b || b.status !== 'main_nursery') return;
      // Price modal below has Cancel + Mark-as-Selling buttons — that IS the confirmation step.

      showModal(`
        <h3>Set Default Selling Price</h3>
        <p class="muted">This is the per-seedling default. Bookings can override per-customer.</p>
        <label>Default Price (RM) <input id="opg-sell-price" type="number" step="0.01" min="0" /></label>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal('opg-sellprice-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opgConfirmMarkSelling()">Mark as Selling</button>
        </div>
      `, 'opg-sellprice-overlay');
    }

    async function opgConfirmMarkSelling() {
      const id    = selectedBatchId;
      const price = parseFloat(document.getElementById('opg-sell-price').value);
      if (!price || price <= 0) { notify('Default price must be positive', 'error'); return; }
      const result = await sbMutate(() => sb.from('oilpalm_batches').update({ status: 'selling', default_price: price }).eq('id', id).select());
      if (result === null) return;
      await loadBatches();
      closeModal('opg-sellprice-overlay');
      renderBatchesTab();
      notify('Batch is now Selling', 'success');
    }

    function opgCloseBatch() {
      const id = selectedBatchId;
      const b  = batches.find(x => x.id === id);
      if (!b) return;
      const collected = collectionsByBatch[id] || 0;
      const midCulls  = midCullsByBatch[id] || 0;
      // Stage-aware: pre_nursery batches haven't been transplanted yet so
      // qty_mn_start is 0 — count the planted PN seedlings instead. Post-transplant
      // stages use qty_mn_start - midCulls - collected.
      let remaining, stageNote;
      if (b.status === 'pre_nursery') {
        remaining = b.qty_planted || 0;
        stageNote = `Stage: Pre-Nursery (not yet transplanted). `;
      } else if (['main_nursery', 'selling', 'sold_out'].includes(b.status)) {
        remaining = Math.max(0, (b.qty_mn_start || 0) - midCulls - collected);
        stageNote = '';
      } else {
        remaining = 0;
        stageNote = '';
      }

      const cullLine = remaining > 0
        ? `${stageNote}<strong>${fmtNum(remaining)}</strong> remaining seedling${remaining === 1 ? '' : 's'} will be recorded as a final cull (reason: <em>"Batch closed — leftover"</em>).`
        : `${stageNote}This batch has <strong>0 remaining seedlings</strong> — no final cull will be recorded.`;

      confirmAction(
        `Close batch ${esc(b.batch_number)}?`,
        `${cullLine}<br/><br/>The batch will be marked <strong>Closed</strong> and no further collections or bookings will be possible. <strong>This cannot be undone.</strong>`,
        () => opgConfirmCloseBatch(id, remaining)
      );
    }

    async function opgConfirmCloseBatch(id, remaining) {
      if (remaining > 0) {
        const eventId = await dbNextId('OE');
        if (!eventId) { notify('Failed to generate event ID', 'error'); return; }
        const evResult = await sbMutate(() => sb.from('oilpalm_batch_events').insert({
          id: eventId,
          batch_id: id,
          event_type: 'cull',
          qty: remaining,
          reason: 'Batch closed — leftover',
          event_date: new Date().toISOString().slice(0,10),
          logged_by: currentUser.username
        }).select());
        if (evResult === null) return;
      }

      const result = await sbMutate(() => sb.from('oilpalm_batches').update({
        status: 'closed',
        closed_at: new Date().toISOString(),
        closed_by: currentUser.username
      }).eq('id', id).select());
      if (result === null) return;

      await loadBatches();
      await loadMidCullAggregates();
      renderBatchesTab();
      notify('Batch closed', 'success');
    }

    // Auto-flip selling-stage batches to sold_out when available <= 0.
    // Called from DOMContentLoaded after Promise.all (so aggregates + batches are in memory).
    // NOT called from inside loadCollectionAggregates (per gotcha G11) — needs `batches` populated first.
    // Sales-side collection inserts on Day 2 will also call this after loadCollectionAggregates.
    async function autoFlipSoldOut() {
      for (const b of batches.filter(x => x.status === 'selling')) {
        const midC = midCullsByBatch[b.id] || 0;
        const col  = collectionsByBatch[b.id] || 0;
        const avail = (b.qty_mn_start || 0) - midC - col;
        if (avail <= 0) {
          await sbMutate(() => sb.from('oilpalm_batches').update({ status: 'sold_out' }).eq('id', b.id).select());
        }
      }
    }

    // === New Batch modal (Task 1.4) ===
    async function opgOpenNewBatchModal() {
      const yr = new Date().getFullYear();
      const yrBatches = batches.filter(b => (b.batch_number || '').endsWith('-' + yr));
      const nextNum = yrBatches.length + 1;
      const defaultBatchNumber = `${nextNum}-${yr}`;

      showModal(`
        <h3>New Batch</h3>
        <div class="form-grid">
          <label>Batch # <input id="opg-bn" value="${esc(defaultBatchNumber)}" /></label>
          <label>Order Date <input id="opg-od" type="date" value="${new Date().toISOString().slice(0,10)}" /></label>
          <label>Supplier
            <select id="opg-sup">
              <option value="">— select —</option>
              ${suppliers.filter(s => s.is_active).map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}
            </select>
          </label>
          <label>Variety
            <select id="opg-var">
              <option value="">— select —</option>
              ${varieties.map(v => `<option value="${v.id}">${esc(v.name)}</option>`).join('')}
            </select>
          </label>
          <label>Ordered Qty <input id="opg-qty" type="number" min="1" /></label>
          <label>Unit Cost (RM) <input id="opg-uc" type="number" step="0.01" min="0" /></label>
          <label>Estimated Delivery <input id="opg-edd" type="date" /></label>
          <label class="full">Notes <textarea id="opg-notes"></textarea></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('opg-newbatch-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opgSaveNewBatch()">Create Batch</button>
        </div>
      `, 'opg-newbatch-overlay');
    }

    async function opgSaveNewBatch() {
      const bn  = document.getElementById('opg-bn').value.trim();
      const od  = document.getElementById('opg-od').value;
      const sup = document.getElementById('opg-sup').value;
      const va  = document.getElementById('opg-var').value;
      const qty = parseInt(document.getElementById('opg-qty').value, 10);
      const uc  = parseFloat(document.getElementById('opg-uc').value) || 0;
      const edd = document.getElementById('opg-edd').value || null;
      const notes = document.getElementById('opg-notes').value.trim() || null;

      if (!bn || !sup || !va || !qty || qty < 1) {
        notify('Batch #, supplier, variety, qty are required', 'error');
        return;
      }

      const id = await dbNextId('OB');
      if (!id) { notify('Failed to generate ID', 'error'); return; }

      const result = await sbMutate(() => sb.from('oilpalm_batches').insert({
        id,
        company_id: getCompanyId(),
        batch_number: bn,
        supplier_id: sup,
        variety_id: va,
        ordered_qty: qty,
        unit_cost: uc,
        total_cost: qty * uc,
        order_date: od,
        estimated_delivery_date: edd,
        notes,
        status: 'ordered'
      }).select());

      if (result === null) return;
      await loadBatches();
      closeModal('opg-newbatch-overlay');
      renderBatchesTab();
      notify('Batch created', 'success');
    }

    // === Other tab render stubs (filled in later tasks) ===
    function renderReportsTab()   { document.getElementById('tab-reports').innerHTML = '<p>Reports — TODO</p>'; }

    // === Modal helper (module-local) ===
    // shared.js exposes openModal(id)/closeModal(id) for pre-defined modal HTML, but the plan
    // for this module uses dynamic modal HTML. We inject into #modal-host wrapped in the
    // standard .modal-overlay/.modal-box structure so shared CSS applies, and reuse
    // closeModal(overlayId) so focus-trap teardown still runs.
    // Optional overlayId arg lets distinct modals coexist with their own IDs (default: 'os-modal-overlay').
    function showModal(innerHtml, overlayId) {
      const id = overlayId || 'os-modal-overlay';
      const host = document.getElementById('modal-host');
      host.innerHTML = `
        <div id="${id}" class="modal-overlay" style="display:flex;">
          <div class="modal-box" style="max-width:520px;">
            ${innerHtml}
          </div>
        </div>
      `;
      // openModal handles focus-trap + display
      openModal(id);
    }

    // === Suppliers tab ===
    function renderSuppliersTab() {
      const tbody = suppliers.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${esc(s.name)}</td>
          <td>${esc(s.contact_person || '—')}</td>
          <td>${fmtPhone(s.phone) || '—'}</td>
          <td>${esc(s.address || '—')}</td>
          <td>${s.is_active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
          <td class="actions">
            <button class="btn btn-tiny" onclick="osOpenSupplierModal('${s.id}')">Edit</button>
            <button class="btn btn-tiny ${s.is_active ? 'danger' : ''}" onclick="osToggleSupplier('${s.id}', ${!s.is_active})">${s.is_active ? 'Deactivate' : 'Activate'}</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="7" style="text-align:center; padding:20px; color:var(--muted)">No suppliers yet.</td></tr>';

      document.getElementById('tab-suppliers').innerHTML = `
        <div class="page-header">
          <h2>Suppliers</h2>
          <button class="btn btn-primary" onclick="osOpenSupplierModal()">+ Add Supplier</button>
        </div>
        <table class="data-table">
          <thead><tr><th>#</th><th>Name</th><th>Contact</th><th>Phone</th><th>Address</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      `;
    }

    function osOpenSupplierModal(id) {
      const s = id ? suppliers.find(x => x.id === id) : { name: '', contact_person: '', phone: '', address: '', notes: '' };
      if (!s) return;
      showModal(`
        <h3>${id ? 'Edit' : 'Add'} Supplier</h3>
        <div class="form-grid">
          <label>Name <input id="os-name" value="${esc(s.name)}" /></label>
          <label>Contact Person <input id="os-contact" value="${esc(s.contact_person || '')}" /></label>
          <label>Phone <input id="os-phone" value="${esc(s.phone || '')}" /></label>
          <label class="full">Address <textarea id="os-addr">${esc(s.address || '')}</textarea></label>
          <label class="full">Notes <textarea id="os-notes">${esc(s.notes || '')}</textarea></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('os-modal-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="osSaveSupplier('${id || ''}')">Save</button>
        </div>
      `);
    }

    async function osSaveSupplier(id) {
      const name = document.getElementById('os-name').value.trim();
      if (!name) { notify('Name is required', 'error'); return; }
      const data = {
        name,
        contact_person: document.getElementById('os-contact').value.trim() || null,
        phone: document.getElementById('os-phone').value.trim() || null,
        address: document.getElementById('os-addr').value.trim() || null,
        notes: document.getElementById('os-notes').value.trim() || null
      };
      if (id) {
        const result = await sbMutate(() => sb.from('oilpalm_suppliers').update(data).eq('id', id).select());
        if (result === null) return;
      } else {
        const newId = await dbNextId('OS');
        if (!newId) { notify('Failed to generate ID', 'error'); return; }
        data.id = newId;
        data.company_id = getCompanyId();
        const result = await sbMutate(() => sb.from('oilpalm_suppliers').insert(data).select());
        if (result === null) return;
      }
      await loadSuppliers();
      closeModal('os-modal-overlay');
      renderSuppliersTab();
      notify(id ? 'Supplier updated' : 'Supplier added', 'success');
    }

    async function osToggleSupplier(id, makeActive) {
      const result = await sbMutate(() => sb.from('oilpalm_suppliers').update({ is_active: makeActive }).eq('id', id).select());
      if (result === null) return;
      await loadSuppliers();
      renderSuppliersTab();
      notify(makeActive ? 'Supplier activated' : 'Supplier deactivated', 'success');
    }
  </script>
</body>
</html>
