// REPORTS TAB
// ============================================================
function renderReports() {
  var page = document.getElementById('page-reports');
  if (!currentTender) {
    page.innerHTML = '<div class="no-tender-state"><h3>No Tender Selected</h3></div>';
    return;
  }
  var html = '<div class="td-section-header"><h2>Reports</h2>' +
    '<button class="btn btn-outline btn-sm" onclick="window.print()" style="font-size:11px;">Print</button></div>';

  html += '<div class="td-report-selector">';
  ['summary','batch','payment','margin'].forEach(function(r) {
    var labels = { summary: 'Tender Summary', batch: 'Batch Completion', payment: 'Payment Status', margin: 'Margin Report' };
    html += '<button class="td-report-btn' + (currentReport===r?' active':'') + '" onclick="currentReport=\'' + r + '\';renderReports();">' + labels[r] + '</button>';
  });
  html += '</div>';

  html += '<div class="td-report-content">';
  if (currentReport === 'summary') html += renderSummaryReport();
  else if (currentReport === 'batch') html += renderBatchReport();
  else if (currentReport === 'payment') html += renderPaymentReport();
  else if (currentReport === 'margin') html += renderMarginReport();
  html += '</div>';

  page.innerHTML = html;
}

function renderSummaryReport() {
  var t = currentTender;
  var deliveredQty = los.filter(loIsCompleted).reduce(function(s,lo) { return s + (lo.qty||0); }, 0);
  var pct = t.total_qty ? Math.round(deliveredQty / t.total_qty * 100) : 0;
  var statusCounts = {};
  LO_STATUSES.forEach(function(s) { statusCounts[s] = 0; });
  los.forEach(function(lo) { statusCounts[lo.status] = (statusCounts[lo.status]||0) + 1; });

  var html = '<h3 style="margin:0 0 16px;">Tender Summary — ' + esc(t.tender_no) + '</h3>';
  html += '<table><tbody>' +
    '<tr><td style="font-weight:600;width:180px;">Tender No</td><td>' + esc(t.tender_no) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Title</td><td>' + esc(t.title || '—') + '</td></tr>' +
    '<tr><td style="font-weight:600;">Variety</td><td>' + esc(t.variety) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Issuer</td><td>' + esc(t.issuer) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Period</td><td>' + fmtDateLong(t.start_date) + ' — ' + fmtDateLong(t.end_date) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Total Qty</td><td>' + fmtNum(t.total_qty) + ' suckers</td></tr>' +
    '<tr><td style="font-weight:600;">Delivered</td><td>' + fmtNum(deliveredQty) + ' (' + pct + '%)</td></tr>' +
    '<tr><td style="font-weight:600;">Remaining</td><td>' + fmtNum(t.total_qty - deliveredQty) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Contract Value</td><td>' + fmtRM(t.total_value) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Unit Price</td><td>' + fmtRM(t.unit_price) + '</td></tr>' +
    '<tr><td style="font-weight:600;">Bond</td><td>' + (t.bond_amount ? fmtRM(t.bond_amount) + ' — ' + esc(t.bond_provider || '') : '—') + '</td></tr>' +
    '</tbody></table>';

  html += '<h4 style="margin:20px 0 10px;">LO Status Breakdown</h4><table><thead><tr><th>Status</th><th>Count</th></tr></thead><tbody>';
  LO_STATUSES.forEach(function(s) {
    html += '<tr><td><span class="lo-badge lo-badge-' + s + '">' + LO_STATUS_LABELS[s] + '</span></td><td>' + statusCounts[s] + '</td></tr>';
  });
  html += '<tr style="font-weight:700;"><td>Total</td><td>' + los.length + '</td></tr></tbody></table>';
  return html;
}

function renderBatchReport() {
  var batches = {};
  los.forEach(function(lo) {
    var b = lo.batch_no || 0;
    if (!batches[b]) batches[b] = [];
    batches[b].push(lo);
  });
  var batchKeys = Object.keys(batches).sort(function(a,b) { return a-b; });
  var html = '<h3 style="margin:0 0 16px;">Batch Completion Report</h3>';

  batchKeys.forEach(function(b) {
    var bLos = batches[b];
    var done = bLos.filter(loIsCompleted).length;
    html += '<h4 style="margin:16px 0 8px;">Batch ' + b + ' (' + done + '/' + bLos.length + ' completed)</h4>';
    html += '<table><thead><tr><th>#</th><th>LO No</th><th>Recipient</th><th>Qty</th><th>Delivery</th><th>Status</th></tr></thead><tbody>';
    bLos.forEach(function(lo) {
      html += '<tr><td>' + lo.seq_no + '</td><td>' + esc(lo.lo_number||'—') + '</td><td>' + esc(lo.recipient_name||'—') + '</td>' +
        '<td style="text-align:right;">' + fmtNum(lo.qty) + '</td><td>' + fmtDateLong(lo.delivery_date) + '</td>' +
        '<td><span class="lo-badge lo-badge-' + lo.status + '">' + LO_STATUS_LABELS[lo.status] + '</span></td></tr>';
    });
    html += '</tbody></table>';
  });
  return html;
}

function renderPaymentReport() {
  var invoiced = los.filter(function(lo) { return lo.status === 'invoiced' || lo.status === 'paid'; });
  var totalInvoiced = invoiced.reduce(function(s,lo) { return s + (lo.qty||0) * (parseFloat(currentTender.unit_price)||0); }, 0);
  var totalPaid = invoiced.filter(function(lo) { return lo.status === 'paid'; }).reduce(function(s,lo) { return s + (parseFloat(lo.payment_amount)||0); }, 0);

  var html = '<h3 style="margin:0 0 16px;">Payment Status Report</h3>';
  html += '<div style="display:flex;gap:20px;margin-bottom:16px;">' +
    '<div><span style="font-size:11px;color:var(--text-muted);">Total Invoiced</span><br><strong>' + fmtRM(totalInvoiced) + '</strong></div>' +
    '<div><span style="font-size:11px;color:var(--text-muted);">Total Paid</span><br><strong style="color:#22C55E;">' + fmtRM(totalPaid) + '</strong></div>' +
    '<div><span style="font-size:11px;color:var(--text-muted);">Outstanding</span><br><strong style="color:#EF4444;">' + fmtRM(totalInvoiced - totalPaid) + '</strong></div>' +
    '</div>';

  if (!invoiced.length) {
    html += '<p style="color:var(--text-muted);">No invoiced or paid LOs yet.</p>';
    return html;
  }

  html += '<table><thead><tr><th>LO No</th><th>Recipient</th><th>Qty</th><th>Amount</th><th>Payment Date</th><th>Reference</th><th>Bank</th><th>Status</th></tr></thead><tbody>';
  invoiced.forEach(function(lo) {
    var amt = (lo.qty||0) * (parseFloat(currentTender.unit_price)||0);
    html += '<tr><td>' + esc(lo.lo_number||'—') + '</td><td>' + esc(lo.recipient_name||'—') + '</td>' +
      '<td style="text-align:right;">' + fmtNum(lo.qty) + '</td>' +
      '<td style="text-align:right;">' + fmtRM(amt) + '</td>' +
      '<td>' + fmtDateLong(lo.payment_date) + '</td>' +
      '<td>' + esc(lo.payment_ref || '—') + '</td>' +
      '<td>' + esc(lo.payment_bank || '—') + '</td>' +
      '<td><span class="lo-badge lo-badge-' + lo.status + '">' + LO_STATUS_LABELS[lo.status] + '</span></td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ============================================================
// MARGIN REPORT
// ============================================================
// Accrual basis:
//   Revenue = sum over LOs in date range (delivered/invoiced/paid) of (qty × tender.unit_price)
//   Cost    = sum over purchases in date range of total_cost
// Grouped by month / contract / supplier.
// IMPORTANT: we only have LOs loaded for the *current* tender in memory.
// For cross-tender margin, we'd need to load everything up front. For now, filter by currentTender.
function renderMarginReport() {
  if (!currentTender) return '<p style="color:var(--text-muted);">Select a tender to see margin.</p>';

  var unitPrice = parseFloat(currentTender.unit_price) || 0;
  var from = marginFilters.from || '';
  var to = marginFilters.to || '';
  var groupBy = marginFilters.groupBy || 'month';

  function inRange(dateStr) {
    if (!dateStr) return false;
    if (from && dateStr < from) return false;
    if (to && dateStr > to) return false;
    return true;
  }

  // Revenue LOs: delivered/invoiced/paid with delivery_date in range.
  // If delivery_date missing, fall back to lo_date (otherwise LO can't appear).
  var revLos = los.filter(function(lo) {
    if (['delivered','invoiced','paid'].indexOf(lo.status) < 0) return false;
    var d = lo.delivery_date || lo.lo_date;
    return !d || (!from && !to) || inRange(d);
  });

  // Cost purchases: purchase_date in range
  var costPurs = supplierPurchases.filter(function(p) {
    return (!from && !to) || inRange(p.purchase_date);
  });

  var revenue = revLos.reduce(function(s,lo) { return s + Number(lo.qty||0) * unitPrice; }, 0);
  var cost = costPurs.reduce(function(s,p) { return s + Number(p.total_cost||0); }, 0);
  var margin = revenue - cost;
  var mPct = revenue ? Math.round(margin / revenue * 1000) / 10 : 0;

  var html = '<h3 style="margin:0 0 12px;">Margin Report — ' + esc(currentTender.tender_no) + '</h3>';

  // Filters row
  html += '<div class="td-filter-bar" style="background:var(--bg);padding:10px;border-radius:8px;margin-bottom:14px;">' +
    '<label style="font-size:11px;color:var(--text-muted);">From <input type="date" value="' + esc(from) + '" onchange="marginFilters.from=this.value;renderReports();" style="font-size:12px;padding:4px 8px;"></label>' +
    '<label style="font-size:11px;color:var(--text-muted);">To <input type="date" value="' + esc(to) + '" onchange="marginFilters.to=this.value;renderReports();" style="font-size:12px;padding:4px 8px;"></label>' +
    '<label style="font-size:11px;color:var(--text-muted);">Group by ' +
      '<select onchange="marginFilters.groupBy=this.value;renderReports();" style="font-size:12px;padding:4px 8px;">' +
        ['month','contract','supplier'].map(function(g) {
          return '<option value="' + g + '"' + (groupBy===g?' selected':'') + '>' + g.charAt(0).toUpperCase()+g.slice(1) + '</option>';
        }).join('') +
      '</select></label>' +
    '<button class="btn btn-outline btn-sm" style="font-size:11px;margin-left:auto;" onclick="exportMarginCsv()">Export CSV</button>' +
    '</div>';

  // Summary cards (flat, colored-accent border — matches rest of app)
  var marginCls = margin >= 0 ? 'pos' : 'neg';
  html += '<div class="td-summary-cards">' +
    '<div class="td-summary-card revenue">' +
      '<div class="td-summary-label">Total Revenue</div>' +
      '<div class="td-summary-value pos">' + fmtRM(revenue) + '</div>' +
      '<div class="td-summary-sub">' + revLos.length + ' local order' + (revLos.length===1?'':'s') + '</div>' +
    '</div>' +
    '<div class="td-summary-card cost">' +
      '<div class="td-summary-label">Supplier Cost</div>' +
      '<div class="td-summary-value cost">' + fmtRM(cost) + '</div>' +
      '<div class="td-summary-sub">' + costPurs.length + ' purchase' + (costPurs.length===1?'':'s') + '</div>' +
    '</div>' +
    '<div class="td-summary-card margin">' +
      '<div class="td-summary-label">Net Margin</div>' +
      '<div class="td-summary-value ' + marginCls + '">' + fmtRM(margin) + '</div>' +
      '<div class="td-summary-sub">' + mPct + '% of revenue</div>' +
    '</div>' +
    '</div>';

  // Breakdown by group
  var rows = [];  // array of {key, loCount, revenue, cost, margin}
  if (groupBy === 'month') {
    var byMonth = {};
    revLos.forEach(function(lo) {
      var d = lo.delivery_date || lo.lo_date || '';
      var key = d.slice(0,7); if (!key) key = 'No date';
      if (!byMonth[key]) byMonth[key] = { key: key, loCount: 0, revenue: 0, cost: 0 };
      byMonth[key].loCount++;
      byMonth[key].revenue += Number(lo.qty||0) * unitPrice;
    });
    costPurs.forEach(function(p) {
      var d = p.purchase_date || ''; var key = d.slice(0,7); if (!key) key = 'No date';
      if (!byMonth[key]) byMonth[key] = { key: key, loCount: 0, revenue: 0, cost: 0 };
      byMonth[key].cost += Number(p.total_cost||0);
    });
    rows = Object.values(byMonth).sort(function(a,b) { return a.key < b.key ? -1 : 1; });
    rows.forEach(function(r) { r.margin = r.revenue - r.cost; r.label = r.key === 'No date' ? 'No date' : new Date(r.key + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); });
  } else if (groupBy === 'contract') {
    // Only current tender is loaded → one row.
    rows = [{ label: currentTender.tender_no + ' — ' + currentTender.variety, loCount: revLos.length, revenue: revenue, cost: cost, margin: margin }];
  } else if (groupBy === 'supplier') {
    // Supplier rows — revenue is PRORATED by supplier share of LO qty
    var bySup = {};
    costPurs.forEach(function(p) {
      if (!bySup[p.supplier_id]) bySup[p.supplier_id] = { key: p.supplier_id, loSet: {}, qty: 0, cost: 0, revShare: 0 };
      bySup[p.supplier_id].loSet[p.lo_id] = true;
      bySup[p.supplier_id].qty += Number(p.qty || 0);
      bySup[p.supplier_id].cost += Number(p.total_cost || 0);
    });
    // Prorate revenue per LO to the supplier who contributed
    Object.values(bySup).forEach(function(row) {
      Object.keys(row.loSet).forEach(function(loId) {
        var lo = los.find(function(x) { return x.id === loId; });
        if (!lo) return;
        if (['delivered','invoiced','paid'].indexOf(lo.status) < 0) return;  // only revenue-counted LOs
        // How much did this supplier contribute to this LO?
        var myQ = costPurs.filter(function(p) { return p.lo_id === loId && p.supplier_id === row.key; }).reduce(function(s,p) { return s + Number(p.qty||0); }, 0);
        var loRev = Number(lo.qty||0) * unitPrice;
        var share = lo.qty > 0 ? (myQ / lo.qty) : 0;
        row.revShare += loRev * share;
      });
    });
    rows = Object.values(bySup).map(function(r) {
      var sup = supplierById(r.key);
      return {
        label: sup ? sup.name : r.key,
        loCount: Object.keys(r.loSet).length,
        qty: r.qty,
        revenue: r.revShare,
        cost: r.cost,
        margin: r.revShare - r.cost
      };
    }).sort(function(a,b) { return b.cost - a.cost; });
  }

  // Breakdown table
  if (!rows.length) {
    html += '<p style="color:var(--text-muted);padding:20px;text-align:center;">No data in the selected range.</p>';
    return html;
  }

  var groupHeader = groupBy === 'month' ? 'Month' : (groupBy === 'contract' ? 'Contract' : 'Supplier');
  html += '<table><thead><tr>' +
    '<th>' + groupHeader + '</th>' +
    (groupBy === 'supplier' ? '<th style="text-align:right;">Qty</th>' : '') +
    '<th style="text-align:right;">' + (groupBy === 'supplier' ? 'LOs' : '# LOs') + '</th>' +
    '<th style="text-align:right;">Revenue (RM)</th>' +
    '<th style="text-align:right;">Supplier Cost (RM)</th>' +
    '<th style="text-align:right;">Margin (RM)</th>' +
    '<th style="text-align:right;">Margin %</th>' +
    '</tr></thead><tbody>';
  var tRev = 0, tCost = 0, tMargin = 0, tLos = 0, tQty = 0;
  rows.forEach(function(r) {
    tRev += r.revenue; tCost += r.cost; tMargin += r.margin; tLos += r.loCount; tQty += (r.qty||0);
    var pct = r.revenue ? Math.round(r.margin / r.revenue * 1000) / 10 : 0;
    html += '<tr>' +
      '<td><strong>' + esc(r.label) + '</strong></td>' +
      (groupBy === 'supplier' ? '<td style="text-align:right;">' + fmtNum(r.qty) + '</td>' : '') +
      '<td style="text-align:right;">' + r.loCount + '</td>' +
      '<td style="text-align:right;">' + fmtRM(r.revenue) + '</td>' +
      '<td style="text-align:right;color:#C25B1E;">' + fmtRM(r.cost) + '</td>' +
      '<td style="text-align:right;color:' + (r.margin >= 0 ? '#22A05C' : '#EF4444') + ';font-weight:600;">' + fmtRM(r.margin) + '</td>' +
      '<td style="text-align:right;">' + pct + '%</td>' +
      '</tr>';
  });
  var totPct = tRev ? Math.round(tMargin / tRev * 1000) / 10 : 0;
  html += '<tr style="font-weight:700;background:var(--bg);">' +
    '<td>TOTAL</td>' +
    (groupBy === 'supplier' ? '<td style="text-align:right;">' + fmtNum(tQty) + '</td>' : '') +
    '<td style="text-align:right;">' + tLos + '</td>' +
    '<td style="text-align:right;">' + fmtRM(tRev) + '</td>' +
    '<td style="text-align:right;color:#C25B1E;">' + fmtRM(tCost) + '</td>' +
    '<td style="text-align:right;color:' + (tMargin >= 0 ? '#22A05C' : '#EF4444') + ';">' + fmtRM(tMargin) + '</td>' +
    '<td style="text-align:right;">' + totPct + '%</td>' +
    '</tr>';
  html += '</tbody></table>';

  return html;
}

function exportMarginCsv() {
  // Simple CSV: re-derive the same rows
  if (!currentTender) return;
  var unitPrice = parseFloat(currentTender.unit_price) || 0;
  var from = marginFilters.from, to = marginFilters.to, groupBy = marginFilters.groupBy;
  function inRange(d) { if (!d) return false; if (from && d < from) return false; if (to && d > to) return false; return true; }

  var revLos = los.filter(function(lo) {
    if (['delivered','invoiced','paid'].indexOf(lo.status) < 0) return false;
    var d = lo.delivery_date || lo.lo_date;
    return !d || (!from && !to) || inRange(d);
  });
  var costPurs = supplierPurchases.filter(function(p) { return (!from && !to) || inRange(p.purchase_date); });

  var lines = ['Tender,' + currentTender.tender_no + ' — ' + currentTender.variety];
  lines.push('Date range,' + (from||'(any)') + ' to ' + (to||'(any)'));
  lines.push('Unit price,' + unitPrice);
  lines.push('');

  if (groupBy === 'month') {
    var byMonth = {};
    revLos.forEach(function(lo) { var k = (lo.delivery_date||lo.lo_date||'').slice(0,7) || 'No date'; if (!byMonth[k]) byMonth[k]={loCount:0,revenue:0,cost:0}; byMonth[k].loCount++; byMonth[k].revenue += Number(lo.qty||0)*unitPrice; });
    costPurs.forEach(function(p) { var k = (p.purchase_date||'').slice(0,7) || 'No date'; if (!byMonth[k]) byMonth[k]={loCount:0,revenue:0,cost:0}; byMonth[k].cost += Number(p.total_cost||0); });
    lines.push('Month,# LOs,Revenue,Supplier Cost,Margin,Margin %');
    Object.keys(byMonth).sort().forEach(function(k) {
      var r = byMonth[k]; var m = r.revenue - r.cost; var pct = r.revenue ? (m/r.revenue*100).toFixed(1) : '0';
      lines.push([k, r.loCount, r.revenue.toFixed(2), r.cost.toFixed(2), m.toFixed(2), pct + '%'].join(','));
    });
  } else if (groupBy === 'supplier') {
    var bySup = {};
    costPurs.forEach(function(p) {
      if (!bySup[p.supplier_id]) bySup[p.supplier_id] = { loSet:{}, qty:0, cost:0, revShare:0 };
      bySup[p.supplier_id].loSet[p.lo_id]=true;
      bySup[p.supplier_id].qty += Number(p.qty||0);
      bySup[p.supplier_id].cost += Number(p.total_cost||0);
    });
    Object.keys(bySup).forEach(function(sid) {
      var row = bySup[sid];
      Object.keys(row.loSet).forEach(function(loId) {
        var lo = los.find(function(x) { return x.id === loId; });
        if (!lo || ['delivered','invoiced','paid'].indexOf(lo.status) < 0) return;
        var myQ = costPurs.filter(function(p) { return p.lo_id === loId && p.supplier_id === sid; }).reduce(function(s,p) { return s + Number(p.qty||0); }, 0);
        var loRev = Number(lo.qty||0) * unitPrice;
        row.revShare += loRev * (lo.qty > 0 ? (myQ / lo.qty) : 0);
      });
    });
    lines.push('Supplier,Qty,LOs,Revenue (prorated),Cost,Margin,Margin %');
    Object.keys(bySup).forEach(function(sid) {
      var r = bySup[sid]; var sup = supplierById(sid); var m = r.revShare - r.cost; var pct = r.revShare ? (m/r.revShare*100).toFixed(1) : '0';
      lines.push(['"' + (sup?sup.name:sid).replace(/"/g,'""') + '"', r.qty, Object.keys(r.loSet).length, r.revShare.toFixed(2), r.cost.toFixed(2), m.toFixed(2), pct + '%'].join(','));
    });
  } else {
    var rev = revLos.reduce(function(s,lo) { return s + Number(lo.qty||0)*unitPrice; }, 0);
    var cost = costPurs.reduce(function(s,p) { return s + Number(p.total_cost||0); }, 0);
    lines.push('Contract,# LOs,Revenue,Cost,Margin,Margin %');
    var m = rev - cost; var pct = rev ? (m/rev*100).toFixed(1) : '0';
    lines.push([currentTender.tender_no + ' — ' + currentTender.variety, revLos.length, rev.toFixed(2), cost.toFixed(2), m.toFixed(2), pct + '%'].join(','));
  }
  var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'margin-report-' + currentTender.tender_no.replace(/[^A-Za-z0-9]/g,'_') + '-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  notify('CSV downloaded', 'success');
}

async function handleUploadFile(input) {
  var file = input.files[0];
  if (!file) return;
  // Load API key
  var keyRow = await sbQuery(sb.from('app_config').select('value').eq('key', 'anthropic_api_key').single());
  var savedKey = (keyRow && keyRow.value) || localStorage.getItem('tg_anthropic_key') || '';
  if (!savedKey) { notify('No API key configured. Contact admin.', 'error'); return; }

  var batchNo = parseInt(document.getElementById('upl-batch').value) || 1;
  var selectedTender = document.getElementById('upl-tender').value;

  document.getElementById('upl-step-1').style.display = 'none';
  document.getElementById('upl-progress').style.display = '';
  document.getElementById('upl-progress-text').textContent = 'Reading PDF...';

  try {
    var arrayBuffer = await file.arrayBuffer();
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    var numPages = pdf.numPages;
    document.getElementById('upl-progress-text').textContent = 'Rendering ' + numPages + ' page(s)...';

    var images = [];
    for (var i = 1; i <= Math.min(numPages, 5); i++) {
      var page = await pdf.getPage(i);
      var scale = 2;
      var viewport = page.getViewport({ scale: scale });
      var canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      var ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
      var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      images.push(dataUrl.split(',')[1]);
    }

    document.getElementById('upl-progress-text').textContent = 'Sending to Claude for extraction...';

    var content = [];
    images.forEach(function(img) {
      content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: img } });
    });
    content.push({
      type: 'text',
      text: 'This is an LO (Local Order / Pesanan Tempatan) document from LPNM (Lembaga Perindustrian Nanas Malaysia) for pineapple sucker supply. Extract the following fields from it:\n\n' +
        '- lo_number: The LO number (e.g. LO2600719)\n' +
        '- lo_date: Date of the LO (format: YYYY-MM-DD)\n' +
        '- lo_expiry: Expiry date of the LO (format: YYYY-MM-DD)\n' +
        '- recipient_name: Name of the recipient/farmer (Penerima)\n' +
        '- area: Location/area (Kawasan/Alamat)\n' +
        '- officer_name: LPNM officer name (Pegawai)\n' +
        '- officer_phone: Officer phone number\n' +
        '- qty: Total quantity of suckers ordered (number only)\n\n' +
        'If the document contains multiple LOs, extract each one separately.\n\n' +
        'Return ONLY a JSON array of objects with these fields. No markdown, no explanation. Example:\n' +
        '[{"lo_number":"LO2600719","lo_date":"2026-06-19","lo_expiry":"2026-08-03","recipient_name":"Turi Bin Tar","area":"Samarahan","officer_name":"Mohd Farith","officer_phone":"017-8517534","qty":42000}]'
    });

    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': savedKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        messages: [{ role: 'user', content: content }]
      })
    });

    if (!response.ok) {
      var errBody = await response.text();
      throw new Error('API error ' + response.status + ': ' + errBody);
    }

    var result = await response.json();
    var text = result.content[0].text.trim();
    if (text.startsWith('```')) {
      text = text.replace(/```json?\n?/g, '').replace(/```$/g, '').trim();
    }
    var extracted = JSON.parse(text);
    if (!Array.isArray(extracted)) extracted = [extracted];

    var existingInBatch = los.filter(function(lo) { return lo.batch_no === batchNo; }).length;
    extracted.forEach(function(lo, idx) {
      lo.batch_no = batchNo;
      lo.seq_no = existingInBatch + idx + 1;
      lo.qty = parseInt(lo.qty) || 0;
      lo._tender_id = selectedTender;
    });
    importedLOs = extracted;

    document.getElementById('upl-progress').style.display = 'none';
    document.getElementById('upl-step-2').style.display = '';
    renderImportPreview();
  } catch(e) {
    console.error('Import error:', e);
    document.getElementById('upl-progress').style.display = 'none';
    document.getElementById('upl-step-1').style.display = '';
    notify('Import failed: ' + e.message, 'error');
  }
}

function renderImportPreview() {

    '<th>Batch</th><th>#</th><th>LO No</th><th>LO Date</th><th>Expiry</th><th>Recipient</th><th>Area</th><th>Officer</th><th>Phone</th><th>Qty</th>' +

      '<td><input type="number" value="' + lo.batch_no + '" style="width:60px;" onchange="importedLOs[' + idx + '].batch_no=parseInt(this.value)||1"></td>' +
      '<td>' + lo.seq_no + '</td>' +
      '<td><input value="' + esc(lo.lo_number||'') + '" style="width:110px;" onchange="importedLOs[' + idx + '].lo_number=this.value"></td>' +
      '<td><input type="date" value="' + (lo.lo_date||'') + '" onchange="importedLOs[' + idx + '].lo_date=this.value"></td>' +
      '<td><input type="date" value="' + (lo.lo_expiry||'') + '" onchange="importedLOs[' + idx + '].lo_expiry=this.value"></td>' +
      '<td><input value="' + esc(lo.recipient_name||'') + '" style="width:140px;" onchange="importedLOs[' + idx + '].recipient_name=this.value"></td>' +
      '<td><input value="' + esc(lo.area||'') + '" style="width:110px;" onchange="importedLOs[' + idx + '].area=this.value"></td>' +
      '<td><input value="' + esc(lo.officer_name||'') + '" style="width:110px;" onchange="importedLOs[' + idx + '].officer_name=this.value"></td>' +
      '<td><input value="' + esc(lo.officer_phone||'') + '" style="width:110px;" onchange="importedLOs[' + idx + '].officer_phone=this.value"></td>' +
      '<td><input type="number" value="' + (lo.qty||0) + '" style="width:80px;" onchange="importedLOs[' + idx + '].qty=parseInt(this.value)||0"></td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('upl-preview').innerHTML = html;
}

async function saveImportedLOs() {
  if (!importedLOs.length) return;
  var btn = document.getElementById('upl-save-btn');
  btnLoading(btn, true);
  try {
    var companyId = getCompanyId();
    var selectedTender = document.getElementById('upl-tender').value || currentTender.id;
    for (var i = 0; i < importedLOs.length; i++) {
      var lo = importedLOs[i];
      var data = {
        id: await dbNextId('LO'),
        tender_id: lo._tender_id || selectedTender,
        batch_no: lo.batch_no || 1,
        seq_no: lo.seq_no || (i + 1),
        lo_number: lo.lo_number || null,
        lo_date: lo.lo_date || null,
        lo_expiry: lo.lo_expiry || null,
        recipient_name: lo.recipient_name || null,
        area: lo.area || null,
        officer_name: lo.officer_name || null,
        officer_phone: lo.officer_phone || null,
        qty: lo.qty || 0,
        company_id: companyId
      };
      await sbQuery(sb.from('tender_los').insert(data).select());
    }
    var count = importedLOs.length;
    importedLOs = [];
    await loadTenderData();
    renderUpload();
    notify(count + ' LO(s) imported', 'success');
  } catch(e) { console.error(e); notify('Error saving imported LOs: ' + e.message, 'error'); }
  finally { btnLoading(btn, false); }
}
