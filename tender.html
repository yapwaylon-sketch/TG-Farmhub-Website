<!-- TENDER MODAL -->
<div class="modal-overlay" id="td-modal" style="display:none;">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:560px;">
    <div class="modal-header">
      <h3 id="td-modal-title">Add Tender</h3>
      <button class="modal-close" onclick="closeTdModal()">&times;</button>
    </div>
    <div class="modal-body" id="td-modal-body">
      <div class="form-group"><label>Tender No *</label><input id="td-tender-no" class="form-control" placeholder="e.g. LPNM.400-5-8-24"></div>
      <div class="form-group"><label>Title</label><input id="td-title" class="form-control" placeholder="e.g. MD2 Suckers 2026-2027"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>Variety *</label><select id="td-variety" class="form-control"><option value="MD2">MD2</option><option value="SG1">SG1</option></select></div>
        <div class="form-group"><label>Issuer *</label><input id="td-issuer" class="form-control" value="LPNM"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>Start Date</label><input id="td-start" type="date" class="form-control"></div>
        <div class="form-group"><label>End Date</label><input id="td-end" type="date" class="form-control"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div class="form-group"><label>Total Qty (suckers)</label><input id="td-qty" type="number" class="form-control" placeholder="0"></div>
        <div class="form-group"><label>Unit Price (RM)</label><input id="td-price" type="number" step="0.01" class="form-control" placeholder="0.00"></div>
        <div class="form-group"><label>Total Value (RM)</label><input id="td-value" type="number" step="0.01" class="form-control" placeholder="Auto-calculated" readonly style="background:var(--bg);"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div class="form-group"><label>Bond Amount (RM)</label><input id="td-bond-amt" type="number" step="0.01" class="form-control"></div>
        <div class="form-group"><label>Bond Provider</label><input id="td-bond-provider" class="form-control" placeholder="e.g. Allianz"></div>
        <div class="form-group"><label>Bond Policy No</label><input id="td-bond-policy" class="form-control"></div>
      </div>
      <div class="form-group"><label>Status</label><select id="td-status" class="form-control"><option value="active">Active</option><option value="completed">Completed</option><option value="expired">Expired</option></select></div>
      <div class="form-group"><label>Notes</label><textarea id="td-notes" class="form-control" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeTdModal()">Cancel</button>
      <button class="btn btn-primary" id="td-save-btn" onclick="saveTender()">Save</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
var currentUser = null;
var tenders = [];
var currentTender = null;
var los = [];
var documents = [];
var suppliers = [];
var supplierPurchases = [];
var currentTab = 'dashboard';
var editingTenderId = null;
var editingLoId = null;
var editingSupId = null;
var editingPurId = null;
var purLoContext = null;       // LO id when adding/editing a purchase
var paidPurId = null;          // purchase id being Mark Paid'd
var statusChangeLoId = null;
var statusChangeTarget = null;
var loStatusFilter = 'all';
var loSearch = '';
var currentReport = 'summary';
var marginFilters = { from: '', to: '', groupBy: 'month', tenderId: 'all' };

var LO_STATUSES = ['pending','preparing','delivering','delivered','invoiced','paid'];
var LO_STATUS_LABELS = {
  pending: 'Pending', preparing: 'Preparing', delivering: 'Delivering',
  delivered: 'Delivered', invoiced: 'Invoiced', paid: 'Paid'
};
var DOC_TYPE_LABELS = {
  sst: 'SST', contract: 'Contract', bond: 'Bond / Insurance', lo_letter: 'LO Letter',
  submission: 'Submission', invoice: 'Invoice', report: 'Report', extension: 'Extension', other: 'Other'
};

// ============================================================
// INIT
// ============================================================
(async function init() {
  try {
    // Session guard
    var userData = localStorage.getItem('tgfarmhub_user');
    if (!userData) { location.href = 'index.html'; return; }
    try { currentUser = JSON.parse(userData); } catch(e) { location.href = 'index.html'; return; }

    // Force company to Agribusiness
    setCompanyId('tg_agribusiness');

    // Inject company switcher
    injectCompanySwitcher();
    document.querySelectorAll('.company-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cid = btn.getAttribute('data-company');
        if (cid !== 'tg_agribusiness') {
          setCompanyId(cid);
          location.href = 'index.html';
        }
      });
    });

    // Inject user badge
    injectUserBadge(currentUser);

    // Start session management
    startInactivityTimer();

    // Load data
    await loadAllData();
    renderTenderSelector();
    renderCurrentTab();
  } catch(e) {
    console.error('Init error:', e);
    notify('Failed to initialize', 'error');
  } finally {
    var el = document.getElementById('tg-loading');
    if (el) el.style.display = 'none';
  }
})();

// ============================================================
// DATA LOADING
// ============================================================
async function loadAllData() {
  var companyId = getCompanyId();
  var res = await Promise.all([
    sbQuery(sb.from('tenders').select('*').eq('company_id', companyId).order('created_at', { ascending: false })),
    sbQuery(sb.from('tender_suppliers').select('*').eq('company_id', companyId).order('name'))
  ]);
  tenders = res[0] || [];
  suppliers = res[1] || [];
  if (tenders.length && !currentTender) {
    var active = tenders.find(function(t) { return t.status === 'active'; });
    currentTender = active || tenders[0];
  }
  if (currentTender) {
    await loadTenderData();
  } else {
    los = [];
    documents = [];
    supplierPurchases = [];
  }
  // Always load purchases across all LOs in this tender for dashboard outstanding payables
  await loadPurchasesForCurrentTender();
}

async function loadTenderData() {
  if (!currentTender) { los = []; documents = []; supplierPurchases = []; return; }
  var res = await Promise.all([
    sbQuery(sb.from('tender_los').select('*').eq('tender_id', currentTender.id).order('batch_no').order('seq_no')),
    sbQuery(sb.from('tender_documents').select('*').eq('tender_id', currentTender.id).order('uploaded_at', { ascending: false }))
  ]);
  los = res[0] || [];
  documents = res[1] || [];
  await loadPurchasesForCurrentTender();
}

async function loadPurchasesForCurrentTender() {
  if (!los.length) { supplierPurchases = []; return; }
  var loIds = los.map(function(lo) { return lo.id; });
  var res = await sbQuery(
    sb.from('tender_supplier_purchases').select('*').in('lo_id', loIds).order('purchase_date', { ascending: true })
  );
  supplierPurchases = res || [];
}

// Helpers for aggregating purchases
function purchasesForLo(loId) {
  return supplierPurchases.filter(function(p) { return p.lo_id === loId; });
}
function loCost(loId) {
  return purchasesForLo(loId).reduce(function(s, p) { return s + Number(p.total_cost || 0); }, 0);
}
function loRevenue(lo) {
  var t = (currentTender && lo.tender_id === currentTender.id) ? currentTender : tenders.find(function(x) { return x.id === lo.tender_id; });
  if (!t) return 0;
  return Number(lo.qty || 0) * Number(t.unit_price || 0);
}
function loMargin(lo) { return loRevenue(lo) - loCost(lo.id); }
function supplierById(id) { return suppliers.find(function(s) { return s.id === id; }); }

async function syncAll() {
  var icon = document.getElementById('sync-icon');
  if (icon) icon.style.animation = 'spin 1s linear infinite';
  await loadAllData();
  renderTenderSelector();
  renderCurrentTab();
  if (icon) icon.style.animation = '';
  var txt = document.getElementById('sync-text');
  if (txt) txt.textContent = 'Synced just now';
}

function renderTenderSelector() {

async function switchTender(id) {
  currentTender = tenders.find(function(t) { return t.id === id; }) || null;
  await loadTenderData();
  renderTenderSelector();
  renderCurrentTab();
}

// ============================================================
// HELPERS
// ============================================================
function fmtNum(n) {
  if (n == null) return '0';
  return Number(n).toLocaleString();
}
function fmtRM(n) {
  if (n == null) return 'RM 0.00';
  return 'RM ' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(d) {
  if (!d) return '—';
  var dt = new Date(d);
  return dt.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
}
function fmtDateLong(d) {
  if (!d) return '—';
  var dt = new Date(d);
  return dt.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  var now = new Date(); now.setHours(0,0,0,0);
  var d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}
function loIsCompleted(lo) {
  return ['delivered','invoiced','paid'].indexOf(lo.status) >= 0;
}
function getTenderBalance() {
  if (!currentTender) return 0;
  var delivered = los.filter(loIsCompleted).reduce(function(s, lo) { return s + (lo.qty || 0); }, 0);
  return currentTender.total_qty - delivered;
}

function openTdModal(id) {
  editingTenderId = id || null;
  var m = document.getElementById('td-modal');
  document.getElementById('td-modal-title').textContent = id ? 'Edit Tender' : 'Add Tender';
  if (id) {
    var t = tenders.find(function(x) { return x.id === id; });
    if (!t) return;
    document.getElementById('td-tender-no').value = t.tender_no || '';
    document.getElementById('td-title').value = t.title || '';
    document.getElementById('td-variety').value = t.variety || 'MD2';
    document.getElementById('td-issuer').value = t.issuer || 'LPNM';
    document.getElementById('td-start').value = t.start_date || '';
    document.getElementById('td-end').value = t.end_date || '';
    document.getElementById('td-qty').value = t.total_qty || '';
    document.getElementById('td-price').value = t.unit_price || '';
    document.getElementById('td-value').value = t.total_value || '';
    document.getElementById('td-bond-amt').value = t.bond_amount || '';
    document.getElementById('td-bond-provider').value = t.bond_provider || '';
    document.getElementById('td-bond-policy').value = t.bond_policy_no || '';
    document.getElementById('td-status').value = t.status || 'active';
    document.getElementById('td-notes').value = t.notes || '';
  } else {
    ['td-tender-no','td-title','td-issuer','td-start','td-end','td-qty','td-price','td-value','td-bond-amt','td-bond-provider','td-bond-policy','td-notes'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('td-issuer').value = 'LPNM';
    document.getElementById('td-variety').value = 'MD2';
    document.getElementById('td-status').value = 'active';
  }
  m.style.display = 'flex';
}

function closeTdModal() { document.getElementById('td-modal').style.display = 'none'; editingTenderId = null; }

async function saveTender() {
  var tenderNo = document.getElementById('td-tender-no').value.trim();
  var variety = document.getElementById('td-variety').value;
  if (!tenderNo || !variety) { notify('Tender No and Variety are required', 'error'); return; }
  var qty = parseInt(document.getElementById('td-qty').value) || 0;
  var price = parseFloat(document.getElementById('td-price').value) || 0;
  var data = {
    tender_no: tenderNo,
    title: document.getElementById('td-title').value.trim() || null,
    variety: variety,
    issuer: document.getElementById('td-issuer').value.trim() || 'LPNM',
    start_date: document.getElementById('td-start').value || null,
    end_date: document.getElementById('td-end').value || null,
    total_qty: qty,
    unit_price: price || null,
    total_value: (qty && price) ? qty * price : (parseFloat(document.getElementById('td-value').value) || null),
    bond_amount: parseFloat(document.getElementById('td-bond-amt').value) || null,
    bond_provider: document.getElementById('td-bond-provider').value.trim() || null,
    bond_policy_no: document.getElementById('td-bond-policy').value.trim() || null,
    status: document.getElementById('td-status').value,
    notes: document.getElementById('td-notes').value.trim() || null,
    company_id: getCompanyId()
  };
  var btn = document.getElementById('td-save-btn');
  btnLoading(btn, true);
  try {
    if (editingTenderId) {
      await sbQuery(sb.from('tenders').update(data).eq('id', editingTenderId).select());
    } else {
      data.id = await dbNextId('TD');
      await sbQuery(sb.from('tenders').insert(data).select());
    }
    closeTdModal();
    await loadAllData();
    if (!currentTender && tenders.length) currentTender = tenders[0];
    renderTenderSelector();
    renderCurrentTab();
    notify(editingTenderId ? 'Tender updated' : 'Tender added', 'success');
  } catch(e) { notify('Error saving tender', 'error'); }
  finally { btnLoading(btn, false); }
}

// Auto-calc total value
document.getElementById('td-qty').addEventListener('input', calcTenderValue);
document.getElementById('td-price').addEventListener('input', calcTenderValue);
function calcTenderValue() {
  var q = parseInt(document.getElementById('td-qty').value) || 0;
  var p = parseFloat(document.getElementById('td-price').value) || 0;
  document.getElementById('td-value').value = q && p ? (q * p).toFixed(2) : '';
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  var page = document.getElementById('page-dashboard');
  var activeTenders = tenders.filter(function(t) { return t.status === 'active'; });

  if (!tenders.length) {
    page.innerHTML = '<div class="no-tender-state"><h3>No Tender Selected</h3><p>Add a tender to get started.</p><button class="btn btn-primary" onclick="openTdModal()">+ Add Tender</button></div>';
    return;
  }

  var html = '';

  // --- SECTION 1: Contract Progress Cards (one per active tender) ---
  html += '<div class="td-contract-cards">';
  if (!activeTenders.length) {
    html += '<div style="padding:20px;color:var(--text-muted);font-size:13px;">No active tenders. All tenders are completed or expired.</div>';
  } else {
    activeTenders.forEach(function(t) {
      var isCurrent = currentTender && currentTender.id === t.id;
      var tLos = isCurrent ? los : [];
      var deliveredQty = tLos.filter(loIsCompleted).reduce(function(s, lo) { return s + (lo.qty || 0); }, 0);
      var pct = t.total_qty ? Math.round(deliveredQty / t.total_qty * 100) : 0;
      var remaining = (t.total_qty || 0) - deliveredQty;
      var billedQty = tLos.filter(function(lo) { return lo.status === 'invoiced' || lo.status === 'paid'; }).reduce(function(s,lo) { return s + (lo.qty||0); }, 0);
      var billed = billedQty * (parseFloat(t.unit_price) || 0);
      var paidAmt = tLos.filter(function(lo) { return lo.status === 'paid'; }).reduce(function(s,lo) { return s + (parseFloat(lo.payment_amount)||0); }, 0);
      var totalValue = parseFloat(t.total_value) || 0;
      var fillCls = pct >= 50 ? 'td-card-green' : 'td-card-gold';

      html += '<div class="td-contract-card ' + fillCls + '" onclick="switchTender(\'' + t.id + '\')" title="Switch to this tender">' +
        '<div class="td-cc-head">' + esc(t.tender_no) + '</div>' +
        '<div class="td-cc-subhead">' + esc(t.variety) + (isCurrent ? '<span class="td-cc-current" title="Currently viewing"></span>' : '') + '</div>' +
        '<div class="td-cc-bignum">' + fmtNum(deliveredQty) + '<span class="td-cc-of"> / ' + fmtNum(t.total_qty || 0) + '</span></div>' +
        '<div class="td-cc-line"><span>Remaining</span><strong>' + fmtNum(remaining) + '</strong></div>' +
        '<div class="td-cc-line"><span>Contract value</span><strong>' + fmtRM(totalValue) + '</strong></div>' +
        '<div class="td-cc-line"><span>Billed</span><strong>' + fmtRM(billed) + '</strong></div>' +
        '<div class="td-cc-line"><span>Paid</span><strong>' + fmtRM(paidAmt) + '</strong></div>' +
        (isCurrent ? '' : '<div class="td-cc-hint">Switch →</div>') +
        '</div>';
    });
  }
  html += '</div>';

  // --- SECTION 2: Expiry Alerts (current tender only) ---
  if (currentTender) {
    var overdue = [];
    var expiring = [];
    los.forEach(function(lo) {
      if (loIsCompleted(lo)) return;
      var d = daysUntil(lo.lo_expiry);
      if (d !== null && d < 0) overdue.push(lo);
      else if (d !== null && d <= 14) expiring.push(lo);
    });
    if (overdue.length || expiring.length) {
      html += '<div class="td-alerts"><h3>Expiry Alerts</h3>';
      overdue.forEach(function(lo) {
        html += '<div class="td-alert-card td-alert-overdue" onclick="navigateTo(\'los\')">' +
          '<div><strong>' + esc(lo.lo_number || '—') + '</strong> — ' + esc(lo.recipient_name || '') + '<br><span style="font-size:11px;color:var(--text-muted);">Expired ' + fmtDate(lo.lo_expiry) + ' (' + Math.abs(daysUntil(lo.lo_expiry)) + ' days ago)</span></div>' +
          '<span class="lo-badge lo-badge-' + lo.status + '">' + LO_STATUS_LABELS[lo.status] + '</span></div>';
      });
      expiring.forEach(function(lo) {
        html += '<div class="td-alert-card td-alert-expiring" onclick="navigateTo(\'los\')">' +
          '<div><strong>' + esc(lo.lo_number || '—') + '</strong> — ' + esc(lo.recipient_name || '') + '<br><span style="font-size:11px;color:var(--text-muted);">Expires ' + fmtDate(lo.lo_expiry) + ' (' + daysUntil(lo.lo_expiry) + ' days left)</span></div>' +
          '<span class="lo-badge lo-badge-' + lo.status + '">' + LO_STATUS_LABELS[lo.status] + '</span></div>';
      });
      html += '</div>';
    }
  }

  // --- SECTION 3: Pending Deliveries (current tender, top 10 by deadline) ---
  if (currentTender) {
    var pending = los.filter(function(lo) {
      return ['pending','preparing','delivering'].indexOf(lo.status) >= 0;
    }).sort(function(a,b) {
      var ax = a.lo_expiry || '9999-12-31';
      var bx = b.lo_expiry || '9999-12-31';
      return ax < bx ? -1 : ax > bx ? 1 : 0;
    }).slice(0, 10);
    html += '<div class="td-section"><h3>Pending Deliveries <span style="font-weight:400;font-size:12px;color:var(--text-muted);margin-left:6px;">(sorted by deadline)</span></h3>';
    if (!pending.length) {
      html += '<div style="padding:16px;color:var(--text-muted);font-size:13px;">No pending deliveries.</div>';
    } else {
      html += '<div class="td-simple-table-wrap"><table class="td-simple-table"><thead><tr>' +
        '<th>LO</th><th>Variety</th><th>Farmer</th><th>Location</th><th>Deadline</th><th style="text-align:right;">Qty</th><th>Status</th>' +
        '</tr></thead><tbody>';
      pending.forEach(function(lo) {
        var d = daysUntil(lo.lo_expiry);
        var dateCls = (d !== null && d < 0) ? 'style="color:#EF4444;font-weight:700;white-space:nowrap;"' : (d !== null && d <= 14) ? 'style="color:#D4AF37;font-weight:700;white-space:nowrap;"' : 'style="white-space:nowrap;"';
        html += '<tr onclick="navigateTo(\'los\')" style="cursor:pointer;">' +
          '<td style="white-space:nowrap;"><strong>' + esc(lo.lo_number || '—') + '</strong></td>' +
          '<td>' + esc(currentTender.variety) + '</td>' +
          '<td>' + esc(lo.recipient_name || '—') + '</td>' +
          '<td>' + esc(lo.area || '—') + '</td>' +
          '<td ' + dateCls + '>' + fmtDate(lo.lo_expiry) + '</td>' +
          '<td style="text-align:right;white-space:nowrap;">' + fmtNum(lo.qty) + '</td>' +
          '<td><span class="lo-badge lo-badge-' + lo.status + '">' + LO_STATUS_LABELS[lo.status] + '</span></td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
    }
    html += '</div>';
  }

  // --- SECTION 4: Outstanding Payables (oldest first, top 10) ---
  var unpaid = supplierPurchases.filter(function(p) { return p.payment_status === 'pending'; })
    .sort(function(a,b) {
      var ax = a.purchase_date || '9999-12-31';
      var bx = b.purchase_date || '9999-12-31';
      return ax < bx ? -1 : ax > bx ? 1 : 0;
    });
  var totalOwed = unpaid.reduce(function(s, p) { return s + Number(p.total_cost || 0); }, 0);
  html += '<div class="td-section"><h3>Outstanding Payables <span style="font-weight:400;font-size:12px;color:var(--text-muted);margin-left:6px;">(oldest first)</span></h3>';
  if (!unpaid.length) {
    html += '<div style="padding:16px;color:var(--text-muted);font-size:13px;">No outstanding supplier payables.</div>';
  } else {
    html += '<div style="font-size:12px;color:var(--text-muted);margin:0 0 8px;">Total owed: <strong style="color:#EF4444;">' + fmtRM(totalOwed) + '</strong> across ' + unpaid.length + ' purchase' + (unpaid.length===1?'':'s') + '</div>';
    var shown = unpaid.slice(0, 10);
    html += '<div class="td-simple-table-wrap"><table class="td-simple-table"><thead><tr>' +
      '<th>Date</th><th>Supplier</th><th>LO</th><th style="text-align:right;">Qty</th><th style="text-align:right;">Total</th><th>Receipt</th><th style="width:1px;"></th>' +
      '</tr></thead><tbody>';
    shown.forEach(function(p) {
      var sup = supplierById(p.supplier_id);
      var lo = los.find(function(l) { return l.id === p.lo_id; });
      html += '<tr>' +
        '<td style="white-space:nowrap;">' + fmtDate(p.purchase_date) + '</td>' +
        '<td><strong>' + esc(sup ? sup.name : p.supplier_id) + '</strong></td>' +
        '<td style="white-space:nowrap;">' + esc(lo ? lo.lo_number : p.lo_id) + '</td>' +
        '<td style="text-align:right;white-space:nowrap;">' + fmtNum(p.qty) + '</td>' +
        '<td style="text-align:right;color:#EF4444;font-weight:700;white-space:nowrap;">' + fmtRM(p.total_cost) + '</td>' +
        '<td><span class="lo-badge ' + (p.receipt_status === 'received' ? 'lo-badge-paid' : 'lo-badge-pending') + '">' + (p.receipt_status === 'received' ? 'Received' : 'Pending') + '</span></td>' +
        '<td style="white-space:nowrap;"><button class="btn btn-primary btn-sm" style="font-size:11px;padding:5px 12px;" onclick="openMarkPaid(\'' + p.id + '\')">Mark Paid</button></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
    if (unpaid.length > 10) {
      html += '<div style="text-align:right;margin-top:10px;"><a href="#suppliers" onclick="navigateTo(\'suppliers\');return false;" style="font-size:11px;color:var(--green-light);font-weight:600;">View all ' + unpaid.length + ' payables →</a></div>';
    }
  }
  html += '</div>';

  page.innerHTML = html;
}

// LOCAL ORDERS TAB
// ============================================================
function renderLOs() {
  var page = document.getElementById('page-los');
  if (!currentTender) {
    page.innerHTML = '<div class="no-tender-state"><h3>No Tender Selected</h3><p>Add a tender first.</p></div>';
    return;
  }
  var html = '';
  // Header
  html += '<div class="td-section-header"><h2>Local Orders</h2><div style="display:flex;gap:8px;flex-wrap:wrap;">' +
    '<button class="btn btn-primary btn-sm" onclick="openLoModal()" style="font-size:12px;">+ Add LO</button>' +
    '<button class="btn btn-outline btn-sm" onclick="navigateTo(\'upload\')" style="font-size:12px;">Upload LO PDF →</button>' +
    '</div></div>';

  // Filters
  html += '<div class="td-filter-bar">' +
    '<select onchange="loStatusFilter=this.value;renderLOs();" style="min-width:120px;">' +
    '<option value="all"' + (loStatusFilter==='all'?' selected':'') + '>All Statuses</option>';
  LO_STATUSES.forEach(function(s) {
    html += '<option value="' + s + '"' + (loStatusFilter===s?' selected':'') + '>' + LO_STATUS_LABELS[s] + '</option>';
  });
  html += '</select>' +
    '<input type="text" placeholder="Search LO no, recipient..." value="' + esc(loSearch) + '" oninput="loSearch=this.value;renderLOs();">' +
    '<div style="font-size:12px;color:var(--text-muted);margin-left:auto;">Balance: <strong style="color:var(--text);">' + fmtNum(getTenderBalance()) + '</strong></div>' +
    '</div>';

  // Filter LOs
  var filtered = los.filter(function(lo) {
    if (loStatusFilter !== 'all' && lo.status !== loStatusFilter) return false;
    if (loSearch) {
      var q = loSearch.toLowerCase();
      if (!((lo.lo_number||'').toLowerCase().indexOf(q) >= 0 ||
            (lo.recipient_name||'').toLowerCase().indexOf(q) >= 0 ||
            (lo.area||'').toLowerCase().indexOf(q) >= 0)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    html += '<div style="text-align:center;padding:40px;color:var(--text-muted);">No local orders found.</div>';
    page.innerHTML = html;
    return;
  }

  // Group by batch
  var batchGroups = {};
  filtered.forEach(function(lo) {
    var b = lo.batch_no || 0;
    if (!batchGroups[b]) batchGroups[b] = [];
    batchGroups[b].push(lo);
  });
  var batchKeys = Object.keys(batchGroups).sort(function(a,b) { return a-b; });

  html += '<div class="lo-table-wrap"><table class="lo-table"><thead><tr>' +
    '<th>#</th><th>LO No</th><th>LO Date</th><th>Expiry</th><th>Recipient</th><th>Area</th><th>Officer</th>' +
    '<th>Qty</th><th>Margin</th><th>DO No</th><th>Delivery</th><th>Invoice</th><th>Payment</th><th>Status</th><th></th>' +
    '</tr></thead><tbody>';

  batchKeys.forEach(function(b) {
    var batchLos = batchGroups[b];
    var batchQty = batchLos.reduce(function(s,lo) { return s + (lo.qty||0); }, 0);
    var batchDone = batchLos.filter(loIsCompleted).length;
    html += '<tr class="lo-batch-header"><td colspan="15">Batch ' + b +
      ' <span style="font-weight:400;font-size:11px;color:var(--text-muted);margin-left:8px;">' +
      batchDone + '/' + batchLos.length + ' completed · ' + fmtNum(batchQty) + ' suckers</span></td></tr>';

    batchLos.forEach(function(lo) {
      var days = daysUntil(lo.lo_expiry);
      var rowClass = '';
      if (!loIsCompleted(lo) && days !== null) {
        if (days < 0) rowClass = ' lo-row-overdue';
        else if (days <= 14) rowClass = ' lo-row-expiring';
      }
      var nextStatus = getNextStatus(lo.status);
      var rev = loRevenue(lo);
      var cost = loCost(lo.id);
      var mgn = rev - cost;
      var mgnPct = rev ? Math.round(mgn / rev * 100) : 0;
      var hasPurchases = purchasesForLo(lo.id).length > 0;
      var mgnHtml = hasPurchases
        ? '<span style="font-weight:600;color:' + (mgn >= 0 ? '#22A05C' : '#EF4444') + ';">' + fmtRM(mgn) + '</span><br><span style="font-size:10px;color:var(--text-muted);">' + mgnPct + '%</span>'
        : '<span style="color:var(--text-muted);">—</span>';
      html += '<tr class="' + rowClass + '">' +
        '<td>' + lo.seq_no + '</td>' +
        '<td><strong>' + esc(lo.lo_number || '—') + '</strong></td>' +
        '<td>' + fmtDate(lo.lo_date) + '</td>' +
        '<td>' + fmtDate(lo.lo_expiry) + (days !== null && !loIsCompleted(lo) ? '<br><span style="font-size:10px;color:' + (days<0?'#EF4444':days<=14?'#D4AF37':'var(--text-muted)') + ';">' + (days<0 ? Math.abs(days)+'d overdue' : days+'d left') + '</span>' : '') + '</td>' +
        '<td>' + esc(lo.recipient_name || '—') + '</td>' +
        '<td style="font-size:11px;">' + esc(lo.area || '—') + '</td>' +
        '<td style="font-size:11px;">' + esc(lo.officer_name || '—') + (lo.officer_phone ? '<br>' + esc(lo.officer_phone) : '') + '</td>' +
        '<td style="text-align:right;font-weight:600;">' + fmtNum(lo.qty) + '</td>' +
        '<td style="text-align:right;font-size:11px;">' + mgnHtml + '</td>' +
        '<td>' + esc(lo.do_number || '—') + '</td>' +
        '<td>' + fmtDate(lo.delivery_date) + '</td>' +
        '<td>' + esc(lo.invoice_no || '—') + (lo.invoice_date ? '<br><span style="font-size:10px;">' + fmtDate(lo.invoice_date) + '</span>' : '') + '</td>' +
        '<td>' + (lo.payment_date ? fmtDate(lo.payment_date) + (lo.payment_amount ? '<br><span style="font-size:10px;">' + fmtRM(lo.payment_amount) + '</span>' : '') : '—') + '</td>' +
        '<td><span class="lo-badge lo-badge-' + lo.status + '">' + LO_STATUS_LABELS[lo.status] + '</span></td>' +
        '<td style="white-space:nowrap;">' +
          (nextStatus ? '<button class="lo-action-btn primary" onclick="openStatusChange(\'' + lo.id + '\',\'' + nextStatus + '\')" title="Move to ' + LO_STATUS_LABELS[nextStatus] + '">' + LO_STATUS_LABELS[nextStatus] + ' &#8594;</button> ' : '') +
          '<button class="lo-action-btn" onclick="openLoModal(\'' + lo.id + '\')" title="Edit">Edit</button>' +
        '</td></tr>';
    });
  });

  html += '</tbody></table></div>';
  page.innerHTML = html;
}

function getNextStatus(status) {
  var idx = LO_STATUSES.indexOf(status);
  return idx >= 0 && idx < LO_STATUSES.length - 1 ? LO_STATUSES[idx + 1] : null;
}

function openLoModal(id) {
  editingLoId = id || null;
  document.getElementById('lo-modal-title').textContent = id ? 'Edit Local Order' : 'Add Local Order';
  if (id) {
    var lo = los.find(function(x) { return x.id === id; });
    if (!lo) return;
    document.getElementById('lo-batch').value = lo.batch_no || 1;
    document.getElementById('lo-seq').value = lo.seq_no || 1;
    document.getElementById('lo-qty').value = lo.qty || '';
    document.getElementById('lo-number').value = lo.lo_number || '';
    document.getElementById('lo-date').value = lo.lo_date || '';
    document.getElementById('lo-expiry').value = lo.lo_expiry || '';
    document.getElementById('lo-recipient').value = lo.recipient_name || '';
    document.getElementById('lo-area').value = lo.area || '';
    document.getElementById('lo-officer').value = lo.officer_name || '';
    document.getElementById('lo-phone').value = lo.officer_phone || '';
    document.getElementById('lo-remarks').value = lo.remarks || '';
    document.getElementById('lo-delete-area').innerHTML = '<button class="btn btn-outline" style="color:var(--red);border-color:var(--red);font-size:11px;" onclick="deleteLO(\'' + id + '\')">Delete</button>';
  } else {
    ['lo-number','lo-date','lo-expiry','lo-recipient','lo-area','lo-officer','lo-phone','lo-remarks'].forEach(function(fid) {
      document.getElementById(fid).value = '';
    });
    document.getElementById('lo-qty').value = '';
    // Auto-fill batch and seq
    var maxBatch = los.reduce(function(m, lo) { return Math.max(m, lo.batch_no || 0); }, 0);
    var lastBatch = maxBatch || 1;
    var seqInBatch = los.filter(function(lo) { return lo.batch_no === lastBatch; }).length;
    document.getElementById('lo-batch').value = lastBatch;
    document.getElementById('lo-seq').value = seqInBatch + 1;
    document.getElementById('lo-delete-area').innerHTML = '';
  }
  renderLoPurchasesSection(id);
  document.getElementById('lo-modal').style.display = 'flex';
}

// Renders the supplier purchases block at the bottom of the LO modal.
// Only active for existing LOs (can't attach purchases before the LO has an id).
function renderLoPurchasesSection(loId) {
  var wrap = document.getElementById('lo-purchases-wrap');
  if (!loId) {
    wrap.innerHTML = '<div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:6px;font-size:11px;color:var(--text-muted);">Save the LO first — then reopen to attach supplier purchases.</div>';
    return;
  }
  var lo = los.find(function(x) { return x.id === loId; });
  if (!lo) { wrap.innerHTML = ''; return; }
  var rows = purchasesForLo(loId);
  var purchasedQty = rows.reduce(function(s,p) { return s + Number(p.qty || 0); }, 0);
  var purchasedCost = rows.reduce(function(s,p) { return s + Number(p.total_cost || 0); }, 0);
  var loQty = Number(lo.qty || 0);
  var remainder = loQty - purchasedQty;
  var rev = loRevenue(lo);
  var mgn = rev - purchasedCost;
  var mgnPct = rev ? Math.round(mgn / rev * 100) : 0;

  var html = '<div style="margin-top:18px;border-top:1px solid var(--border);padding-top:16px;">';
  html += '<div class="td-lo-purchases-head">' +
    '<h4>Supplier Purchases</h4>' +
    '<button type="button" class="btn btn-outline btn-sm" style="font-size:11px;" onclick="openPurchaseModal(null,\'' + loId + '\')">+ Add Purchase</button>' +
    '</div>';

  // Summary + margin preview — proper styled block
  var mgnCls = mgn >= 0 ? 'pos' : 'neg';
  html += '<div class="td-margin-preview">' +
    '<div class="td-margin-preview-summary">' +
      '<strong>' + fmtNum(purchasedQty) + '</strong> of <strong>' + fmtNum(loQty) + '</strong> pcs purchased from suppliers' +
      (remainder > 0 ? ' · remainder <strong>' + fmtNum(remainder) + '</strong> pcs from own-nursery'
        : (remainder < 0 ? ' · <span class="td-warn-chip">⚠ ' + fmtNum(-remainder) + ' pcs over</span>'
          : '')) +
    '</div>' +
    '<div class="td-margin-preview-grid">' +
      '<div><div class="td-mp-label">Revenue</div><div class="td-mp-value pos">' + fmtRM(rev) + '</div></div>' +
      '<div><div class="td-mp-label">− Supplier cost</div><div class="td-mp-value cost">' + fmtRM(purchasedCost) + '</div></div>' +
      '<div><div class="td-mp-label">= Margin' + (rows.length ? ' (' + mgnPct + '%)' : '') + '</div><div class="td-mp-value ' + mgnCls + '">' + fmtRM(mgn) + '</div></div>' +
    '</div>' +
  '</div>';

  // Purchases table
  if (!rows.length) {
    html += '<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:12px;background:var(--bg);border-radius:6px;">No supplier purchases yet. All ' + fmtNum(loQty) + ' pcs are implied own-nursery.</div>';
  } else {
    html += '<div class="td-simple-table-wrap"><table class="td-simple-table" style="font-size:11px;"><thead><tr>' +
      '<th>Supplier</th><th style="text-align:right;">Qty</th><th style="text-align:right;">Unit</th><th style="text-align:right;">Total</th><th>Date</th><th>Receipt</th><th>Paid</th><th></th>' +
      '</tr></thead><tbody>';
    rows.forEach(function(p) {
      var sup = supplierById(p.supplier_id);
      html += '<tr>' +
        '<td><strong>' + esc(sup ? sup.name : p.supplier_id) + '</strong></td>' +
        '<td style="text-align:right;">' + fmtNum(p.qty) + '</td>' +
        '<td style="text-align:right;">' + fmtRM(p.unit_cost) + '</td>' +
        '<td style="text-align:right;font-weight:600;">' + fmtRM(p.total_cost) + '</td>' +
        '<td>' + fmtDate(p.purchase_date) + '</td>' +
        '<td><span class="lo-badge ' + (p.receipt_status === 'received' ? 'lo-badge-paid' : 'lo-badge-pending') + '" style="font-size:9px;padding:2px 6px;">' + (p.receipt_status === 'received' ? 'Received' : 'Pending') + '</span></td>' +
        '<td><span class="lo-badge ' + (p.payment_status === 'paid' ? 'lo-badge-paid' : 'lo-badge-pending') + '" style="font-size:9px;padding:2px 6px;">' + (p.payment_status === 'paid' ? 'Paid' : 'Unpaid') + '</span></td>' +
        '<td style="white-space:nowrap;">' +
          '<button class="lo-action-btn" onclick="openPurchaseModal(\'' + p.id + '\',\'' + loId + '\')" title="Edit">Edit</button> ' +
          (p.payment_status !== 'paid' ? '<button class="lo-action-btn" onclick="deletePurchase(\'' + p.id + '\')" title="Delete">×</button>' : '') +
        '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function closeLoModal() { document.getElementById('lo-modal').style.display = 'none'; editingLoId = null; }

async function saveLO() {
  var loNumber = document.getElementById('lo-number').value.trim();
  var recipient = document.getElementById('lo-recipient').value.trim();
  var qty = parseInt(document.getElementById('lo-qty').value) || 0;
  if (!loNumber || !recipient || !qty) { notify('LO Number, Recipient, and Qty are required', 'error'); return; }
  var data = {
    tender_id: currentTender.id,
    batch_no: parseInt(document.getElementById('lo-batch').value) || 1,
    seq_no: parseInt(document.getElementById('lo-seq').value) || 1,
    lo_number: loNumber,
    lo_date: document.getElementById('lo-date').value || null,
    lo_expiry: document.getElementById('lo-expiry').value || null,
    recipient_name: recipient,
    area: document.getElementById('lo-area').value.trim() || null,
    officer_name: document.getElementById('lo-officer').value.trim() || null,
    officer_phone: document.getElementById('lo-phone').value.trim() || null,
    qty: qty,
    remarks: document.getElementById('lo-remarks').value.trim() || null,
    company_id: getCompanyId()
  };
  var btn = document.getElementById('lo-save-btn');
  btnLoading(btn, true);
  try {
    if (editingLoId) {
      await sbQuery(sb.from('tender_los').update(data).eq('id', editingLoId).select());
    } else {
      data.id = await dbNextId('LO');
      await sbQuery(sb.from('tender_los').insert(data).select());
    }
    closeLoModal();
    await loadTenderData();
    renderCurrentTab();
    notify(editingLoId ? 'LO updated' : 'LO added', 'success');
  } catch(e) { notify('Error saving LO', 'error'); }
  finally { btnLoading(btn, false); }
}

async function deleteLO(id) {
  var n = purchasesForLo(id).length;
  if (n > 0) {
    notify('Cannot delete: LO has ' + n + ' supplier purchase' + (n===1?'':'s') + '. Remove the purchases first.', 'error');
    return;
  }
  confirmAction('Delete this Local Order?', 'This cannot be undone.', async function() {
    await sbQuery(sb.from('tender_los').delete().eq('id', id).select());
    closeLoModal();
    await loadTenderData();
    renderCurrentTab();
    notify('LO deleted', 'success');
  }, true);
}

function openStatusChange(loId, targetStatus) {
  statusChangeLoId = loId;
  statusChangeTarget = targetStatus;
  var lo = los.find(function(x) { return x.id === loId; });
  if (!lo) return;
  var body = document.getElementById('lo-status-body');
  document.getElementById('lo-status-title').textContent = esc(lo.lo_number) + ' → ' + LO_STATUS_LABELS[targetStatus];
  var html = '<p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">Recipient: <strong>' + esc(lo.recipient_name) + '</strong></p>';

  if (targetStatus === 'delivering' || targetStatus === 'delivered') {
    html += '<div class="form-group"><label>DO Number</label><input id="st-do" class="form-control" value="' + esc(lo.do_number || '') + '"></div>';
    html += '<div class="form-group"><label>Delivery Date</label><input id="st-delivery-date" type="date" class="form-control" value="' + (lo.delivery_date || '') + '"></div>';
  }
  if (targetStatus === 'invoiced') {
    html += '<div class="form-group"><label>Invoice No</label><input id="st-invoice-no" class="form-control" value="' + esc(lo.invoice_no || '') + '"></div>';
    html += '<div class="form-group"><label>Invoice Date</label><input id="st-invoice-date" type="date" class="form-control" value="' + (lo.invoice_date || '') + '"></div>';
  }
  if (targetStatus === 'paid') {
    html += '<div class="form-group"><label>Payment Amount (RM)</label><input id="st-pay-amt" type="number" step="0.01" class="form-control" value="' + (lo.payment_amount || (lo.qty * (parseFloat(currentTender.unit_price)||0)).toFixed(2)) + '"></div>';
    html += '<div class="form-group"><label>Payment Date</label><input id="st-pay-date" type="date" class="form-control" value="' + (lo.payment_date || '') + '"></div>';
    html += '<div class="form-group"><label>Reference No</label><input id="st-pay-ref" class="form-control" value="' + esc(lo.payment_ref || '') + '"></div>';
    html += '<div class="form-group"><label>Bank</label><input id="st-pay-bank" class="form-control" value="' + esc(lo.payment_bank || '') + '"></div>';
  }
  if (targetStatus === 'pending' || targetStatus === 'preparing') {
    html += '<p style="font-size:12px;color:var(--text-muted);">Move status to <strong>' + LO_STATUS_LABELS[targetStatus] + '</strong>?</p>';
  }

  body.innerHTML = html;
  document.getElementById('lo-status-modal').style.display = 'flex';
}

function closeStatusModal() { document.getElementById('lo-status-modal').style.display = 'none'; statusChangeLoId = null; statusChangeTarget = null; }

async function saveStatusChange() {
  if (!statusChangeLoId || !statusChangeTarget) return;
  var data = { status: statusChangeTarget };

  if (statusChangeTarget === 'delivering' || statusChangeTarget === 'delivered') {
    var doEl = document.getElementById('st-do');
    var ddEl = document.getElementById('st-delivery-date');
    if (doEl) data.do_number = doEl.value.trim() || null;
    if (ddEl) data.delivery_date = ddEl.value || null;
  }
  if (statusChangeTarget === 'invoiced') {
    var inEl = document.getElementById('st-invoice-no');
    var idEl = document.getElementById('st-invoice-date');
    if (inEl) data.invoice_no = inEl.value.trim() || null;
    if (idEl) data.invoice_date = idEl.value || null;
  }
  if (statusChangeTarget === 'paid') {
    var paEl = document.getElementById('st-pay-amt');
    var pdEl = document.getElementById('st-pay-date');
    var prEl = document.getElementById('st-pay-ref');
    var pbEl = document.getElementById('st-pay-bank');
    if (paEl) data.payment_amount = parseFloat(paEl.value) || null;
    if (pdEl) data.payment_date = pdEl.value || null;
    if (prEl) data.payment_ref = prEl.value.trim() || null;
    if (pbEl) data.payment_bank = pbEl.value.trim() || null;
  }

  var btn = document.getElementById('lo-status-save');
  btnLoading(btn, true);
  try {
    await sbQuery(sb.from('tender_los').update(data).eq('id', statusChangeLoId).select());
    closeStatusModal();
    await loadTenderData();
    renderCurrentTab();
    notify('Status updated to ' + LO_STATUS_LABELS[statusChangeTarget], 'success');
  } catch(e) { notify('Error updating status', 'error'); }
  finally { btnLoading(btn, false); }
}

function renderSuppliers() {
  var page = document.getElementById('page-suppliers');

    '<button class="btn btn-primary btn-sm" onclick="openSupModal()" style="font-size:12px;">+ New Supplier</button></div>';

    html += '<div style="padding:16px;color:var(--text-muted);font-size:13px;">No suppliers yet. Add one to start tracking purchases.</div>';

    html += '<div class="td-simple-table-wrap"><table class="td-simple-table"><thead><tr>' +
      '<th>Supplier</th><th>Contact</th><th style="text-align:right;">Bought</th><th style="text-align:right;">Spent</th><th style="text-align:right;">Owed</th><th style="text-align:right;">LOs</th><th>Last buy</th><th>Status</th><th style="width:1px;"></th>' +
      '</tr></thead><tbody>';
    suppliers.forEach(function(s) {
      var myPurchases = supplierPurchases.filter(function(p) { return p.supplier_id === s.id; });
      var totalPcs = myPurchases.reduce(function(x,p) { return x + Number(p.qty||0); }, 0);
      var totalCost = myPurchases.reduce(function(x,p) { return x + Number(p.total_cost||0); }, 0);
      var outstanding = myPurchases.filter(function(p) { return p.payment_status === 'pending'; }).reduce(function(x,p) { return x + Number(p.total_cost||0); }, 0);
      var distinctLos = {}; myPurchases.forEach(function(p) { distinctLos[p.lo_id] = true; });
      var lastDate = myPurchases.reduce(function(m,p) { return (!m || p.purchase_date > m) ? p.purchase_date : m; }, null);
      html += '<tr>' +
        '<td><strong>' + esc(s.name) + '</strong></td>' +
        '<td>' + esc(s.contact_phone || '—') + '</td>' +
        '<td style="text-align:right;">' + fmtNum(totalPcs) + '</td>' +
        '<td style="text-align:right;">' + fmtRM(totalCost) + '</td>' +
        '<td style="text-align:right;' + (outstanding > 0 ? 'color:#EF4444;font-weight:600;' : '') + '">' + fmtRM(outstanding) + '</td>' +
        '<td style="text-align:right;">' + Object.keys(distinctLos).length + '</td>' +
        '<td>' + (lastDate ? fmtDate(lastDate) : '—') + '</td>' +
        '<td><span class="lo-badge ' + (s.status === 'active' ? 'lo-badge-paid' : 'lo-badge-pending') + '" style="font-size:10px;">' + (s.status === 'active' ? 'Active' : 'Inactive') + '</span></td>' +

          '<button class="lo-action-btn" onclick="deleteSupplier(\'' + s.id + '\')" title="Delete">×</button>' +
        '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  // --- Outstanding payables (across current tender scope) ---
  var unpaid = supplierPurchases.filter(function(p) { return p.payment_status === 'pending'; })
    .sort(function(a,b) {
      var ax = a.purchase_date || '9999-12-31';
      var bx = b.purchase_date || '9999-12-31';
      return ax < bx ? -1 : ax > bx ? 1 : 0;
    });
  var totalOwed = unpaid.reduce(function(s,p) { return s + Number(p.total_cost||0); }, 0);
  html += '<div class="td-section"><h3>Outstanding Payables <span style="font-weight:400;font-size:12px;color:var(--text-muted);margin-left:6px;">(oldest first)</span></h3>';

    html += '<div style="padding:16px;color:var(--text-muted);font-size:13px;">Nothing outstanding. All suppliers paid.</div>';
  } else {
    html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Total owed: <strong style="color:#EF4444;">' + fmtRM(totalOwed) + '</strong> across ' + unpaid.length + ' purchase' + (unpaid.length===1?'':'s') + '</div>';
    html += '<div class="td-simple-table-wrap"><table class="td-simple-table"><thead><tr>' +
      '<th>Date</th><th>Supplier</th><th>LO</th><th style="text-align:right;">Qty</th><th style="text-align:right;">Unit</th><th style="text-align:right;">Total</th><th>Receipt</th><th style="width:1px;"></th>' +
      '</tr></thead><tbody>';
    unpaid.forEach(function(p) {
      var sup = supplierById(p.supplier_id);
      var lo = los.find(function(l) { return l.id === p.lo_id; });
      html += '<tr>' +
        '<td style="white-space:nowrap;">' + fmtDate(p.purchase_date) + '</td>' +
        '<td><strong>' + esc(sup ? sup.name : p.supplier_id) + '</strong></td>' +
        '<td style="white-space:nowrap;">' + esc(lo ? lo.lo_number : p.lo_id) + '</td>' +
        '<td style="text-align:right;white-space:nowrap;">' + fmtNum(p.qty) + '</td>' +
        '<td style="text-align:right;white-space:nowrap;">' + fmtRM(p.unit_cost) + '</td>' +
        '<td style="text-align:right;color:#EF4444;font-weight:700;white-space:nowrap;">' + fmtRM(p.total_cost) + '</td>' +
        '<td><span class="lo-badge ' + (p.receipt_status === 'received' ? 'lo-badge-paid' : 'lo-badge-pending') + '">' + (p.receipt_status === 'received' ? 'Received' : 'Pending') + '</span></td>' +
        '<td style="white-space:nowrap;"><button class="btn btn-primary btn-sm" style="font-size:11px;padding:5px 12px;" onclick="openMarkPaid(\'' + p.id + '\')">Mark Paid</button></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  page.innerHTML = html;
}

async function saveSupplier() {
  var name = document.getElementById('sup-name').value.trim();
  if (!name) { notify('Name is required', 'error'); return; }
  var data = {
    name: name,
    contact_phone: document.getElementById('sup-phone').value.trim() || null,
    address: document.getElementById('sup-address').value.trim() || null,
    status: document.getElementById('sup-status').value,
    notes: document.getElementById('sup-notes').value.trim() || null,
    company_id: getCompanyId()
  };
  var btn = document.getElementById('sup-save-btn');
  btnLoading(btn, true);
  try {
    var newId;
    if (editingSupId) {
      await sbQuery(sb.from('tender_suppliers').update(data).eq('id', editingSupId).select());
      newId = editingSupId;
    } else {
      data.id = await dbNextId('TS');
      newId = data.id;
      await sbQuery(sb.from('tender_suppliers').insert(data).select());
    }
    closeSupModal();
    // Reload suppliers
    var res = await sbQuery(sb.from('tender_suppliers').select('*').eq('company_id', getCompanyId()).order('name'));
    suppliers = res || [];
    // If purchase modal is still open, refresh its supplier dropdown and preselect newly added
    var purModal = document.getElementById('pur-modal');
    if (purModal && purModal.style.display === 'flex') {
      populatePurchaseSupplierSelect(newId);
    } else {
      renderCurrentTab();
    }
    notify(editingSupId ? 'Supplier updated' : 'Supplier added', 'success');
  } catch(e) { console.error(e); notify('Error saving supplier', 'error'); }
  finally { btnLoading(btn, false); }
}

async function deleteSupplier(id) {
  var n = supplierPurchases.filter(function(p) { return p.supplier_id === id; }).length;
  if (n > 0) {
    notify('Cannot delete: supplier has ' + n + ' purchase' + (n===1?'':'s') + ' on record. Set status to Inactive instead.', 'error');
    return;
  }
  confirmAction('Delete supplier?', 'This cannot be undone.', async function() {
    await sbQuery(sb.from('tender_suppliers').delete().eq('id', id).select());
    closeSupModal();
    var res = await sbQuery(sb.from('tender_suppliers').select('*').eq('company_id', getCompanyId()).order('name'));
    suppliers = res || [];
    renderCurrentTab();
    notify('Supplier deleted', 'success');
  }, true);
}

// ============================================================
// PURCHASE CRUD (always attached to an LO)
// ============================================================
function populatePurchaseSupplierSelect(preselectId) {
  var sel = document.getElementById('pur-supplier');
  var active = suppliers.filter(function(s) { return s.status === 'active'; });
  if (!active.length) {
    sel.innerHTML = '<option value="">— No active suppliers — click + New</option>';
    return;
  }
  sel.innerHTML = '<option value="">— Select supplier —</option>' +
    active.map(function(s) { return '<option value="' + s.id + '">' + esc(s.name) + '</option>'; }).join('');
  if (preselectId) sel.value = preselectId;
}

function openPurchaseModal(purId, loId) {
  editingPurId = purId || null;
  purLoContext = loId;
  var lo = los.find(function(x) { return x.id === loId; });
  if (!lo) { notify('LO not found', 'error'); return; }
  document.getElementById('pur-modal-title').textContent = purId ? 'Edit Supplier Purchase' : 'Add Supplier Purchase';
  document.getElementById('pur-lo-context').innerHTML =
    'For <strong>' + esc(lo.lo_number || lo.id) + '</strong> — ' + esc(lo.recipient_name || '') + ' · Qty <strong>' + fmtNum(lo.qty) + '</strong>';

  populatePurchaseSupplierSelect();

  if (purId) {
    var p = supplierPurchases.find(function(x) { return x.id === purId; });
    if (!p) return;
    document.getElementById('pur-supplier').value = p.supplier_id || '';
    document.getElementById('pur-qty').value = p.qty || '';
    document.getElementById('pur-unit-cost').value = p.unit_cost || '';
    document.getElementById('pur-total-cost').value = p.total_cost ? Number(p.total_cost).toFixed(2) : '';
    document.getElementById('pur-date').value = p.purchase_date || '';
    document.getElementById('pur-receipt').value = p.receipt_status || 'pending';
    document.getElementById('pur-received-date').value = p.received_date || '';
    document.getElementById('pur-remarks').value = p.remarks || '';
    togglePurReceivedField();
    var deleteBtn = (p.payment_status === 'paid')
      ? '<span style="font-size:10px;color:var(--text-muted);align-self:center;">Paid — cannot delete</span>'
      : '<button class="btn btn-outline" style="color:var(--red);border-color:var(--red);font-size:11px;" onclick="deletePurchase(\'' + purId + '\')">Delete</button>';
    document.getElementById('pur-delete-area').innerHTML = deleteBtn;
  } else {
    document.getElementById('pur-supplier').value = '';
    document.getElementById('pur-qty').value = '';
    document.getElementById('pur-unit-cost').value = '';
    document.getElementById('pur-total-cost').value = '';
    document.getElementById('pur-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('pur-receipt').value = 'pending';
    document.getElementById('pur-received-date').value = '';
    document.getElementById('pur-remarks').value = '';
    togglePurReceivedField();
    document.getElementById('pur-delete-area').innerHTML = '';
  }
  document.getElementById('pur-modal').style.display = 'flex';
}

function closePurModal() { document.getElementById('pur-modal').style.display = 'none'; editingPurId = null; purLoContext = null; }

function togglePurReceivedField() {
  var st = document.getElementById('pur-receipt').value;
  document.getElementById('pur-received-wrap').style.display = st === 'received' ? '' : 'none';
  if (st === 'received' && !document.getElementById('pur-received-date').value) {
    document.getElementById('pur-received-date').value = new Date().toISOString().slice(0,10);
  }
}

function calcPurTotal() {
  var q = parseFloat(document.getElementById('pur-qty').value) || 0;
  var u = parseFloat(document.getElementById('pur-unit-cost').value) || 0;
  document.getElementById('pur-total-cost').value = q && u ? (q * u).toFixed(2) : '';
}

// Attach listeners on first DOM ready
document.getElementById('pur-qty').addEventListener('input', calcPurTotal);
document.getElementById('pur-unit-cost').addEventListener('input', calcPurTotal);
document.getElementById('pur-receipt').addEventListener('change', togglePurReceivedField);

async function savePurchase() {
  var supId = document.getElementById('pur-supplier').value;
  var qty = parseInt(document.getElementById('pur-qty').value) || 0;
  var unit = parseFloat(document.getElementById('pur-unit-cost').value) || 0;
  var date = document.getElementById('pur-date').value;
  if (!supId) { notify('Supplier is required', 'error'); return; }
  if (qty <= 0) { notify('Qty must be > 0', 'error'); return; }
  if (unit < 0) { notify('Unit cost must be ≥ 0', 'error'); return; }
  if (!date) { notify('Purchase date is required', 'error'); return; }
  if (!purLoContext) { notify('LO context missing', 'error'); return; }

  var receiptSt = document.getElementById('pur-receipt').value;
  var data = {
    supplier_id: supId,
    lo_id: purLoContext,
    qty: qty,
    unit_cost: unit,
    total_cost: qty * unit,
    purchase_date: date,
    receipt_status: receiptSt,
    received_date: receiptSt === 'received' ? (document.getElementById('pur-received-date').value || null) : null,
    remarks: document.getElementById('pur-remarks').value.trim() || null,
    company_id: getCompanyId()
  };

  // Warn (not block) if purchased qty > LO qty
  var lo = los.find(function(x) { return x.id === purLoContext; });
  if (lo) {
    var others = supplierPurchases.filter(function(p) { return p.lo_id === purLoContext && p.id !== editingPurId; });
    var othersQty = others.reduce(function(s,p) { return s + Number(p.qty||0); }, 0);
    if (othersQty + qty > (lo.qty || 0)) {
      var over = othersQty + qty - (lo.qty || 0);
      if (!confirm('Total supplier purchases for this LO (' + fmtNum(othersQty + qty) + ') exceed the LO qty (' + fmtNum(lo.qty) + ') by ' + fmtNum(over) + '. Save anyway?')) return;
    }
  }

  var btn = document.getElementById('pur-save-btn');
  btnLoading(btn, true);
  try {
    if (editingPurId) {
      await sbQuery(sb.from('tender_supplier_purchases').update(data).eq('id', editingPurId).select());
    } else {
      data.id = await dbNextId('TP');
      await sbQuery(sb.from('tender_supplier_purchases').insert(data).select());
    }
    closePurModal();
    await loadPurchasesForCurrentTender();
    // Refresh the LO modal purchases section if it's still open, and the active page
    var loModal = document.getElementById('lo-modal');
    if (loModal && loModal.style.display === 'flex' && editingLoId) {
      renderLoPurchasesSection(editingLoId);
    }
    renderCurrentTab();
    notify(editingPurId ? 'Purchase updated' : 'Purchase added', 'success');
  } catch(e) { console.error(e); notify('Error saving purchase', 'error'); }
  finally { btnLoading(btn, false); }
}

async function deletePurchase(id) {
  var p = supplierPurchases.find(function(x) { return x.id === id; });
  if (!p) return;
  if (p.payment_status === 'paid') {
    notify('Cannot delete a paid purchase. Payment must be undone first via DB.', 'error');
    return;
  }
  confirmAction('Delete this supplier purchase?', 'This cannot be undone.', async function() {
    await sbQuery(sb.from('tender_supplier_purchases').delete().eq('id', id).select());
    closePurModal();
    await loadPurchasesForCurrentTender();
    var loModal = document.getElementById('lo-modal');
    if (loModal && loModal.style.display === 'flex' && editingLoId) {
      renderLoPurchasesSection(editingLoId);
    }
    renderCurrentTab();
    notify('Purchase deleted', 'success');
  }, true);
}

function openMarkPaid(purId) {
  paidPurId = purId;
  var p = supplierPurchases.find(function(x) { return x.id === purId; });
  if (!p) return;
  var sup = supplierById(p.supplier_id);
  var lo = los.find(function(x) { return x.id === p.lo_id; });
  document.getElementById('paid-context').innerHTML =
    '<strong>' + esc(sup ? sup.name : '') + '</strong> — LO ' + esc(lo ? lo.lo_number : p.lo_id) +
    '<br>Purchase of <strong>' + fmtNum(p.qty) + '</strong> pcs @ ' + fmtRM(p.unit_cost) + ' = <strong>' + fmtRM(p.total_cost) + '</strong>';
  document.getElementById('paid-amount').value = Number(p.total_cost).toFixed(2);
  document.getElementById('paid-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('paid-method').value = 'bank';
  document.getElementById('paid-ref').value = '';
  document.getElementById('paid-bank').value = '';
  document.getElementById('paid-remarks').value = '';
  document.getElementById('paid-modal').style.display = 'flex';
}

function closePaidModal() { document.getElementById('paid-modal').style.display = 'none'; paidPurId = null; }

async function saveMarkPaid() {
  if (!paidPurId) return;
  var amount = parseFloat(document.getElementById('paid-amount').value) || 0;
  var date = document.getElementById('paid-date').value;
  if (amount <= 0) { notify('Amount must be > 0', 'error'); return; }
  if (!date) { notify('Payment date is required', 'error'); return; }
  var method = document.getElementById('paid-method').value;
  var ref = document.getElementById('paid-ref').value.trim();
  var bank = document.getElementById('paid-bank').value.trim();
  var remarks = document.getElementById('paid-remarks').value.trim();
  var data = {
    payment_status: 'paid',
    payment_date: date,
    payment_amount: amount,
    payment_ref: (method === 'cash' ? 'CASH' : (ref || null)),
    payment_bank: bank || null
  };
  if (remarks) data.remarks = (supplierPurchases.find(function(x){return x.id===paidPurId;}).remarks || '') + (remarks ? ' | Paid: ' + remarks : '');
  var btn = document.getElementById('paid-save-btn');
  btnLoading(btn, true);
  try {
    await sbQuery(sb.from('tender_supplier_purchases').update(data).eq('id', paidPurId).select());
    closePaidModal();
    await loadPurchasesForCurrentTender();
    renderCurrentTab();
    notify('Payment recorded', 'success');
  } catch(e) { console.error(e); notify('Error recording payment', 'error'); }
  finally { btnLoading(btn, false); }
}

// ============================================================
// DOCUMENTS TAB
// ============================================================
function renderDocuments() {
  var page = document.getElementById('page-documents');
  if (!currentTender) {
    page.innerHTML = '<div class="no-tender-state"><h3>No Tender Selected</h3></div>';
    return;
  }
  var html = '<div class="td-section-header"><h2>Documents</h2>' +
    '<button class="btn btn-primary btn-sm" onclick="openDocModal()" style="font-size:12px;">+ Upload Document</button></div>';

  if (!documents.length) {
    html += '<div style="text-align:center;padding:40px;color:var(--text-muted);">No documents uploaded yet.</div>';
    page.innerHTML = html;
    return;
  }

  // Group by doc_type
  var groups = {};
  documents.forEach(function(d) {
    var type = d.doc_type || 'other';
    if (!groups[type]) groups[type] = [];
    groups[type].push(d);
  });

  var typeOrder = ['sst','contract','bond','lo_letter','submission','invoice','report','extension','other'];
  typeOrder.forEach(function(type) {
    if (!groups[type]) return;
    html += '<div class="td-doc-group-header">' + DOC_TYPE_LABELS[type] + ' (' + groups[type].length + ')</div>';
    html += '<div class="td-doc-grid">';
    groups[type].forEach(function(d) {
      var linkedLo = d.lo_id ? los.find(function(lo) { return lo.id === d.lo_id; }) : null;
      html += '<div class="td-doc-card">' +
        '<div class="td-doc-type">' + DOC_TYPE_LABELS[d.doc_type] + '</div>' +
        '<div class="td-doc-name">' + esc(d.file_name) + '</div>' +
        '<div class="td-doc-meta">' +
          (linkedLo ? 'LO: ' + esc(linkedLo.lo_number) + ' · ' : '') +
          fmtDate(d.uploaded_at) +
        '</div>' +
        '<div class="td-doc-actions">' +
          '<a href="' + esc(d.file_url) + '" target="_blank" class="lo-action-btn primary">View</a>' +
          '<button class="lo-action-btn" onclick="deleteDocument(\'' + d.id + '\',\'' + esc(d.file_name.replace(/'/g, "\\'")) + '\')">Delete</button>' +
        '</div></div>';
    });
    html += '</div>';
  });

  page.innerHTML = html;
}

function openDocModal() {
  // Populate LO dropdown
  var sel = document.getElementById('doc-lo-link');
  sel.innerHTML = '<option value="">— Tender-level document —</option>';
  los.forEach(function(lo) {
    sel.innerHTML += '<option value="' + lo.id + '">' + esc(lo.lo_number || lo.id) + ' — ' + esc(lo.recipient_name || '') + '</option>';
  });
  document.getElementById('doc-file').value = '';
  document.getElementById('doc-type').value = 'other';
  document.getElementById('doc-modal').style.display = 'flex';
}

function closeDocModal() { document.getElementById('doc-modal').style.display = 'none'; }

async function uploadDocument() {
  var fileInput = document.getElementById('doc-file');
  var file = fileInput.files[0];
  if (!file) { notify('Please select a file', 'error'); return; }
  var docType = document.getElementById('doc-type').value;
  var loId = document.getElementById('doc-lo-link').value || null;
  var btn = document.getElementById('doc-save-btn');
  btnLoading(btn, true);
  try {
    var ext = file.name.split('.').pop();
    var path = currentTender.id + '/' + Date.now() + '.' + ext;
    var { error: uploadErr } = await sb.storage.from('tender-documents').upload(path, file);
    if (uploadErr) throw uploadErr;
    var { data: urlData } = sb.storage.from('tender-documents').getPublicUrl(path);
    var docData = {
      id: await dbNextId('TF'),
      tender_id: currentTender.id,
      lo_id: loId,
      doc_type: docType,
      file_name: file.name,
      file_url: urlData.publicUrl,
      uploaded_by: currentUser.displayName || currentUser.username,
      company_id: getCompanyId()
    };
    await sbQuery(sb.from('tender_documents').insert(docData).select());
    closeDocModal();
    await loadTenderData();
    renderDocuments();
    notify('Document uploaded', 'success');
  } catch(e) { notify('Upload failed: ' + e.message, 'error'); }
  finally { btnLoading(btn, false); }
}

async function deleteDocument(id, name) {
  confirmAction('Delete document?', '<strong>' + name + '</strong> will be permanently deleted.', async function() {
    await sbQuery(sb.from('tender_documents').delete().eq('id', id).select());
    await loadTenderData();
    renderDocuments();
    notify('Document deleted', 'success');
  }, true);
}
