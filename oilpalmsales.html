        </div>
      `, 'ops-refund-overlay');
    }

    async function opsSaveRefund(bookingId) {
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      if (bk.status !== 'cancelled' || bk.refund_status !== 'pending') {
        notify('Refund already processed or booking not cancelled', 'error');
        return;
      }

      const amtRaw = parseFloat(document.getElementById('ops-ref-amt').value);
      const amt = isFinite(amtRaw) ? amtRaw : NaN;
      const dateVal = (document.getElementById('ops-ref-date').value || '').trim();
      const method = (document.getElementById('ops-ref-method').value || 'bank').trim();
      const ref = (document.getElementById('ops-ref-ref').value || '').trim();
      const notes = (document.getElementById('ops-ref-notes').value || '').trim();
      const slipEl = document.getElementById('ops-ref-slip');
      const slipFile = slipEl && slipEl.files && slipEl.files[0] ? slipEl.files[0] : null;

      if (!isFinite(amt) || amt < 0) { notify('Amount must be ≥ 0', 'error'); return; }
      if (!dateVal) { notify('Date is required', 'error'); return; }

      // Upload slip if provided — non-fatal per spec
      let slipUrl = null;
      if (slipFile) {
        try {
          const ext = slipFile.name.split('.').pop();
          const path = `refunds/${bookingId}/slip.${ext}`;
          const up = await sb.storage.from('oilpalm-photos').upload(path, slipFile, { upsert: true, contentType: slipFile.type });
          if (up.error) {
            console.warn('[ops-refund] slip upload failed:', up.error.message);
            notify('Slip upload failed (' + up.error.message + ') — refund will be saved without slip', 'warning');
          } else {
            slipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
          }
        } catch (e) {
          console.warn('[ops-refund] slip upload threw:', e);
          notify('Slip upload error — refund will be saved without slip', 'warning');
        }
      }

      const updateData = {
        refund_status: 'paid',
        refund_amount: amt,
        refund_method: method,
        refund_reference: ref || null,
        refund_slip_url: slipUrl,
        refund_paid_at: new Date(dateVal).toISOString(),
        refund_paid_by: currentUser ? (currentUser.username || currentUser.name || null) : null,
        refund_notes: notes || null
      };
      const result = await sbMutate(() => sb.from('oilpalm_bookings').update(updateData).eq('id', bookingId).select());
      if (result === null) { notify('Refund save failed — please retry', 'error'); return; }

      await loadBookings();
      closeModal('ops-refund-overlay');
      if (currentTab === 'bookings')      renderBookingsTab();
      else if (currentTab === 'summary')  renderSummaryTab();

      notify('Refund marked paid', 'success');
    }
    // === End Mark Refund Paid modal ===

    // === Record Collection modal (Task 3.7 — booking-driven) ===
    // Walk-in collections live in Task 3.9 (different entry path, no booking, no payment cap).

    // Compute the max qty the customer is currently allowed to collect on this booking.
    // Formula: floor((existingPaid + additionalNow) / unit_price) - alreadyCollected.
    // Used both for the live "Can collect N more" hint AND for the save-time cap check.
    function opsCalcMaxCollectable(bookingId, additionalPayAmt) {
      additionalPayAmt = additionalPayAmt || 0;
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) return 0;
      const paid = (paymentsByBooking[bookingId] || 0) + additionalPayAmt;
      const collected = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const unit = Number(bk.unit_price) || 0;
      if (unit <= 0) return 0;
      return Math.max(0, Math.floor(paid / unit) - collected);
    }

    // Mirrors oilpalmgrowth.html's autoFlipSoldOut() but scoped to a single batch.
    // Sales side has no mid-MN cull data (Growth owns batch_events), so the formula is
    // qty_mn_start − collections only. If a batch's cull-adjusted available is what
    // really matters, Growth's full scan on its next load will catch it. Best-effort.
    async function opsAutoFlipBatchSoldOut(batchId) {
      const b = batches.find(x => x.id === batchId);
      if (!b || b.status !== 'selling') return;
      const collectedAfter = collections
        .filter(c => c.batch_id === batchId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const avail = (Number(b.qty_mn_start) || 0) - collectedAfter;
      if (avail <= 0) {
        await sbMutate(() => sb.from('oilpalm_batches').update({ status: 'sold_out' }).eq('id', batchId).select());
      }
    }

    function opsOpenRecordCollectionModal(bookingId) {
      // bookingId optional — fall back to selectedBookingId (we're on booking detail page).
      bookingId = bookingId || selectedBookingId;
      if (!bookingId) { notify('No booking selected', 'error'); return; }

      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      const batch = batches.find(b => b.id === bk.batch_id);
      // Pre-flight: batch must be in Selling stage to collect
      if (!batch || batch.status !== 'selling') {
        notify('Batch must be in Selling stage to collect', 'error');
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const booked    = Number(bk.booked_qty || 0);
      const collected = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const remaining = Math.max(0, booked - collected);
      const paid      = paymentsByBooking[bookingId] || 0;
      const canCollect = opsCalcMaxCollectable(bookingId, 0);

      const cust = customers.find(c => c.id === bk.customer_id);
      const custLabel = cust ? esc(cust.name) : '—';

      showModal(`
        <h3>+ Record Collection</h3>
        <div class="info-box" id="ops-coll-info" style="background:rgba(212,175,55,0.1);border:1px solid var(--gold);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.6;">
          <div><strong>Booking:</strong> ${esc(bookingId)} · <strong>${custLabel}</strong></div>
          <div>Booked <strong>${booked.toLocaleString()}</strong> · Collected <strong>${collected.toLocaleString()}</strong> already · Remaining <strong>${remaining.toLocaleString()}</strong></div>
          <div>Customer paid <strong>${formatRM(paid)}</strong> · Unit price <strong>${formatRM(bk.unit_price || 0)}</strong></div>
          <div id="ops-coll-cancollect" style="margin-top:4px;font-weight:600;color:#2D5224;">Can collect <strong>${canCollect.toLocaleString()}</strong> more right now.</div>
        </div>

        <div class="form-grid">
          <label>Quantity <input id="ops-coll-qty" type="number" min="1" step="1" max="${remaining}" oninput="opsCollRecalcHint()" /></label>
          <label>Date <input id="ops-coll-date" type="date" value="${today}" /></label>
          <label class="full">L3.1 Form # <input id="ops-coll-l3" placeholder="From physical MPOB booklet" /></label>
          <label class="full">L3.1 Photo (required) <input type="file" id="ops-coll-l3-photo" accept="image/*,application/pdf" /></label>
          <label class="full">Collection Photo (required) <input type="file" id="ops-coll-photo" accept="image/*" /></label>
          <label class="full">Car Plate # <input id="ops-coll-plate" /></label>

          <label class="full" style="font-weight:700;color:var(--text);font-size:13px;margin-top:4px;">Additional Payment Now (optional)</label>
          <label>Amount (RM) <input id="ops-coll-pay-amt" type="number" step="0.01" min="0" oninput="opsCollRecalcHint()" /></label>
          <label>Method
            <select id="ops-coll-pay-method">
              <option value="cash">Cash</option>
              <option value="bank">Bank Transfer</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
          <label>Reference <input id="ops-coll-pay-ref" /></label>
          <label class="full">Slip (optional) <input type="file" id="ops-coll-pay-slip" accept="image/*,application/pdf" /></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-collect-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opsSaveCollection('${esc(bookingId)}')">Save Collection</button>
        </div>
      `, 'ops-collect-overlay');
    }

    // Live update of the "Can collect N more" hint as user types qty / additional payment.
    function opsCollRecalcHint() {
      // selectedBookingId is the booking we're on (modal is opened from booking detail page).
      const bookingId = selectedBookingId;
      if (!bookingId) return;
      const addAmtEl = document.getElementById('ops-coll-pay-amt');
      const addAmt   = addAmtEl ? (parseFloat(addAmtEl.value) || 0) : 0;
      const max = opsCalcMaxCollectable(bookingId, addAmt);
      const hint = document.getElementById('ops-coll-cancollect');
      if (!hint) return;
      const qtyEl = document.getElementById('ops-coll-qty');
      const qty   = qtyEl ? (parseInt(qtyEl.value, 10) || 0) : 0;
      // Color the hint red if user has typed a qty exceeding max
      const over = qty > 0 && qty > max;
      hint.style.color = over ? 'var(--red)' : '#2D5224';
      hint.innerHTML = over
        ? `Qty ${qty.toLocaleString()} exceeds payment-controlled cap. Can collect <strong>${max.toLocaleString()}</strong> more — record more payment first or reduce qty.`
        : `Can collect <strong>${max.toLocaleString()}</strong> more right now.`;
    }

    async function opsSaveCollection(bookingId) {
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }

      // Re-check batch stage (race window between modal open and save)
      const batch = batches.find(b => b.id === bk.batch_id);
      if (!batch || batch.status !== 'selling') {
        notify('Batch must be in Selling stage to collect', 'error');
        return;
      }

      const qty       = parseInt(document.getElementById('ops-coll-qty').value, 10);
      const dateVal   = (document.getElementById('ops-coll-date').value || '').trim();
      const l3        = (document.getElementById('ops-coll-l3').value || '').trim();
      const plate     = (document.getElementById('ops-coll-plate').value || '').trim();
      const l3PhotoEl = document.getElementById('ops-coll-l3-photo');
      const collPhotoEl = document.getElementById('ops-coll-photo');
      const l3PhotoFile   = l3PhotoEl   && l3PhotoEl.files   && l3PhotoEl.files[0]   ? l3PhotoEl.files[0]   : null;
      const collPhotoFile = collPhotoEl && collPhotoEl.files && collPhotoEl.files[0] ? collPhotoEl.files[0] : null;

      // Optional additional payment
      const payAmt    = parseFloat(document.getElementById('ops-coll-pay-amt').value);
      const payMethod = document.getElementById('ops-coll-pay-method').value || 'cash';
      const payRef    = (document.getElementById('ops-coll-pay-ref').value || '').trim();
      const paySlipEl = document.getElementById('ops-coll-pay-slip');
      const paySlipFile = paySlipEl && paySlipEl.files && paySlipEl.files[0] ? paySlipEl.files[0] : null;
      const hasPayment = isFinite(payAmt) && payAmt > 0;

      // === Validation (block on missing required fields) ===
      if (!qty || qty < 1)     { notify('Quantity must be at least 1', 'error'); return; }
      if (!dateVal)            { notify('Date is required', 'error'); return; }
      if (!l3)                 { notify('L3.1 Form # is required', 'error'); return; }
      if (!l3PhotoFile)        { notify('L3.1 photo required', 'error'); return; }
      if (!collPhotoFile)      { notify('Collection photo required', 'error'); return; }
      if (!plate)              { notify('Car Plate # is required', 'error'); return; }

      const booked    = Number(bk.booked_qty || 0);
      const collected = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const remaining = Math.max(0, booked - collected);
      if (qty > remaining) {
        notify('Qty ' + qty + ' exceeds remaining ' + remaining + ' on this booking', 'error');
        return;
      }

      // === Guardrail 1: L3.1 dup check (DB has UNIQUE index too — friendly error first) ===
      const dupCheck = await sbQuery(sb.from('oilpalm_collections').select('id,l3_form_no').eq('l3_form_no', l3));
      if (dupCheck && dupCheck.length > 0) {
        notify('L3.1 #' + l3 + ' was already used. Cannot reuse.', 'error');
        return;
      }

      // === Guardrail 2: Payment-controlled cap ===
      // currentlyPaid INCLUDES the new payment about to be recorded (per spec).
      const additionalNow = hasPayment ? payAmt : 0;
      const maxCollectable = opsCalcMaxCollectable(bookingId, additionalNow);
      if (qty > maxCollectable) {
        const unit = Number(bk.unit_price) || 0;
        const paidNow = (paymentsByBooking[bookingId] || 0) + additionalNow;
        const paidFor = unit > 0 ? Math.floor(paidNow / unit) : 0;
        notify(
          'Customer paid for ' + paidFor.toLocaleString() + ' seedlings, already collected ' +
          collected.toLocaleString() + ', can collect ' + maxCollectable.toLocaleString() +
          ' more. Either reduce qty or record payment first.',
          'error'
        );
        return;
      }

      // === Atomic insert (CS047 pattern — money/photos first, then collection row) ===

      // Step 1: Generate collection ID
      const collectionId = await dbNextId('OL');
      if (!collectionId) { notify('Failed to generate collection ID', 'error'); return; }

      // Step 2: Upload BOTH photos (mandatory — abort if either fails)
      // L3.1 photo can be image OR PDF
      let l3Url = null;
      try {
        const ext = l3PhotoFile.name.split('.').pop();
        const path = `collections/${collectionId}/l3.${ext}`;
        const up = await sb.storage.from('oilpalm-photos').upload(path, l3PhotoFile, { upsert: true, contentType: l3PhotoFile.type });
        if (up.error) {
          console.warn('[ops-coll] L3.1 photo upload failed:', up.error.message);
          notify('L3.1 photo upload failed: ' + up.error.message, 'error');
          return;
        }
        l3Url = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      } catch (e) {
        console.warn('[ops-coll] L3.1 photo upload threw:', e);
        notify('L3.1 photo upload error — collection NOT recorded', 'error');
        return;
      }

      // Collection photo — image only per spec (G7)
      let collUrl = null;
      try {
        const ext = collPhotoFile.name.split('.').pop();
        const path = `collections/${collectionId}/seedlings.${ext}`;
        const up = await sb.storage.from('oilpalm-photos').upload(path, collPhotoFile, { upsert: true, contentType: collPhotoFile.type });
        if (up.error) {
          console.warn('[ops-coll] collection photo upload failed:', up.error.message);
          notify('Collection photo upload failed: ' + up.error.message, 'error');
          return;
        }
        collUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      } catch (e) {
        console.warn('[ops-coll] collection photo upload threw:', e);
        notify('Collection photo upload error — collection NOT recorded', 'error');
        return;
      }

      // Step 3: If additional payment > 0, record it BEFORE the collection row.
      // (Money-first ordering — CS047 pattern. If collection insert later fails, we still
      //  have the payment on file and operator can re-attempt the collection.)
      if (hasPayment) {
        let paySlipUrl = null;
        if (paySlipFile) {
          const ext = paySlipFile.name.split('.').pop();
          const path = `payments/${bookingId}/${collectionId}.${ext}`;
          try {
            const up = await sb.storage.from('oilpalm-photos').upload(path, paySlipFile, { upsert: true, contentType: paySlipFile.type });
            if (up.error) {
              // Slip upload failure is non-fatal per G12 — record payment without slip
              console.warn('[ops-coll] slip upload failed:', up.error.message);
              notify('Slip upload failed (' + up.error.message + ') — payment will be recorded without slip', 'warning');
            } else {
              paySlipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
            }
          } catch (e) {
            console.warn('[ops-coll] slip upload threw:', e);
            notify('Slip upload error — payment will be recorded without slip', 'warning');
          }
        }

        const payId = await dbNextId('OP');
        if (!payId) { notify('Failed to generate payment ID — collection NOT recorded', 'error'); return; }

        const payInsert = {
          id: payId,
          booking_id: bookingId,
          collection_id: collectionId,   // payment is tied to the collection we're about to insert
          amount: payAmt,
          method: payMethod,
          payment_date: dateVal,
          reference: payRef || null,
          slip_url: paySlipUrl,
          logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
        };
        const payResult = await sbMutate(() => sb.from('oilpalm_payments').insert(payInsert).select());
        if (payResult === null) {
          notify('Payment insert failed — collection NOT recorded', 'error');
          return;
        }
      }

      // Step 4: Insert collection row (HAS company_id)
      const collInsert = {
        id: collectionId,
        company_id: getCompanyId(),
        customer_id: bk.customer_id,
        booking_id: bookingId,
        batch_id: bk.batch_id,             // denormalized — locked from booking's CURRENT batch
        qty,
        unit_price: bk.unit_price,         // denormalized — locked from booking's CURRENT price
        subtotal: qty * Number(bk.unit_price || 0),
        l3_form_no: l3,
        l3_photo_url: l3Url,
        collection_photo_url: collUrl,
        plate_no: plate,
        collection_date: dateVal,
        logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
      };
      const collResult = await sbMutate(() => sb.from('oilpalm_collections').insert(collInsert).select());
      if (collResult === null) {
        // Photos + payment are now orphaned, but per G14 we don't try to delete them.
        notify('Collection insert failed — payment (if any) was recorded; please retry the collection', 'error');
        return;
      }

      // Step 5: Best-effort booking completion flip (don't await — it's a side effect)
      if ((collected + qty) >= booked) {
        sbMutate(() => sb.from('oilpalm_bookings').update({ status: 'completed' }).eq('id', bookingId).select())
          .catch(e => console.warn('[ops-coll] booking completion flip failed:', e));
      }

      // Step 6: Reload state + render. Reload collections FIRST so opsAutoFlipBatchSoldOut
      // sees the new row when it computes the post-collection available count.
      await Promise.all([loadCollections(), loadPayments(), loadBookings(), loadBatches()]);

      // Best-effort batch sold_out auto-flip
      try { await opsAutoFlipBatchSoldOut(bk.batch_id); } catch (e) { console.warn('[ops-coll] auto-flip threw:', e); }
      // Reload batches once more if we may have flipped it
      await loadBatches();

      closeModal('ops-collect-overlay');
      if (currentTab === 'bookings')      renderBookingsTab();
      else if (currentTab === 'summary')  renderSummaryTab();
      else if (currentTab === 'collections') renderCollectionsTab();

      notify('Collection recorded — L3.1 ' + l3, 'success');
    }
    // === End Record Collection modal ===

    // === Booking detail page (Task 3.6) ===
    function opsRenderBookingDetail() {
      const b = bookings.find(x => x.id === selectedBookingId);
      if (!b) {
        // Booking missing/deleted — bail back to list
        selectedBookingId = null;
        renderBookingsTab();
        return;
      }

      const cust    = customers.find(c => c.id === b.customer_id);
      const batch   = batches.find(x => x.id === b.batch_id);
      const variety = batch ? varieties.find(v => v.id === batch.variety_id) : null;

      const myPayments = payments
        .filter(p => p.booking_id === b.id)
        .sort((a, c) => new Date(c.payment_date) - new Date(a.payment_date));
      const myCollections = collections
        .filter(c => c.booking_id === b.id)
        .sort((a, c) => new Date(c.collection_date) - new Date(a.collection_date));

      const booked    = Number(b.booked_qty || 0);
      const collectedQty = myCollections.reduce((s, c) => s + Number(c.qty || 0), 0);
      const remaining = Math.max(0, booked - collectedQty);
      const total     = Number(b.total_amount || 0);
      const paid      = myPayments.reduce((s, p) => s + Number(p.amount || 0), 0);
      const balance   = Math.max(0, total - paid);

      // Status badge — mirror Bookings tab logic
      let statusInfo;
      if (b.status === 'completed') statusInfo = { label: 'Completed', cls: 'ops-status-completed' };
      else if (b.status === 'cancelled') {
        if (b.refund_status === 'pending')   statusInfo = { label: 'Refund Pending', cls: 'ops-status-refund-pending' };
        else if (b.refund_status === 'paid') statusInfo = { label: 'Refund Done',    cls: 'ops-status-refund-paid' };
        else                                  statusInfo = { label: 'Cancelled',      cls: 'ops-status-cancelled' };

      // Action button visibility (per spec G11)
      const hasNoCollections = myCollections.length === 0;
      const isAdmin          = currentUser && currentUser.role === 'admin';
      const showEdit         = isAdmin && b.status === 'active';
      const showReassign     = b.status === 'active' && hasNoCollections;
      const showCancel       = b.status === 'active';

      const showMarkRefundPaid = b.status === 'cancelled' && b.refund_status === 'pending';

      const actionButtons = [

      // === Payments table ===
      const paymentsRows = myPayments.map(p => {
        const slipCell = p.slip_url
          ? `<a href="${esc(p.slip_url)}" target="_blank">${/\.pdf(\?|$)/i.test(p.slip_url) ? 'PDF ↗' : 'Image ↗'}</a>`

      showModal(`

        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-addpay-overlay')">Cancel</button>

    async function opsSaveAddPayment(bookingId) {
      const amount = parseFloat(document.getElementById('ops-addpay-amt').value);
      const method = document.getElementById('ops-addpay-method').value || 'cash';
      const ref    = (document.getElementById('ops-addpay-ref').value || '').trim();
      const dateVal = (document.getElementById('ops-addpay-date').value || '').trim();
      const slipFileEl = document.getElementById('ops-addpay-slip');
      const slipFile   = slipFileEl && slipFileEl.files && slipFileEl.files[0] ? slipFileEl.files[0] : null;

      if (!amount || amount <= 0) { notify('Amount must be > 0', 'error'); return; }
      if (!dateVal)               { notify('Date is required', 'error'); return; }

      // 1. Generate payment ID
      const payId = await dbNextId('OP');
      if (!payId) { notify('Failed to generate payment ID', 'error'); return; }

      // 2. Upload slip if provided (failure is non-fatal — payment still saves)
      let slipUrl = null;
      if (slipFile) {
        const ext  = slipFile.name.split('.').pop();
        const path = `payments/${bookingId}/${payId}.${ext}`;
        try {
          const up = await sb.storage.from('oilpalm-photos').upload(path, slipFile, { upsert: true, contentType: slipFile.type });
          if (up.error) {
            console.warn('[ops-addpay] slip upload failed:', up.error.message);
            notify('Slip upload failed (' + up.error.message + ') — payment saved without slip', 'warning');
          } else {
            slipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
          }
        } catch (e) {
          console.warn('[ops-addpay] slip upload threw:', e);
          notify('Slip upload error — payment saved without slip', 'warning');
        }
      }

      // 3. Insert payment row (NO company_id — table doesn't have one)
      const payInsert = {
        id: payId,
        booking_id: bookingId,
        collection_id: null,
        amount,
        method,
        payment_date: dateVal,
        reference: ref || null,
        slip_url: slipUrl,
        logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
      };
      const result = await sbMutate(() => sb.from('oilpalm_payments').insert(payInsert).select());
      if (result === null) return;

      // 4. Refresh + close + re-render
      await loadPayments();
      closeModal('ops-addpay-overlay');
      renderBookingsTab();
      notify('Payment ' + payId + ' added', 'success');
    }

    // === Collections tab (Task 3.10) ===
    function renderCollectionsTab() {
      const customerMap = Object.fromEntries(customers.map(c => [c.id, c]));
      const batchMap    = Object.fromEntries(batches.map(b => [b.id, b]));
      const varietyMap  = Object.fromEntries(varieties.map(v => [v.id, v.name]));

      // Apply filters
      const term = (collectionsFilter.customer || '').trim().toLowerCase();
      const termDigits = phoneDigitsOnly(term).replace(/^0+/, '');
      const fromDate = collectionsFilter.from || '';
      const toDate   = collectionsFilter.to   || '';

      const filtered = collections.filter(c => {
        // Date range filter (collection_date is ISO yyyy-mm-dd, plain string compare works)
        if (fromDate && (c.collection_date || '') < fromDate) return false;
        if (toDate   && (c.collection_date || '') > toDate)   return false;

        // Batch filter
        if (collectionsFilter.batch !== 'all') {
          if (c.batch_id !== collectionsFilter.batch) return false;
        }

        // Type filter (booking-driven vs walk-in)
        if (collectionsFilter.type === 'booking') {
          if (!c.booking_id) return false;
        } else if (collectionsFilter.type === 'walkin') {
          if (c.booking_id) return false;
        }

        // Customer search — match name OR phone digits
        if (term) {
          const cust = customerMap[c.customer_id];
          if (!cust) return false;
          const nameMatch = (cust.name || '').toLowerCase().includes(term);
          const phoneStored = phoneDigitsOnly(cust.phone || '').replace(/^0+/, '');
          const phoneMatch = termDigits && phoneStored.includes(termDigits);
          if (!nameMatch && !phoneMatch) return false;
        }
        return true;
      });

      // Sort: collection_date desc, then created_at desc
      filtered.sort((a, b) => {
        const dA = a.collection_date || '';
        const dB = b.collection_date || '';
        if (dA !== dB) return dA < dB ? 1 : -1;
        const cA = a.created_at || '';
        const cB = b.created_at || '';
        if (cA !== cB) return cA < cB ? 1 : -1;
        return 0;
      });

      const tbody = filtered.map(c => {
        const cust  = customerMap[c.customer_id];
        const batch = batchMap[c.batch_id];
        const isBooking = !!c.booking_id;
        const typeBadge = isBooking
          ? '<span class="ops-status-badge ops-status-active">BOOKING</span>'
          : '<span class="ops-status-badge ops-status-walkin">WALK-IN</span>';
        return `
          <tr onclick="opsOpenCollectionDetail('${esc(c.id)}')" style="cursor:pointer;">
            <td>${fmtDate(c.collection_date)}</td>
            <td>${esc(c.l3_form_no || '—')}</td>
            <td>${cust ? esc(cust.name) : '<span class="muted">—</span>'}</td>
            <td>${batch ? esc(batch.batch_number || batch.id) : '<span class="muted">—</span>'}</td>
            <td style="text-align:right;">${Number(c.qty || 0).toLocaleString()}</td>
            <td>${typeBadge}</td>
            <td>${esc(c.plate_no || '—')}</td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted);">No collections in this range.</td></tr>';

      // Batch dropdown — only batches that have at least one collection
      const batchIdsWithCollections = new Set(collections.map(c => c.batch_id).filter(Boolean));
      const batchOpts = batches
        .filter(b => batchIdsWithCollections.has(b.id))
        .slice()
        .sort((a, b) => (a.batch_number || '').localeCompare(b.batch_number || ''))
        .map(b => `<option value="${esc(b.id)}" ${collectionsFilter.batch === b.id ? 'selected' : ''}>${esc(b.batch_number || b.id)}</option>`)
        .join('');

      const filtersDirty =
        collectionsFilter.from !== _ops_ago90_iso ||
        collectionsFilter.to   !== _ops_today_iso ||
        collectionsFilter.batch !== 'all' ||
        collectionsFilter.type  !== 'all' ||
        collectionsFilter.customer;

      document.getElementById('tab-collections').innerHTML = `
        <div class="page-header">
          <h2>Collections</h2>
        </div>

        <div class="filters-bar">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;">From
            <input type="date" id="ops-co-from" value="${esc(collectionsFilter.from)}" onchange="opsCoFilterFrom(this.value)" />
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;">To
            <input type="date" id="ops-co-to" value="${esc(collectionsFilter.to)}" onchange="opsCoFilterTo(this.value)" />
          </label>
          <select id="ops-co-batch" onchange="opsCoFilterBatch(this.value)">
            <option value="all" ${collectionsFilter.batch === 'all' ? 'selected' : ''}>All batches</option>
            ${batchOpts}
          </select>
          <select id="ops-co-type" onchange="opsCoFilterType(this.value)">
            <option value="all"     ${collectionsFilter.type === 'all'     ? 'selected' : ''}>All types</option>
            <option value="booking" ${collectionsFilter.type === 'booking' ? 'selected' : ''}>Booking-driven</option>
            <option value="walkin"  ${collectionsFilter.type === 'walkin'  ? 'selected' : ''}>Walk-in</option>
          </select>
          <input type="text" id="ops-co-cust" placeholder="Search customer name or phone..." value="${esc(collectionsFilter.customer)}" oninput="opsCoFilterCustomer(this.value)" style="min-width:220px;" />
          ${filtersDirty ? `<button class="btn-tiny" onclick="opsCoClearFilters()">Clear filters</button>` : ''}
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>L3.1 #</th>
                <th>Customer</th>
                <th>Batch</th>
                <th style="text-align:right;">Qty</th>
                <th>Type</th>
                <th>Plate</th>
              </tr>
            </thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      `;
    }

      renderCollectionsTab();

          <div><strong>Qty:</strong> ${qty.toLocaleString()} &nbsp;·&nbsp; <strong>Unit Price:</strong> ${formatRM(unitPrice)} &nbsp;·&nbsp; <strong>Subtotal:</strong> ${formatRM(subtotal)}</div>

    // === Bookings tab (Task 3.4) ===
    function renderBookingsTab() {
      // If a booking is selected, show its detail page instead of the list (Task 3.6)
      if (selectedBookingId) { opsRenderBookingDetail(); return; }

      const customerMap = Object.fromEntries(customers.map(c => [c.id, c]));
      const batchMap    = Object.fromEntries(batches.map(b => [b.id, b]));

      // Aggregate collected qty per booking (only collections tied to a booking)
      const collectedByBooking = {};
      collections.forEach(c => {
        if (!c.booking_id) return;
        collectedByBooking[c.booking_id] = (collectedByBooking[c.booking_id] || 0) + Number(c.qty || 0);
      });

      // Compute display status string for each booking (used for badge + filter)
      function bookingDisplayStatus(b) {
        const collected = collectedByBooking[b.id] || 0;
        if (b.status === 'completed') return { code: 'completed', label: 'Completed', cls: 'ops-status-completed' };
        if (b.status === 'cancelled') {
          if (b.refund_status === 'pending')   return { code: 'refund_pending', label: 'Refund Pending', cls: 'ops-status-refund-pending' };
          if (b.refund_status === 'paid')      return { code: 'refund_paid',    label: 'Refund Done',    cls: 'ops-status-refund-paid' };
          // 'forfeited' or null both render as Cancelled
          return { code: 'cancelled', label: 'Cancelled', cls: 'ops-status-cancelled' };
        }
        // active
        if (collected > 0) return { code: 'partial', label: 'Partial', cls: 'ops-status-partial' };
        return { code: 'active', label: 'Active', cls: 'ops-status-active' };
      }

      // Apply filters
      const term = (bookingsFilter.customer || '').trim().toLowerCase();
      const termDigits = phoneDigitsOnly(term).replace(/^0+/, '');
      const filtered = bookings.filter(b => {
        // Status filter
        if (bookingsFilter.status !== 'all') {
          if (bookingsFilter.status === 'active') {
            // Match all active bookings (including those with partial collections)
            if (b.status !== 'active') return false;
          } else if (bookingsFilter.status === 'completed') {
            if (b.status !== 'completed') return false;
          } else if (bookingsFilter.status === 'cancelled') {
            if (b.status !== 'cancelled') return false;
          } else if (bookingsFilter.status === 'refund_pending') {
            if (!(b.status === 'cancelled' && b.refund_status === 'pending')) return false;
          }
        }
        // Batch filter
        if (bookingsFilter.batch !== 'all') {
          if (b.batch_id !== bookingsFilter.batch) return false;
        }
        // Customer search — match name OR phone digits
        if (term) {
          const cust = customerMap[b.customer_id];
          if (!cust) return false;
          const nameMatch = (cust.name || '').toLowerCase().includes(term);
          const phoneStored = phoneDigitsOnly(cust.phone || '').replace(/^0+/, '');
          const phoneMatch = termDigits && phoneStored.includes(termDigits);
          if (!nameMatch && !phoneMatch) return false;
        }
        return true;
      });

      const tbody = filtered.map(b => {
        const cust = customerMap[b.customer_id];
        const batch = batchMap[b.batch_id];
        const booked = Number(b.booked_qty || 0);
        const collected = collectedByBooking[b.id] || 0;
        const remaining = Math.max(0, booked - collected);
        const total = Number(b.total_amount || 0);
        const paid = paymentsByBooking[b.id] || 0;
        const balance = Math.max(0, total - paid);
        const statusInfo = bookingDisplayStatus(b);
        const isActive = b.status === 'active';
        const balanceStyle = balance > 0 && isActive
          ? 'color:var(--red);font-weight:600;'
          : (balance === 0 ? 'color:var(--text-muted);' : '');
        return `
          <tr onclick="opsOpenBookingDetail('${esc(b.id)}')" style="cursor:pointer;">
            <td>${esc(b.id)}</td>
            <td>${cust ? esc(cust.name) : '<span class="muted">—</span>'}</td>
            <td>${batch ? esc(batch.batch_number || batch.id) : '<span class="muted">—</span>'}</td>
            <td>${booked.toLocaleString()} <span class="muted">(${collected.toLocaleString()} done · ${remaining.toLocaleString()} left)</span></td>
            <td style="text-align:right;">${formatRM(total)}</td>
            <td style="text-align:right;">${formatRM(paid)}</td>
            <td style="text-align:right;${balanceStyle}">${formatRM(balance)}</td>
            <td><span class="ops-status-badge ${statusInfo.cls}">${esc(statusInfo.label)}</span></td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted);">No bookings yet.</td></tr>';

      // Batch dropdown options — show batches that have at least one booking, or all selling batches
      const batchOpts = batches
        .slice()
        .sort((a, b) => (a.batch_number || '').localeCompare(b.batch_number || ''))
        .map(b => `<option value="${esc(b.id)}" ${bookingsFilter.batch === b.id ? 'selected' : ''}>${esc(b.batch_number || b.id)}</option>`)
        .join('');

      document.getElementById('tab-bookings').innerHTML = `
        <div class="page-header">
          <h2>Bookings</h2>
          <button class="btn btn-primary" onclick="opsOpenNewBookingModal()">+ New Booking</button>
        </div>

        <div class="filters-bar">
          <select id="ops-bk-status" onchange="opsBkFilterStatus(this.value)">
            <option value="all"            ${bookingsFilter.status === 'all'            ? 'selected' : ''}>All statuses</option>
            <option value="active"         ${bookingsFilter.status === 'active'         ? 'selected' : ''}>Active</option>
            <option value="completed"      ${bookingsFilter.status === 'completed'      ? 'selected' : ''}>Completed</option>
            <option value="cancelled"      ${bookingsFilter.status === 'cancelled'      ? 'selected' : ''}>Cancelled</option>
            <option value="refund_pending" ${bookingsFilter.status === 'refund_pending' ? 'selected' : ''}>Refund Pending</option>
          </select>
          <input type="text" id="ops-bk-cust" placeholder="Search customer name or phone..." value="${esc(bookingsFilter.customer)}" oninput="opsBkFilterCustomer(this.value)" style="min-width:240px;" />
          <select id="ops-bk-batch" onchange="opsBkFilterBatch(this.value)">
            <option value="all" ${bookingsFilter.batch === 'all' ? 'selected' : ''}>All batches</option>
            ${batchOpts}
          </select>
          ${(bookingsFilter.status !== 'all' || bookingsFilter.customer || bookingsFilter.batch !== 'all')
            ? `<button class="btn-tiny" onclick="opsBkClearFilters()">Clear filters</button>` : ''}
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Booking #</th>
                <th>Customer</th>
                <th>Batch</th>
                <th>Qty (booked / collected / remaining)</th>
                <th style="text-align:right;">Total</th>
                <th style="text-align:right;">Paid</th>
                <th style="text-align:right;">Balance</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      `;
    }

    // === Summary tab (Task 3.3) ===
    function renderSummaryTab() {
      const varietyMap = Object.fromEntries(varieties.map(v => [v.id, v.name]));

      // Card 1 — Pre-Nursery total qty_planted
      const preNurseryQty = batches
        .filter(b => b.status === 'pre_nursery')
        .reduce((s, b) => s + (Number(b.qty_planted) || 0), 0);

      // Card 2 — Main Nursery total qty_mn_start
      const mainNurseryQty = batches
        .filter(b => b.status === 'main_nursery')
        .reduce((s, b) => s + (Number(b.qty_mn_start) || 0), 0);

      // Aggregate collected + booked-not-yet-collected per batch.
      // (Mid-MN culls live in batch_events, owned by Growth — we don't load them here.
      //  Growth auto-flips a batch to sold_out when real availability hits 0, so trusting
      //  qty_mn_start − collected − booked is safe per the task spec G2 note.)
      const collectedByBatch = {};
      collections.forEach(c => {
        collectedByBatch[c.batch_id] = (collectedByBatch[c.batch_id] || 0) + (Number(c.qty) || 0);
      });

      const bookedByBatch = {};
      bookings.filter(b => b.status === 'active').forEach(bk => {
        const collectedForBk = collections
          .filter(c => c.booking_id === bk.id)
          .reduce((s, c) => s + (Number(c.qty) || 0), 0);
        const remaining = (Number(bk.booked_qty) || 0) - collectedForBk;
        bookedByBatch[bk.batch_id] = (bookedByBatch[bk.batch_id] || 0) + remaining;
      });

      // Card 3 — Available across all selling batches
      const sellingBatches = batches.filter(b => b.status === 'selling');
      const availableTotal = sellingBatches.reduce((s, b) => {
        const total = Number(b.qty_mn_start) || 0;
        const coll  = collectedByBatch[b.id] || 0;
        const bkd   = bookedByBatch[b.id] || 0;
        return s + Math.max(0, total - coll - bkd);
      }, 0);

      // Card 4 — Active bookings
      const activeBks = bookings.filter(b => b.status === 'active');
      const activeQty = activeBks.reduce((s, b) => {
        const collectedForBk = collections
          .filter(c => c.booking_id === b.id)
          .reduce((cs, c) => cs + (Number(c.qty) || 0), 0);
        return s + ((Number(b.booked_qty) || 0) - collectedForBk);
      }, 0);
      const activeOwed = activeBks.reduce((s, b) => {
        const paid = paymentsByBooking[b.id] || 0;
        return s + Math.max(0, (Number(b.total_amount) || 0) - paid);
      }, 0);

      // Card 5 — Today's collections (ISO date string compare)
      const today = new Date().toISOString().slice(0, 10);
      const todaysCols = collections.filter(c => c.collection_date === today);
      const todaysQty = todaysCols.reduce((s, c) => s + (Number(c.qty) || 0), 0);

      // Per-batch table — ALL batches, sorted by stage priority then batch number.
      // 7 columns: Batch / Variety / Stage / Total Planted / Booked / Balance (less booking) / Actual Balance
      const STAGE_ORDER = { selling:1, main_nursery:2, pre_nursery:3, received:4, ordered:5, sold_out:6, closed:7 };
      const STAGE_LABEL = { ordered:'Ordered', received:'Received', pre_nursery:'Pre-Nursery', main_nursery:'Main Nursery', selling:'Selling', sold_out:'Sold Out', closed:'Closed' };
      const sortedBatches = [...batches].sort((a, b) => {
        const sa = STAGE_ORDER[a.status] || 99, sb = STAGE_ORDER[b.status] || 99;
        if (sa !== sb) return sa - sb;
        return (a.batch_number || '').localeCompare(b.batch_number || '');
      });

      // Pre-aggregate walk-in vs booking-collected per batch (collected = ALL collections; the
      // earlier collectedByBatch already exists for top stat cards. Here we split by booking_id.)
      const walkInByBatch = {};
      const bookingCollByBatch = {};
      collections.forEach(c => {
        if (c.booking_id) {
          bookingCollByBatch[c.batch_id] = (bookingCollByBatch[c.batch_id] || 0) + Number(c.qty || 0);
        } else {
          walkInByBatch[c.batch_id] = (walkInByBatch[c.batch_id] || 0) + Number(c.qty || 0);
        }
      });

      let batchRows = '';
      if (sortedBatches.length === 0) {
        batchRows = '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted);">No batches yet. Create one in Oil Palm Growth.</td></tr>';
      } else {
        batchRows = sortedBatches.map(b => {
          const isPrePlanted = (b.status === 'ordered' || b.status === 'received');
          const totalPlanted = Number(b.qty_planted) || 0;

          // Column 5 — Booked = outstanding (booked − collected) for ACTIVE bookings only.
          // bookedByBatch is already computed above against bookings.filter(b => b.status === 'active').
          const booked = bookedByBatch[b.id] || 0;

          // Column 6 — Balance less booking
          const balanceLessBooking = totalPlanted - booked;

          // Column 7 — Actual Balance
          //   = qty_planted − (transplant_culls + mid_culls) + transplant_extras − walk_in − booking_collected
          // Transplant flow emits event_type='transplant' (not 'cull'), so midCullsByBatch already
          // excludes transplant-time culls — safe to add transplant_culls without double-counting.
          const transplantCulls = Number(b.transplant_culls) || 0;
          const midCulls = midCullsByBatch[b.id] || 0;
          const allCulls = transplantCulls + midCulls;
          const extras   = Number(b.transplant_extras) || 0;
          const walkIn   = walkInByBatch[b.id] || 0;
          const bkColl   = bookingCollByBatch[b.id] || 0;
          const actualBalance = totalPlanted - allCulls + extras - walkIn - bkColl;

          const dash = '<span class="muted">—</span>';

          return `
            <tr>
              <td>${esc(b.batch_number || '—')}</td>
              <td>${esc(varietyMap[b.variety_id] || '—')}</td>
              <td><span class="ops-status-badge ops-status-${b.status}">${STAGE_LABEL[b.status] || b.status}</span></td>
              <td style="text-align:right;">${isPrePlanted ? dash : totalPlanted.toLocaleString()}</td>
              <td style="text-align:right;">${isPrePlanted ? dash : booked.toLocaleString()}</td>
              <td style="text-align:right;">${isPrePlanted ? dash : balanceLessBooking.toLocaleString()}</td>
              <td style="text-align:right;font-weight:600;">${isPrePlanted ? dash : actualBalance.toLocaleString()}</td>
            </tr>
          `;
        }).join('');
      }

      document.getElementById('tab-summary').innerHTML = `
        <div class="page-header">
          <h2>Summary</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" onclick="opsOpenNewBookingModal()">+ New Booking</button>
            <button class="btn btn-primary" onclick="opsOpenWalkInModal()">+ New Walk-in Sale</button>
          </div>
        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;">
          <div class="ops-summary-card">
            <div class="label">Pre-Nursery</div>
            <div class="value">${fmtNum(preNurseryQty)}</div>
            <div class="muted">seedlings planted</div>
          </div>
          <div class="ops-summary-card">
            <div class="label">Main Nursery</div>
            <div class="value">${fmtNum(mainNurseryQty)}</div>
            <div class="muted">in MN stage</div>
          </div>
          <div class="ops-summary-card">
            <div class="label">Available (Total)</div>
            <div class="value">${fmtNum(availableTotal)}</div>
            <div class="muted">across selling batches</div>
          </div>
          <div class="ops-summary-card">
            <div class="label">Active Bookings</div>
            <div class="value">${activeBks.length}</div>
            <div class="muted">${fmtNum(activeQty)} qty · ${formatRM(activeOwed)} owed</div>
          </div>
          <div class="ops-summary-card">
            <div class="label">Today's Activity</div>
            <div class="value">${todaysCols.length}</div>
            <div class="muted">${fmtNum(todaysQty)} seedlings collected</div>
          </div>
        </div>

        <div class="ops-section">
          <h3>All batches</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Batch #</th>
                  <th>Variety</th>
                  <th>Stage</th>
                  <th style="text-align:right;">Total Planted</th>
                  <th style="text-align:right;">Booked</th>
                  <th style="text-align:right;">Balance (less booking)</th>
                  <th style="text-align:right;">Actual Balance</th>
                </tr>
              </thead>
              <tbody>${batchRows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // === Customers tab (Task 3.2) ===
    let opsCustomerSearchTerm = '';
    let selectedCustomerId = null;
    let opscPhoneIti = null;

    function renderCustomersTab() {
      // If a customer is selected, show their detail page instead of the list
      if (selectedCustomerId) {
        opsRenderCustomerDetail();
        return;
      }

      // Compute aggregates per customer from in-memory state
      const bookedByCust = {};
      const owedByCust = {};
      const hasActiveBooking = {};
      bookings.forEach(b => {
        const cid = b.customer_id;
        bookedByCust[cid] = (bookedByCust[cid] || 0) + Number(b.booked_qty || 0);
        // Outstanding: across active+cancelled bookings, sum (total_amount - total_paid)
        // (Walk-ins have no booking row → not counted here.)
        if (b.status === 'active' || b.status === 'cancelled') {
          const paid = paymentsByBooking[b.id] || 0;
          const owed = Math.max(0, Number(b.total_amount || 0) - paid);
          owedByCust[cid] = (owedByCust[cid] || 0) + owed;
          if (b.status === 'active') hasActiveBooking[cid] = true;
        }
      });

      const collectedByCust = {};
      collections.forEach(c => {
        const cid = c.customer_id;
        collectedByCust[cid] = (collectedByCust[cid] || 0) + Number(c.qty || 0);
      });

      // Filter by search term — match on name OR phone digits
      const term = (opsCustomerSearchTerm || '').trim().toLowerCase();
      const termDigits = phoneDigitsOnly(term).replace(/^0+/, '');
      const filtered = customers.filter(c => {
        if (!term) return true;
        const nameMatch = (c.name || '').toLowerCase().includes(term);
        const phoneStored = phoneDigitsOnly(c.phone || '').replace(/^0+/, '');
        const phoneMatch = termDigits && phoneStored.includes(termDigits);
        return nameMatch || phoneMatch;
      });

      const tbody = filtered.map((c, i) => {
        const booked = bookedByCust[c.id] || 0;
        const collected = collectedByCust[c.id] || 0;
        const owed = owedByCust[c.id] || 0;
        const owedClass = owed > 0
          ? (hasActiveBooking[c.id] ? 'style="color:var(--red);font-weight:600;"' : 'style="color:#8A6D1F;font-weight:600;"')
          : 'style="color:var(--text-muted);"';
        const typeBadge = c.customer_type === 'walkin'
          ? '<span class="ops-status-badge ops-status-walkin">Walk-in</span>'
          : '<span class="ops-status-badge ops-status-active">Booking</span>';
        const idNo = c.entity_type === 'company' ? (c.company_number || '—') : (c.ic_number || '—');
        const addrLines = opsFormatCustomerAddress(c);
        const addrCell = addrLines.length ? esc(addrLines.join(', ')) : '—';
        return `
          <tr>
            <td>${i + 1}</td>
            <td><a href="javascript:void(0)" onclick="opsOpenCustomerDetail('${c.id}')" style="color:#6B4C8A;font-weight:600;text-decoration:none;">${esc(c.name)}</a>${opsEntityChip(c)}</td>
            <td>${typeBadge}</td>
            <td>${c.phone ? esc(fmtPhone(c.phone)) : '<span class="muted">—</span>'}</td>
            <td>${esc(idNo)}</td>
            <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(addrLines.join(', '))}">${addrCell}</td>
            <td style="text-align:right;">${booked.toLocaleString()}</td>
            <td style="text-align:right;">${collected.toLocaleString()}</td>
            <td style="text-align:right;" ${owedClass}>${formatRM(owed)}</td>
            <td>${c.is_active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
            <td class="actions">
              <button class="btn-tiny" onclick="opsOpenCustomerModal('${c.id}')">Edit</button>
              <button class="btn-tiny ${c.is_active ? 'danger' : ''}" onclick="opsToggleCustomer('${c.id}', ${!c.is_active})">${c.is_active ? 'Deactivate' : 'Activate'}</button>
            </td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text-muted);">No customers' + (term ? ' match this search.' : ' yet.') + '</td></tr>';

      document.getElementById('tab-customers').innerHTML = `
        <div class="page-header">
          <h2>Customers</h2>
          <button class="btn btn-primary" onclick="opsOpenCustomerModal()">+ Add Customer</button>
        </div>
        <div class="filters-bar">
          <input type="text" id="ops-cust-search" placeholder="Search name or phone..." value="${esc(opsCustomerSearchTerm)}" oninput="opsCustSearchInput(this.value)" style="min-width:240px;" />
          ${term ? `<button class="btn-tiny" onclick="opsCustSearchInput('')">Clear</button>` : ''}
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Type</th>
                <th>Phone</th>
                <th>ID No</th>
                <th>Address</th>
                <th style="text-align:right;">Total Booked</th>
                <th style="text-align:right;">Total Collected</th>
                <th style="text-align:right;">Outstanding</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      `;

      // Restore focus + caret to the search box if user is typing
      const searchEl = document.getElementById('ops-cust-search');
      if (searchEl && document.activeElement && document.activeElement.id !== 'ops-cust-search' && term) {
        // no-op: don't steal focus; only re-apply if we were typing in it
      }
    }

    function opsCustSearchInput(val) {
      opsCustomerSearchTerm = val || '';
      renderCustomersTab();
      // Re-focus the input + put cursor at end (renderCustomersTab destroyed the DOM)
      const el = document.getElementById('ops-cust-search');
      if (el) {
        el.focus();
        const len = el.value.length;
        try { el.setSelectionRange(len, len); } catch (e) {}
      }
    }

    // ----- Add / Edit modal -----
    function opsOpenCustomerModal(id) {
      const c = id
        ? customers.find(x => x.id === id)
        : { name: '', customer_type: 'booking', entity_type: 'individual' };
      if (id && !c) { notify('Customer not found', 'error'); return; }

      showModal(`
        <h3>${id ? 'Edit' : 'Add'} Customer</h3>
        ${opsRenderCustomerFieldsHtml('oc-', c, { includeNotes: true })}
        <div class="form-grid" style="margin-top:6px;">
          <label>Customer Type
            <select id="oc-cust-type">
              <option value="booking" ${c.customer_type === 'walkin' ? '' : 'selected'}>Booking</option>
              <option value="walkin" ${c.customer_type === 'walkin' ? 'selected' : ''}>Walk-in</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-cust-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opsSaveCustomer('${id || ''}')">Save</button>
        </div>
      `, 'ops-cust-overlay');

      // Bind intl-tel-input AFTER showModal injected the input into the DOM
      opsInitPhoneInput();
      if (id && c.phone) opsSetItiNumber(opscPhoneIti, c.phone);
    }

    function opsInitPhoneInput() {
      const input = document.getElementById('oc-phone');
      if (!input || !window.intlTelInput) { opscPhoneIti = null; return; }
      opscPhoneIti = window.intlTelInput(input, {
        initialCountry: 'my',
        preferredCountries: ['my', 'sg', 'bn', 'id', 'th']
      });
    }

    function opsSetItiNumber(iti, value) {
      if (!iti || !value) return;
      try { iti.setNumber(value); } catch (e) {
        const el = document.getElementById('oc-phone');
        if (el) el.value = value;
      }
    }

    function opsReadPhone(iti) {
      if (!iti) {
        // CDN didn't load — fall back to raw input
        const el = document.getElementById('oc-phone');
        return { value: el ? el.value.trim() : '', error: null };
      }
      const raw = iti.getNumber ? iti.getNumber() : '';
      if (!raw) {
        // Empty input is allowed (phone is optional)
        const fallback = (document.getElementById('oc-phone').value || '').trim();
        return { value: fallback, error: null };
      }
      if (typeof iti.isValidNumber === 'function') {
        if (iti.isValidNumber()) return { value: raw, error: null };
        return { value: '', error: 'Invalid phone number' };
      }
      return { value: raw, error: null };
    }

    async function opsSaveCustomer(id) {
      const fields = opsReadCustomerFields('oc-', { includeNotes: true });
      if (fields._error) { notify(fields._error, 'error'); return; }

      const phoneRead = opsReadPhone(opscPhoneIti);
      if (phoneRead.error) { notify(phoneRead.error, 'error'); return; }

      const data = {
        name: fields.name,
        entity_type: fields.entity_type,
        customer_type: (document.getElementById('oc-cust-type') || {}).value || 'booking',
        contact_person: fields.contact_person,
        ic_number: fields.ic_number,
        company_number: fields.company_number,
        phone: phoneRead.value || null,
        address_street1: fields.address_street1,
        address_street2: fields.address_street2,
        address_postcode: fields.address_postcode,
        address_district: fields.address_district,
        address_state: fields.address_state,
        notes: fields.notes
      };
      // If user filled any new address field on a legacy-address record, clear the legacy
      // column so future reads see the new fields as source of truth.
      const filledNewAddr = !!(data.address_street1 || data.address_street2 || data.address_postcode || data.address_district || data.address_state);
      if (filledNewAddr) data.address = null;

      if (id) {
        const result = await sbMutate(() => sb.from('oilpalm_customers').update(data).eq('id', id).select());
        if (result === null) return;
      } else {
        const newId = await dbNextId('OC');
        if (!newId) { notify('Failed to generate ID', 'error'); return; }
        const insertData = Object.assign({}, data, { id: newId, company_id: getCompanyId() });
        const result = await sbMutate(() => sb.from('oilpalm_customers').insert(insertData).select());
        if (result === null) return;
      }

      await loadCustomers();
      closeModal('ops-cust-overlay');
      opscPhoneIti = null;
      renderCustomersTab();
      notify(id ? 'Customer updated' : 'Customer added', 'success');
    }

    async function opsToggleCustomer(id, makeActive) {
      const result = await sbMutate(() => sb.from('oilpalm_customers').update({ is_active: makeActive }).eq('id', id).select());
      if (result === null) return;
      await loadCustomers();
      renderCustomersTab();
      notify(makeActive ? 'Customer activated' : 'Customer deactivated', 'success');
    }

    // ----- Customer detail page (mini) -----
    function opsOpenCustomerDetail(id) {
      selectedCustomerId = id;
      renderCustomersTab();
    }

    function opsCloseCustomerDetail() {
      selectedCustomerId = null;
      renderCustomersTab();
    }

    function opsRenderCustomerDetail() {
      const c = customers.find(x => x.id === selectedCustomerId);
      if (!c) {
        // Customer was deleted/missing — bail back to list
        selectedCustomerId = null;
        renderCustomersTab();
        return;
      }

      const myBookings = bookings.filter(b => b.customer_id === c.id);
      const myCollections = collections.filter(co => co.customer_id === c.id);
      const myPayments = payments.filter(p => {
        if (p.booking_id) return myBookings.some(b => b.id === p.booking_id);
        if (p.collection_id) return myCollections.some(co => co.id === p.collection_id);
        return false;
      });

      const totalBooked = myBookings.reduce((s, b) => s + Number(b.booked_qty || 0), 0);
      const totalCollected = myCollections.reduce((s, co) => s + Number(co.qty || 0), 0);
      const totalOwed = myBookings
        .filter(b => b.status === 'active' || b.status === 'cancelled')
        .reduce((s, b) => {
          const paid = paymentsByBooking[b.id] || 0;
          return s + Math.max(0, Number(b.total_amount || 0) - paid);
        }, 0);

      const batchLabel = (bid) => {
        const b = batches.find(x => x.id === bid);
        return b ? esc(b.batch_number || b.id) : '<span class="muted">—</span>';
      };

      const bookingsRows = myBookings.map(b => {
        const paid = paymentsByBooking[b.id] || 0;
        const balance = Math.max(0, Number(b.total_amount || 0) - paid);
        const statusCls = ({
          active: 'ops-status-active',
          completed: 'ops-status-completed',
          cancelled: 'ops-status-cancelled'
        })[b.status] || 'ops-status-active';
        return `
          <tr>
            <td>${esc(b.id)}</td>
            <td>${batchLabel(b.batch_id)}</td>
            <td style="text-align:right;">${Number(b.booked_qty || 0).toLocaleString()}</td>
            <td style="text-align:right;">${formatRM(b.total_amount || 0)}</td>
            <td style="text-align:right;">${formatRM(paid)}</td>
            <td style="text-align:right;${balance > 0 ? 'color:var(--red);font-weight:600;' : ''}">${formatRM(balance)}</td>
            <td><span class="ops-status-badge ${statusCls}">${esc(b.status || '')}</span></td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="7" style="text-align:center;padding:14px;color:var(--text-muted);">No bookings.</td></tr>';

      const collectionsRows = myCollections.map(co => `
        <tr>
          <td>${fmtDate(co.collection_date)}</td>
          <td>${esc(co.l3_form_no || '—')}</td>
          <td>${batchLabel(co.batch_id)}</td>
          <td style="text-align:right;">${Number(co.qty || 0).toLocaleString()}</td>
          <td>${co.booking_id ? '<span class="ops-status-badge ops-status-active">Booking</span>' : '<span class="ops-status-badge ops-status-walkin">Walk-in</span>'}</td>
        </tr>
      `).join('') || '<tr><td colspan="5" style="text-align:center;padding:14px;color:var(--text-muted);">No collections.</td></tr>';

      const paymentsRows = myPayments.map(p => `
        <tr>
          <td>${fmtDate(p.payment_date)}</td>
          <td style="text-align:right;">${formatRM(p.amount || 0)}</td>
          <td>${esc(p.method || '—')}</td>
          <td>${esc(p.reference || '—')}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" style="text-align:center;padding:14px;color:var(--text-muted);">No payments.</td></tr>';

      document.getElementById('tab-customers').innerHTML = `
        <div class="page-header">
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn btn-outline" onclick="opsCloseCustomerDetail()">← Back</button>
            <h2 style="margin:0;">${esc(c.name)}${opsEntityChip(c)}</h2>
            ${c.is_active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}
          </div>
          <button class="btn btn-primary" onclick="opsOpenCustomerModal('${c.id}')">Edit Customer</button>
        </div>

        <div class="ops-section">
          <h3>Customer Info</h3>
          <div class="form-grid">
            ${(() => {
              const isComp = c.entity_type === 'company';
              const addrLines = opsFormatCustomerAddress(c);
              const addrHtml = addrLines.length ? addrLines.map(l => esc(l)).join('<br>') : '—';
              if (isComp) {
                return `
                  <div><strong>Type:</strong> ${c.customer_type === 'walkin' ? 'Walk-in' : 'Booking'}</div>
                  <div><strong>Phone:</strong> ${c.phone ? esc(fmtPhone(c.phone)) : '—'}</div>
                  <div><strong>Contact Person:</strong> ${esc(c.contact_person || '—')}</div>
                  <div><strong>Company No.:</strong> ${esc(c.company_number || '—')}</div>
                  <div><strong>Status:</strong> ${c.is_active ? 'Active' : 'Inactive'}</div>
                  <div class="full"><strong>Address:</strong> ${addrHtml}</div>
                  <div class="full"><strong>Notes:</strong> ${esc(c.notes || '—')}</div>`;
              }
              return `
                <div><strong>Type:</strong> ${c.customer_type === 'walkin' ? 'Walk-in' : 'Booking'}</div>
                <div><strong>Phone:</strong> ${c.phone ? esc(fmtPhone(c.phone)) : '—'}</div>
                <div><strong>Contact:</strong> ${esc(c.contact_person || '—')}</div>
                <div><strong>IC No:</strong> ${esc(c.ic_number || '—')}</div>
                <div><strong>Status:</strong> ${c.is_active ? 'Active' : 'Inactive'}</div>
                <div class="full"><strong>Address:</strong> ${addrHtml}</div>
                <div class="full"><strong>Notes:</strong> ${esc(c.notes || '—')}</div>`;
            })()}
          </div>
        </div>

        <div class="ops-section">
          <h3>Aggregates</h3>
          <div style="display:flex;gap:14px;flex-wrap:wrap;">
            <div class="ops-summary-card">
              <div class="label">Total Booked</div>
              <div class="value">${totalBooked.toLocaleString()}</div>
              <div class="muted">across ${myBookings.length} booking${myBookings.length === 1 ? '' : 's'}</div>
            </div>
            <div class="ops-summary-card">
              <div class="label">Total Collected</div>
              <div class="value">${totalCollected.toLocaleString()}</div>
              <div class="muted">across ${myCollections.length} collection${myCollections.length === 1 ? '' : 's'}</div>
            </div>
            <div class="ops-summary-card">
              <div class="label">Outstanding</div>
              <div class="value" style="${totalOwed > 0 ? 'color:var(--red);' : 'color:var(--text-muted);'}">${formatRM(totalOwed)}</div>
              <div class="muted">unpaid balance</div>
            </div>
          </div>
        </div>

        <div class="ops-section">
          <h3>Bookings</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Batch</th>
                  <th style="text-align:right;">Qty</th>
                  <th style="text-align:right;">Total</th>
                  <th style="text-align:right;">Paid</th>
                  <th style="text-align:right;">Balance</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>${bookingsRows}</tbody>
            </table>
          </div>
        </div>

        <div class="ops-section">
          <h3>Collections</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>L3.1 #</th>
                  <th>Batch</th>
                  <th style="text-align:right;">Qty</th>
                  <th>Type</th>
                </tr>
              </thead>
              <tbody>${collectionsRows}</tbody>
            </table>
          </div>
        </div>

        <div class="ops-section">
          <h3>Payments</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th style="text-align:right;">Amount</th>
                  <th>Method</th>
                  <th>Reference</th>
                </tr>
              </thead>
              <tbody>${paymentsRows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // === Modal helper (module-local) ===
    // shared.js exposes openModal(id)/closeModal(id) for pre-defined modal HTML, but the
    // sales module uses dynamic modal HTML. We inject into #modal-host wrapped in the
    // standard .modal-overlay/.modal-box structure so shared CSS applies, and reuse
    // closeModal(overlayId) so focus-trap teardown still runs.
    // Optional overlayId arg lets distinct modals coexist (default: 'ops-modal-overlay').
    function showModal(innerHtml, overlayId) {
      const id = overlayId || 'ops-modal-overlay';
      const host = document.getElementById('modal-host');
      host.innerHTML = `
        <div id="${id}" class="modal-overlay" style="display:flex;">
          <div class="modal-box" style="max-width:520px;">
            ${innerHtml}
          </div>
        </div>
      `;
      // openModal handles focus-trap + display
      if (typeof openModal === 'function') openModal(id);
    }
  </script>
</body>
</html>
