<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/logo-agribusiness.png">
  <title>Oil Palm Sales — TG FarmHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css?v=2" />
  <link rel="stylesheet" href="oilpalmsales.css?v=1" />
  <!-- intl-tel-input — combined bundle (NOT plain min + separate utils.js). The split utils
       loads as ES module on v23 and silently fails — see CLAUDE.md 2026-05-01 entry. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.7/build/css/intlTelInput.css" />
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.7/build/js/intlTelInputWithUtils.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="shared.js?v=2"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;">
        <div class="sidebar-logo"><img src="assets/logo-agribusiness.png" alt="TG"></div>
        <div>
          <div class="sidebar-brand-text">Oil Palm Sales</div>
          <div style="font-size:10px;color:var(--text-muted);">&lt; TG FarmHub</div>
        </div>
      </a>
    </div>
    <div id="company-switcher"></div>
    <nav class="sidebar-nav" aria-label="Module navigation">
      <div class="nav-item active" data-page="summary" onclick="switchTab('summary')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">Summary</span>
      </div>
      <div class="nav-item" data-page="bookings" onclick="switchTab('bookings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="nav-label">Bookings</span>
      </div>
      <div class="nav-item" data-page="collections" onclick="switchTab('collections')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Collections</span>
      </div>
      <div class="nav-item" data-page="customers" onclick="switchTab('customers')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-label">Customers</span>
      </div>
      <div class="nav-item" data-page="reports" onclick="switchTab('reports')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Reports</span>
      </div>
    </nav>
    <div id="sidebar-user" style="padding:8px 16px;border-top:1px solid var(--border);margin-top:auto;">
      <div id="sidebar-user-info" style="display:flex;align-items:center;gap:8px;padding:6px 0 8px;font-size:12px;color:var(--text-muted);">
        <span id="sidebar-user-name"></span>
      </div>
      <button onclick="location.href='index.html'" class="btn btn-outline" style="width:100%;justify-content:center;padding:6px 0;font-size:11px;gap:4px;margin-bottom:4px;">← Back to Hub</button>
      <button onclick="doLogout()" class="btn btn-outline" style="width:100%;justify-content:center;padding:6px 0;font-size:11px;gap:4px;color:var(--red);border-color:var(--red);">Logout</button>
    </div>
  </div>

  <main id="main-content" role="main" class="main-content">
    <div id="tab-summary"     class="page active"></div>
    <div id="tab-bookings"    class="page"></div>
    <div id="tab-collections" class="page"></div>
    <div id="tab-customers"   class="page"></div>
    <div id="tab-reports"     class="page"></div>
  </main>
  </div><!-- /#app -->

  <div id="modal-host"></div>

  <script>
    // Supabase client (sb) is provided by shared.js as a global.
    // Do NOT re-declare SUPABASE_URL/SUPABASE_KEY here — that throws a SyntaxError
    // and halts the entire inline script (functions never get defined).

    // === State ===
    let currentUser = null;
    let currentTab = 'summary';
    let customers = [];
    let bookings = [];
    let collections = [];
    let payments = [];           // both booking-tied + collection-tied (walk-in)
    let batches = [];            // read-only (created by Growth module)
    let varieties = [];          // for display only
    let suppliers = [];          // for batch-row supplier-name lookups (e.g. on booking detail)
    let paymentsByBooking = {};  // {booking_id: total_paid}

    // Bookings tab filter state (Task 3.4)
    let bookingsFilter = { status: 'all', customer: '', batch: 'all' };

    // Collections tab filter state (Task 3.10) — default last 90 days.
    const _ops_today_iso = new Date().toISOString().slice(0, 10);
    const _ops_ago90_iso = new Date(Date.now() - 90 * 86400000).toISOString().slice(0, 10);
    let collectionsFilter = { from: _ops_ago90_iso, to: _ops_today_iso, batch: 'all', type: 'all', customer: '' };

    // Selected booking for the detail page (Task 3.6). null = list view.
    let selectedBookingId = null;

    // === Init ===
    document.addEventListener('DOMContentLoaded', async () => {
      // Session guard — match the codebase pattern (shared.js does NOT export ensureSession/currentUser)
      const userData = localStorage.getItem('tgfarmhub_user');
      if (!userData) { location.href = 'index.html'; return; }
      try { currentUser = JSON.parse(userData); } catch (e) { location.href = 'index.html'; return; }

      // Force company to Agribusiness for this module
      setCompanyId('tg_agribusiness');

      // Inject company switcher (redirect to hub if Agro Fruits selected)
      if (typeof injectCompanySwitcher === 'function') {
        injectCompanySwitcher();
        document.querySelectorAll('.company-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var cid = btn.getAttribute('data-company');
            if (cid !== 'tg_agribusiness') {
              setCompanyId(cid);
              location.href = 'index.html';
            }
          });
        });
      }

      // Inject user badge / start inactivity timer (graceful no-op if helpers absent)
      if (typeof injectUserBadge === 'function') injectUserBadge(currentUser);
      if (typeof startInactivityTimer === 'function') startInactivityTimer();

      const nameEl = document.getElementById('sidebar-user-name');
      if (nameEl) nameEl.textContent = currentUser.displayName || currentUser.username || currentUser.name || '';

      await Promise.all([
        loadCustomers(),
        loadBookings(),
        loadCollections(),
        loadPayments(),
        loadBatches(),
        loadVarieties(),
        loadSuppliers()
      ]);
      renderSummaryTab();
    });

    function doLogout() {
      try { localStorage.removeItem('tgfarmhub_user'); } catch (e) {}
      try { localStorage.removeItem('tg_session'); } catch (e) {}
      location.href = 'index.html';
    }

    function switchTab(name) {
      currentTab = name;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === name));
      document.querySelectorAll('.main-content > .page').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
      if (name === 'summary')     renderSummaryTab();
      if (name === 'bookings')    renderBookingsTab();
      if (name === 'collections') renderCollectionsTab();
      if (name === 'customers')   renderCustomersTab();
      if (name === 'reports')     renderReportsTab();
    }

    // === Loaders ===
    async function loadCustomers() {
      const data = await sbQuery(sb.from('oilpalm_customers').select('*').eq('company_id', getCompanyId()).order('name'));
      customers = data || [];
    }

    async function loadBookings() {
      const data = await sbQuery(sb.from('oilpalm_bookings').select('*').eq('company_id', getCompanyId()).order('created_at', { ascending: false }));
      bookings = data || [];
    }

    async function loadCollections() {
      const data = await sbQuery(sb.from('oilpalm_collections').select('*').eq('company_id', getCompanyId()).order('collection_date', { ascending: false }));
      collections = data || [];
    }

    async function loadPayments() {
      // oilpalm_payments has NO company_id column — DO NOT add the filter
      // (would PostgREST 400 → swallowed by sbQuery → silent empty result; see CLAUDE.md
      //  2026-05-05 pay-rate modal silent-skip lesson on tables without company_id.)
      const data = await sbQuery(sb.from('oilpalm_payments').select('*'));
      payments = data || [];
      paymentsByBooking = {};
      payments.filter(p => p.booking_id).forEach(p => {
        paymentsByBooking[p.booking_id] = (paymentsByBooking[p.booking_id] || 0) + Number(p.amount || 0);
      });
    }

    async function loadBatches() {
      // Read-only here — Growth module owns batch lifecycle. Pull every column we
      // might need (qty_mn_start, qty_planted, default_price, bookable_pct, status...)
      // so booking-side Available math works without joins.
      const data = await sbQuery(sb.from('oilpalm_batches').select('*').eq('company_id', getCompanyId()).order('created_at', { ascending: false }));
      batches = data || [];
    }

    async function loadVarieties() {
      // crop_varieties is shared. Filter by oil palm crop.
      const crops = await sbQuery(sb.from('crops').select('id,name'));
      const oilPalm = (crops || []).find(c => /oil\s*palm/i.test(c.name));
      if (!oilPalm) { varieties = []; return; }
      const data = await sbQuery(sb.from('crop_varieties').select('id,name,crop_id').eq('crop_id', oilPalm.id).order('name'));
      varieties = data || [];
    }

    async function loadSuppliers() {
      // For supplier-name lookups on batch rows shown in booking detail.
      const data = await sbQuery(sb.from('oilpalm_suppliers').select('*').eq('company_id', getCompanyId()).order('name'));
      suppliers = data || [];
    }

    // === Helpers ===
    // Add m months to a date (ISO date or string in, ISO date YYYY-MM-DD out).
    // Copied verbatim from oilpalmgrowth.html so Sales can compute Ready Date
    // (planting + 10 months) without depending on Growth being loaded.
    function addMonths(d, m) {
      if (!d) return null;
      const x = new Date(d);
      x.setMonth(x.getMonth() + m);
      return x.toISOString().slice(0, 10);
    }

    // === Walk-in Sale modal (Task 3.9) ===
    // One-shot: customer + collection + payment in a single save. NO booking row.
    let opscWalkinPhoneIti = null;

    function opsOpenWalkInModal() {
      // Walk-ins collect immediately from selling-stage stock only.
      const sellingBatches = batches.filter(b => b.status === 'selling');
      const varietyMap = Object.fromEntries(varieties.map(v => [v.id, v.name]));

      const batchOpts = sellingBatches.map(b => {
        const vname = varietyMap[b.variety_id] || '—';
        return `<option value="${esc(b.id)}"
          data-price="${Number(b.default_price || 0)}">${esc(b.batch_number || b.id)} · ${esc(vname)}</option>`;
      }).join('');

      const today = new Date().toISOString().slice(0, 10);

      showModal(`
        <h3>+ New Walk-in Sale</h3>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">Walk-ins pay full amount at counter. No booking row is created.</div>

        <div class="form-grid">
          <!-- Section A — Customer details -->
          <label class="full" style="font-weight:700;color:var(--text);font-size:13px;">Customer Details</label>
          <label class="full">Name <input id="ops-wi-name" /></label>
          <label>Contact Person <input id="ops-wi-contact" /></label>
          <label>Phone <input id="ops-wi-phone" type="tel" /></label>
          <label class="full">Address <textarea id="ops-wi-address" rows="2"></textarea></label>

          <!-- Section B — Collection details -->
          <label class="full" style="font-weight:700;color:var(--text);font-size:13px;margin-top:8px;">Collection Details</label>
          <label class="full">Batch (Selling stage)
            <select id="ops-wi-batch" onchange="opsWiBatchChanged()">
              <option value="">— select —</option>
              ${batchOpts}
            </select>
          </label>
          <label>Quantity <input id="ops-wi-qty" type="number" min="1" step="1" oninput="opsWiRecalc()" /></label>
          <label>Unit Price (RM) <input id="ops-wi-price" type="number" step="0.01" min="0" oninput="opsWiRecalc()" /></label>
          <label class="full">Total Amount (RM) <input id="ops-wi-total" readonly value="0.00" /></label>
          <label class="full">L3.1 Form # <input id="ops-wi-l3" placeholder="From physical MPOB booklet" /></label>
          <label class="full">L3.1 Photo (required) <input type="file" id="ops-wi-l3-photo" accept="image/*,application/pdf" /></label>
          <label class="full">Collection Photo (required) <input type="file" id="ops-wi-coll-photo" accept="image/*" /></label>
          <label>Car Plate # <input id="ops-wi-plate" /></label>
          <label>Date <input id="ops-wi-date" type="date" value="${today}" /></label>

          <!-- Section C — Payment (mandatory full payment) -->
          <label class="full" style="font-weight:700;color:var(--text);font-size:13px;margin-top:8px;">Payment (full amount at counter)</label>
          <label>Amount (RM) <input id="ops-wi-pay-amt" type="number" step="0.01" min="0.01" /></label>
          <label>Method
            <select id="ops-wi-pay-method">
              <option value="cash">Cash</option>
              <option value="bank">Bank Transfer</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
          <label>Reference <input id="ops-wi-pay-ref" /></label>
          <label class="full">Slip (optional) <input type="file" id="ops-wi-pay-slip" accept="image/*,application/pdf" /></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="opsCloseWalkInModal()">Cancel</button>
          <button class="btn btn-primary" onclick="opsSaveWalkIn()">Save Walk-in Sale</button>
        </div>
      `, 'ops-walkin-overlay');

      // Lazy-init intl-tel-input on the phone field
      opsInitWalkinPhoneInput();
    }

    function opsCloseWalkInModal() {
      try { if (opscWalkinPhoneIti && opscWalkinPhoneIti.destroy) opscWalkinPhoneIti.destroy(); } catch (e) {}
      opscWalkinPhoneIti = null;
      closeModal('ops-walkin-overlay');
    }

    function opsInitWalkinPhoneInput() {
      const input = document.getElementById('ops-wi-phone');
      if (!input || !window.intlTelInput) { opscWalkinPhoneIti = null; return; }
      opscWalkinPhoneIti = window.intlTelInput(input, {
        initialCountry: 'my',
        preferredCountries: ['my', 'sg', 'bn', 'id', 'th']
      });
    }

    function opsWiReadPhone() {
      if (!opscWalkinPhoneIti) {
        const el = document.getElementById('ops-wi-phone');
        return { value: el ? el.value.trim() : '', error: null };
      }
      const raw = opscWalkinPhoneIti.getNumber ? opscWalkinPhoneIti.getNumber() : '';
      if (!raw) {
        const fallback = (document.getElementById('ops-wi-phone').value || '').trim();
        return { value: fallback, error: null };
      }
      if (typeof opscWalkinPhoneIti.isValidNumber === 'function') {
        if (opscWalkinPhoneIti.isValidNumber()) return { value: raw, error: null };
        return { value: '', error: 'Invalid phone number' };
      }
      return { value: raw, error: null };
    }

    function opsWiBatchChanged() {
      const sel = document.getElementById('ops-wi-batch');
      const opt = sel.options[sel.selectedIndex];
      const price = opt ? (parseFloat(opt.dataset.price) || 0) : 0;
      const priceEl = document.getElementById('ops-wi-price');
      if (priceEl) priceEl.value = price > 0 ? price.toFixed(2) : '';
      opsWiRecalc();
    }

    function opsWiRecalc() {
      const qty   = parseFloat(document.getElementById('ops-wi-qty').value) || 0;
      const price = parseFloat(document.getElementById('ops-wi-price').value) || 0;
      const total = qty * price;
      document.getElementById('ops-wi-total').value = total.toFixed(2);
      // Auto-fill payment amount to match total (allow override)
      const payEl = document.getElementById('ops-wi-pay-amt');
      if (payEl) payEl.value = total > 0 ? total.toFixed(2) : '';
    }

    async function opsSaveWalkIn() {
      // === Read all fields ===
      const name        = (document.getElementById('ops-wi-name').value || '').trim();
      const contact     = (document.getElementById('ops-wi-contact').value || '').trim();
      const address     = (document.getElementById('ops-wi-address').value || '').trim();
      const batchId     = (document.getElementById('ops-wi-batch').value || '').trim();
      const qty         = parseInt(document.getElementById('ops-wi-qty').value, 10);
      const price       = parseFloat(document.getElementById('ops-wi-price').value);
      const total       = parseFloat(document.getElementById('ops-wi-total').value);
      const l3          = (document.getElementById('ops-wi-l3').value || '').trim();
      const plate       = (document.getElementById('ops-wi-plate').value || '').trim();
      const dateVal     = (document.getElementById('ops-wi-date').value || '').trim();

      const l3PhotoEl   = document.getElementById('ops-wi-l3-photo');
      const collPhotoEl = document.getElementById('ops-wi-coll-photo');
      const l3PhotoFile   = l3PhotoEl   && l3PhotoEl.files   && l3PhotoEl.files[0]   ? l3PhotoEl.files[0]   : null;
      const collPhotoFile = collPhotoEl && collPhotoEl.files && collPhotoEl.files[0] ? collPhotoEl.files[0] : null;

      const payAmt    = parseFloat(document.getElementById('ops-wi-pay-amt').value);
      const payMethod = document.getElementById('ops-wi-pay-method').value || 'cash';
      const payRef    = (document.getElementById('ops-wi-pay-ref').value || '').trim();
      const paySlipEl = document.getElementById('ops-wi-pay-slip');
      const paySlipFile = paySlipEl && paySlipEl.files && paySlipEl.files[0] ? paySlipEl.files[0] : null;

      // === Validation ===
      if (!name)              { notify('Customer name is required', 'error'); return; }
      if (!batchId)           { notify('Batch is required', 'error'); return; }
      if (!qty || qty < 1)    { notify('Quantity must be at least 1', 'error'); return; }
      if (!price || price <= 0) { notify('Unit price must be > 0', 'error'); return; }
      if (!isFinite(total) || total <= 0) { notify('Total amount invalid', 'error'); return; }
      if (!l3)                { notify('L3.1 Form # is required', 'error'); return; }
      if (!l3PhotoFile)       { notify('L3.1 photo required', 'error'); return; }
      if (!collPhotoFile)     { notify('Collection photo required', 'error'); return; }
      if (!plate)             { notify('Car Plate # is required', 'error'); return; }
      if (!dateVal)           { notify('Date is required', 'error'); return; }
      if (!isFinite(payAmt) || payAmt <= 0) { notify('Payment amount must be > 0', 'error'); return; }
      if (payAmt + 0.005 < total) {
        notify('Walk-in sale requires full payment (RM ' + total.toFixed(2) + '). Add more or use a booking instead.', 'error');
        return;
      }

      const phoneRead = opsWiReadPhone();
      if (phoneRead.error) { notify(phoneRead.error, 'error'); return; }
      const phoneVal = phoneRead.value || '';

      // Re-check batch is still selling (race window)
      const batch = batches.find(b => b.id === batchId);
      if (!batch || batch.status !== 'selling') {
        notify('Batch must be in Selling stage to collect', 'error');
        return;
      }

      // === Step 2: L3.1 dup check ===
      const dupCheck = await sbQuery(sb.from('oilpalm_collections').select('id,l3_form_no').eq('l3_form_no', l3));
      if (dupCheck && dupCheck.length > 0) {
        notify('L3.1 #' + l3 + ' was already used. Cannot reuse.', 'error');
        return;
      }

      // === Step 3: Find or create customer ===
      // Dedup by canonical phone if phone provided
      let customerId = null;
      const phoneCanon = phoneVal ? phoneCanonical(phoneVal) : '';
      if (phoneCanon) {
        const existing = customers.find(c => phoneCanonical(c.phone || '') === phoneCanon);
        if (existing) customerId = existing.id;
      }

      if (!customerId) {
        const newCustId = await dbNextId('OC');
        if (!newCustId) { notify('Failed to generate customer ID', 'error'); return; }
        const custInsert = {
          id: newCustId,
          company_id: getCompanyId(),
          name,
          contact_person: contact || null,
          phone: phoneVal || null,
          address: address || null,
          customer_type: 'walkin',
          is_active: true
        };
        const custResult = await sbMutate(sb.from('oilpalm_customers').insert(custInsert).select());
        if (custResult === null) { notify('Customer insert failed — sale NOT recorded', 'error'); return; }
        customerId = newCustId;
      }

      // === Step 4: Generate collection ID ===
      const collectionId = await dbNextId('OL');
      if (!collectionId) { notify('Failed to generate collection ID', 'error'); return; }

      // === Step 5: Upload BOTH photos (mandatory — abort if either fails) ===
      let l3Url = null;
      try {
        const ext = l3PhotoFile.name.split('.').pop();
        const path = `collections/${collectionId}/l3.${ext}`;
        const up = await sb.storage.from('oilpalm-photos').upload(path, l3PhotoFile, { upsert: true, contentType: l3PhotoFile.type });
        if (up.error) {
          console.warn('[ops-walkin] L3.1 photo upload failed:', up.error.message);
          notify('L3.1 photo upload failed: ' + up.error.message, 'error');
          return;
        }
        l3Url = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      } catch (e) {
        console.warn('[ops-walkin] L3.1 photo upload threw:', e);
        notify('L3.1 photo upload error — sale NOT recorded', 'error');
        return;
      }

      let collUrl = null;
      try {
        const ext = collPhotoFile.name.split('.').pop();
        const path = `collections/${collectionId}/seedlings.${ext}`;
        const up = await sb.storage.from('oilpalm-photos').upload(path, collPhotoFile, { upsert: true, contentType: collPhotoFile.type });
        if (up.error) {
          console.warn('[ops-walkin] collection photo upload failed:', up.error.message);
          notify('Collection photo upload failed: ' + up.error.message, 'error');
          return;
        }
        collUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      } catch (e) {
        console.warn('[ops-walkin] collection photo upload threw:', e);
        notify('Collection photo upload error — sale NOT recorded', 'error');
        return;
      }

      // === Step 6: Generate payment ID ===
      const payId = await dbNextId('OP');
      if (!payId) { notify('Failed to generate payment ID — sale NOT recorded', 'error'); return; }

      // === Step 7: Upload payment slip (optional, non-fatal) ===
      let paySlipUrl = null;
      if (paySlipFile) {
        const ext = paySlipFile.name.split('.').pop();
        const path = `payments/walkin/${collectionId}.${ext}`;
        try {
          const up = await sb.storage.from('oilpalm-photos').upload(path, paySlipFile, { upsert: true, contentType: paySlipFile.type });
          if (up.error) {
            console.warn('[ops-walkin] slip upload failed:', up.error.message);
            notify('Slip upload failed (' + up.error.message + ') — payment will be recorded without slip', 'warning');
          } else {
            paySlipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
          }
        } catch (e) {
          console.warn('[ops-walkin] slip upload threw:', e);
          notify('Slip upload error — payment will be recorded without slip', 'warning');
        }
      }

      // === Step 8: Insert payment row (NO company_id — table doesn't have one) ===
      const payInsert = {
        id: payId,
        booking_id: null,
        collection_id: collectionId,
        amount: payAmt,
        method: payMethod,
        payment_date: dateVal,
        reference: payRef || null,
        slip_url: paySlipUrl,
        logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
      };
      const payResult = await sbMutate(sb.from('oilpalm_payments').insert(payInsert).select());
      if (payResult === null) {
        notify('Payment insert failed — sale NOT recorded', 'error');
        return;
      }

      // === Step 9: Insert collection row (HAS company_id, booking_id null for walk-in) ===
      const collInsert = {
        id: collectionId,
        company_id: getCompanyId(),
        customer_id: customerId,
        booking_id: null,
        batch_id: batchId,
        qty,
        unit_price: price,
        subtotal: qty * price,
        l3_form_no: l3,
        l3_photo_url: l3Url,
        collection_photo_url: collUrl,
        plate_no: plate,
        collection_date: dateVal,
        logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
      };
      const collResult = await sbMutate(sb.from('oilpalm_collections').insert(collInsert).select());
      if (collResult === null) {
        // Photos + payment now orphaned, but per the codebase pattern we don't try to delete them.
        notify('Collection insert failed — payment was recorded; please retry the collection', 'error');
        return;
      }

      // === Step 10: Auto-flip batch to sold_out if needed ===
      // Reload collections FIRST so opsAutoFlipBatchSoldOut sees the new row.
      await loadCollections();
      try { await opsAutoFlipBatchSoldOut(batchId); } catch (e) { console.warn('[ops-walkin] auto-flip threw:', e); }

      // === Step 11: Refresh state + render ===
      await Promise.all([loadCustomers(), loadPayments(), loadBatches()]);

      // Tear down iti before closing
      try { if (opscWalkinPhoneIti && opscWalkinPhoneIti.destroy) opscWalkinPhoneIti.destroy(); } catch (e) {}
      opscWalkinPhoneIti = null;

      closeModal('ops-walkin-overlay');
      if (currentTab === 'summary')          renderSummaryTab();
      else if (currentTab === 'customers')   renderCustomersTab();
      else if (currentTab === 'collections') renderCollectionsTab();
      else if (currentTab === 'bookings')    renderBookingsTab();

      notify('Walk-in sale recorded — L3.1 ' + l3, 'success');
    }

    // Filter `customers` array on every keystroke; render dropdown of up to 8 matches.
    function opsBkSearchCustomers() {
      const term = (document.getElementById('ops-bk-cust-search').value || '').trim().toLowerCase();
      const box  = document.getElementById('ops-bk-cust-results');
      if (!term) { box.style.display = 'none'; box.innerHTML = ''; return; }
      const termDigits = phoneDigitsOnly(term).replace(/^0+/, '');
      // Only active customers in search results (deactivated ones can't book new)
      const matches = customers.filter(c => {
        if (c.is_active === false) return false;
        const nameMatch = (c.name || '').toLowerCase().includes(term);
        const phoneStored = phoneDigitsOnly(c.phone || '').replace(/^0+/, '');
        const phoneMatch = termDigits && phoneStored.includes(termDigits);
        return nameMatch || phoneMatch;
      }).slice(0, 8);

      if (matches.length === 0) {
        box.style.display = 'block';
        box.innerHTML = '<div style="padding:8px 10px;color:var(--text-muted);font-size:12px;">No matches.</div>';
        return;
      }
      box.style.display = 'block';
      box.innerHTML = matches.map(c => {
        const phoneDisp = c.phone ? esc(fmtPhone(c.phone)) : '';
        // Stash name on a data-attribute. esc() doesn't escape double quotes, so
        // also replace " with &quot; for HTML-attribute-safe output before reading
        // back via event.currentTarget.dataset.name in opsBkSelectCustomerFromEvent.
        const nameAttr = esc(c.name || '').replace(/"/g, '&quot;');
        return `<div class="ops-bk-cust-row" data-cid="${esc(c.id)}" data-name="${nameAttr}" onclick="opsBkSelectCustomerFromEvent(event)"
          style="padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;">
          <div style="font-weight:600;color:var(--text);">${esc(c.name || '')}</div>
          ${phoneDisp ? `<div style="color:var(--text-muted);font-size:11px;">${phoneDisp}</div>` : ''}
        </div>`;
      }).join('');
    }

    function opsBkSelectCustomerFromEvent(ev) {
      const el = ev && ev.currentTarget ? ev.currentTarget : null;
      if (!el) return;
      opsBkSelectCustomer(el.dataset.cid || '', el.dataset.name || '');
    }

    function opsBkSelectCustomer(id, name) {
      document.getElementById('ops-bk-cust-id').value = id;
      const sel = document.getElementById('ops-bk-cust-selected');
      sel.style.display = 'block';
      sel.textContent = '✓ ' + (name || '');
      // Show selected name in the search box too, hide dropdown
      const search = document.getElementById('ops-bk-cust-search');
      if (search) search.value = name || '';
      const box = document.getElementById('ops-bk-cust-results');
      if (box) { box.style.display = 'none'; box.innerHTML = ''; }
    }

    function opsInitBkPhoneInput() {
      const input = document.getElementById('ops-bk-newcust-phone');
      if (!input || !window.intlTelInput) { opscBkPhoneIti = null; return; }
      opscBkPhoneIti = window.intlTelInput(input, {
        initialCountry: 'my',
        preferredCountries: ['my', 'sg', 'bn', 'id', 'th']
      });
    }

    function opsBkReadInlinePhone() {
      if (!opscBkPhoneIti) {
        const el = document.getElementById('ops-bk-newcust-phone');
        return { value: el ? el.value.trim() : '', error: null };
      }
      const raw = opscBkPhoneIti.getNumber ? opscBkPhoneIti.getNumber() : '';
      if (!raw) {
        const fallback = (document.getElementById('ops-bk-newcust-phone').value || '').trim();
        return { value: fallback, error: null };
      }
      if (typeof opscBkPhoneIti.isValidNumber === 'function') {
        if (opscBkPhoneIti.isValidNumber()) return { value: raw, error: null };
        return { value: '', error: 'Invalid phone number' };
      }
      return { value: raw, error: null };
    }

    async function opsBkSaveInlineNewCustomer() {
      const name = (document.getElementById('ops-bk-newcust-name').value || '').trim();
      if (!name) { notify('Name is required', 'error'); return; }
      const phoneRead = opsBkReadInlinePhone();
      if (phoneRead.error) { notify(phoneRead.error, 'error'); return; }

      const newId = await dbNextId('OC');
      if (!newId) { notify('Failed to generate customer ID', 'error'); return; }

      const insertData = {
        id: newId,
        company_id: getCompanyId(),
        name,
        customer_type: 'booking',
        phone: phoneRead.value || null,
        is_active: true
      };
      const result = await sbMutate(sb.from('oilpalm_customers').insert(insertData).select());
      if (result === null) return;

      // Tear down iti before swapping the DOM
      try { if (opscBkPhoneIti && opscBkPhoneIti.destroy) opscBkPhoneIti.destroy(); } catch (e) {}
      opscBkPhoneIti = null;

      await loadCustomers();
      // Restore State A then pre-select the new customer
      opsBkRestoreCustomerSearchArea();
      opsBkSelectCustomer(newId, name);
      notify('Customer added', 'success');
    }

    // Auto-populate price from batch.default_price + recompute total + cap warning.
    // Always overwrites the price field on batch change — the spec says the field
    // defaults to the batch price; user can still type an override after.
    function opsBkBatchChanged() {
      const sel = document.getElementById('ops-bk-batch');
      const opt = sel.options[sel.selectedIndex];
      const price = opt ? (parseFloat(opt.dataset.price) || 0) : 0;
      const priceEl = document.getElementById('ops-bk-price');
      if (priceEl) priceEl.value = price > 0 ? price.toFixed(2) : '';
      opsBkRecalc();
    }

    function opsBkRecalc() {
      const sel  = document.getElementById('ops-bk-batch');
      const opt  = sel ? sel.options[sel.selectedIndex] : null;
      const mn   = opt ? (parseFloat(opt.dataset.mn) || 0) : 0;
      const pct  = opt ? (parseFloat(opt.dataset.pct) || 50) : 50;
      const cap  = Math.floor(mn * pct / 100);

      const qty   = parseFloat(document.getElementById('ops-bk-qty').value) || 0;
      const price = parseFloat(document.getElementById('ops-bk-price').value) || 0;
      const total = qty * price;
      document.getElementById('ops-bk-total').value = total.toFixed(2);

      // Cap warning — only meaningful when a batch is picked + qty > 0
      const warn = document.getElementById('ops-bk-warning');
      const batchId = sel ? sel.value : '';
      if (batchId && qty > 0 && mn > 0) {
        // Existing not-yet-collected booked qty for this batch (active bookings only)
        const existing = bookings.filter(b => b.batch_id === batchId && b.status === 'active')
          .reduce((s, bk) => {
            const collected = collections
              .filter(c => c.booking_id === bk.id)
              .reduce((a, c) => a + (Number(c.qty) || 0), 0);
            return s + Math.max(0, (Number(bk.booked_qty) || 0) - collected);
          }, 0);
        const totalIfThis = existing + qty;
        if (totalIfThis > cap) {
          warn.style.display = 'block';
          warn.innerHTML = `⚠️ This booking would push total bookings to <strong>${totalIfThis}</strong> on a batch with cap <strong>${cap}</strong> (${pct}% of ${mn}). Save will require confirmation.`;
        } else {
          warn.style.display = 'none';
          warn.innerHTML = '';
        }
      } else {
        warn.style.display = 'none';
        warn.innerHTML = '';
      }
    }

    async function opsSaveNewBooking() {
      const custId    = (document.getElementById('ops-bk-cust-id').value || '').trim();
      const batchId   = (document.getElementById('ops-bk-batch').value || '').trim();
      const qty       = parseInt(document.getElementById('ops-bk-qty').value, 10);
      const price     = parseFloat(document.getElementById('ops-bk-price').value);
      const total     = parseFloat(document.getElementById('ops-bk-total').value);
      const payAmt    = parseFloat(document.getElementById('ops-bk-pay-amt').value);
      const payMethod = document.getElementById('ops-bk-pay-method').value || 'cash';
      const payRef    = (document.getElementById('ops-bk-pay-ref').value || '').trim();
      const slipFileEl = document.getElementById('ops-bk-pay-slip');
      const slipFile   = slipFileEl && slipFileEl.files && slipFileEl.files[0] ? slipFileEl.files[0] : null;

      if (!custId)               { notify('Customer required', 'error'); return; }
      if (!batchId)              { notify('Batch required', 'error'); return; }
      if (!qty || qty < 1)       { notify('Qty must be at least 1', 'error'); return; }
      if (!price || price <= 0)  { notify('Unit price must be > 0', 'error'); return; }
      if (!payAmt || payAmt <= 0){ notify('Initial payment must be > 0 (zero-deposit not allowed)', 'error'); return; }
      if (!isFinite(total) || total <= 0) { notify('Total amount invalid', 'error'); return; }

      const warn = document.getElementById('ops-bk-warning');
      const capExceeded = warn && warn.style.display === 'block';

      // Helper that runs the actual save (reused by the cap-override callback path)
      const doSave = async () => {
        // 1. Generate booking ID
        const bookingId = await dbNextId('OK');
        if (!bookingId) { notify('Failed to generate booking ID', 'error'); return; }

        // 2. Insert booking row (HAS company_id)
        const bkInsert = {
          id: bookingId,
          company_id: getCompanyId(),
          customer_id: custId,
          batch_id: batchId,
          booked_qty: qty,
          unit_price: price,
          total_amount: total,
          booking_date: new Date().toISOString().slice(0, 10),
          status: 'active'
        };
        const bkResult = await sbMutate(sb.from('oilpalm_bookings').insert(bkInsert).select());
        if (bkResult === null) return;

        // 3. Upload slip if provided (failure logged, doesn't abort the payment)
        let slipUrl = null;
        if (slipFile) {
          const ext  = slipFile.name.split('.').pop();
          const path = `payments/${bookingId}/initial.${ext}`;
          try {
            const up = await sb.storage.from('oilpalm-photos').upload(path, slipFile, { upsert: true, contentType: slipFile.type });
            if (up.error) {
              console.warn('[ops-newbk] slip upload failed:', up.error.message);
              notify('Slip upload failed (' + up.error.message + ') — payment recorded without slip', 'warning');
            } else {
              slipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
            }
          } catch (e) {
            console.warn('[ops-newbk] slip upload threw:', e);
            notify('Slip upload error — payment recorded without slip', 'warning');
          }
        }

        // 4. Generate payment ID + insert (NO company_id — table doesn't have one)
        const payId = await dbNextId('OP');
        if (!payId) { notify('Failed to generate payment ID', 'error'); return; }
        const payInsert = {
          id: payId,
          booking_id: bookingId,
          collection_id: null,
          amount: payAmt,
          method: payMethod,
          payment_date: new Date().toISOString().slice(0, 10),
          reference: payRef || null,
          slip_url: slipUrl,
          logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
        };
        const payResult = await sbMutate(sb.from('oilpalm_payments').insert(payInsert).select());
        if (payResult === null) return;

        // 5. Refresh in-memory state + close + re-render current tab
        await Promise.all([loadBookings(), loadPayments(), loadCustomers()]);
        closeModal('ops-newbk-overlay');
        if (currentTab === 'bookings')      renderBookingsTab();
        else if (currentTab === 'summary')  renderSummaryTab();
        else if (currentTab === 'customers') renderCustomersTab();
        notify('Booking ' + bookingId + ' created', 'success');
      };

      // Cap override prompt — confirmAction is callback-based in this codebase
      if (capExceeded) {
        confirmAction('Override Cap', 'This booking exceeds the bookable cap. Continue anyway?', () => { doSave(); });
        return;
      }
      await doSave();
    }

    // === Reassign Batch modal (Task 3.8) ===
    // Pre-flight: zero collections only. If any collections issued, must Cancel & re-book.
    function opsOpenReassignModal(bookingId) {
      bookingId = bookingId || selectedBookingId;
      if (!bookingId) { notify('No booking selected', 'error'); return; }

      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }

      // Pre-flight: zero-collections-only
      const collected = collections.filter(c => c.booking_id === bookingId).length;
      if (collected > 0) {
        notify('Cannot reassign — collections already issued. Cancel & re-book.', 'error');
        return;
      }

      const vMap = Object.fromEntries(varieties.map(v => [v.id, v.name]));
      const sLabel = (s) => ({ pre_nursery: 'PN', main_nursery: 'MN', selling: 'Selling' })[s] || s;

      const currentBatch = batches.find(b => b.id === bk.batch_id);
      const currentBatchLabel = currentBatch
        ? `${esc(currentBatch.batch_number || currentBatch.id)} · ${esc(vMap[currentBatch.variety_id] || '—')} · ${formatRM(currentBatch.default_price || 0)}/seedling`
        : '<span class="muted">— missing —</span>';

      // Eligible new batches: pre_nursery | main_nursery | selling, excluding current
      const eligible = batches
        .filter(b => b.id !== bk.batch_id && ['pre_nursery', 'main_nursery', 'selling'].includes(b.status))
        .sort((a, b) => (a.batch_number || '').localeCompare(b.batch_number || ''));

      const batchOptions = ['<option value="">— Select new batch —</option>']
        .concat(eligible.map(b => {
          const v = vMap[b.variety_id] || '—';
          const dp = Number(b.default_price || 0);
          return `<option value="${esc(b.id)}" data-price="${dp}">${esc(b.batch_number || b.id)} · ${esc(v)} · ${sLabel(b.status)}${dp > 0 ? ' · ' + formatRM(dp) : ''}</option>`;
        }))
        .join('');

      const currentPrice = Number(bk.unit_price || 0);

      showModal(`
        <h3>Reassign Booking to Different Batch</h3>
        <div class="info-box" style="background:rgba(212,175,55,0.1);border:1px solid var(--gold);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.6;">
          <div><strong>Booking:</strong> ${esc(bookingId)}</div>
          <div><strong>Current batch:</strong> ${currentBatchLabel}</div>
          <div><strong>Current price:</strong> ${formatRM(currentPrice)}/seedling</div>
        </div>

        <div class="form-grid">
          <label class="full">New Batch
            <select id="ops-rea-batch" onchange="opsReassignOnBatchChange()">
              ${batchOptions}
            </select>
          </label>

          <label class="full">Pricing
            <select id="ops-rea-pricing">
              <option value="keep" selected>Keep current ${formatRM(currentPrice)}/seedling</option>
            </select>
          </label>

          <label class="full">Reason <textarea id="ops-rea-reason" rows="3" placeholder="Why are we moving this booking?"></textarea></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-reassign-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opsSaveReassign('${esc(bookingId)}')">Save Reassignment</button>
        </div>
      `, 'ops-reassign-overlay');
    }

    // Refresh pricing dropdown when new batch is picked — adds the "use new batch's default price" option only when it has one.
    function opsReassignOnBatchChange() {
      const batchSel = document.getElementById('ops-rea-batch');
      const priceSel = document.getElementById('ops-rea-pricing');
      if (!batchSel || !priceSel) return;
      const bk = bookings.find(x => x.id === selectedBookingId);
      if (!bk) return;
      const currentPrice = Number(bk.unit_price || 0);
      const opt = batchSel.options[batchSel.selectedIndex];
      const newPrice = opt ? parseFloat(opt.getAttribute('data-price') || '0') : 0;

      let html = `<option value="keep" selected>Keep current ${formatRM(currentPrice)}/seedling</option>`;
      if (newPrice > 0) {
        html += `<option value="new">Use new batch's default price (${formatRM(newPrice)}/seedling)</option>`;
      }
      priceSel.innerHTML = html;
    }

    async function opsSaveReassign(bookingId) {
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }

      // Re-check no collections (race window)
      const collectedNow = collections.filter(c => c.booking_id === bookingId).length;
      if (collectedNow > 0) {
        notify('Cannot reassign — collections already issued', 'error');
        return;
      }

      const newBatchId = (document.getElementById('ops-rea-batch').value || '').trim();
      const pricingChoice = (document.getElementById('ops-rea-pricing').value || 'keep').trim();
      const reason = (document.getElementById('ops-rea-reason').value || '').trim();

      if (!newBatchId) { notify('Pick a new batch', 'error'); return; }
      if (newBatchId === bk.batch_id) { notify('That is the current batch — pick a different one', 'error'); return; }
      if (!reason) { notify('Reason is required', 'error'); return; }

      const newBatch = batches.find(b => b.id === newBatchId);
      if (!newBatch) { notify('New batch not found', 'error'); return; }

      const oldPrice = Number(bk.unit_price || 0);
      const newDefault = Number(newBatch.default_price || 0);
      const keptPrice = pricingChoice !== 'new';
      const newUnitPrice = keptPrice ? oldPrice : newDefault;
      const bookedQty = Number(bk.booked_qty || 0);
      const newTotal = bookedQty * newUnitPrice;

      // Append history entry to existing JSONB array
      const history = Array.isArray(bk.reassignment_history) ? bk.reassignment_history.slice() : [];
      history.push({
        from_batch: bk.batch_id,
        to_batch: newBatchId,
        date: new Date().toISOString(),
        by_user: currentUser ? (currentUser.username || currentUser.name || null) : null,
        reason: reason,
        kept_price: keptPrice,
        old_price: oldPrice,
        new_price: newUnitPrice
      });

      const updateData = {
        batch_id: newBatchId,
        unit_price: newUnitPrice,
        total_amount: newTotal,
        reassignment_history: history
      };
      const result = await sbMutate(sb.from('oilpalm_bookings').update(updateData).eq('id', bookingId).select());
      if (result === null) { notify('Reassign failed — please retry', 'error'); return; }

      await loadBookings();
      closeModal('ops-reassign-overlay');
      if (currentTab === 'bookings')      renderBookingsTab();
      else if (currentTab === 'summary')  renderSummaryTab();

      notify('Booking reassigned to ' + (newBatch.batch_number || newBatchId), 'success');
    }
    // === End Reassign Batch modal ===

    // === Cancel Booking modal (Task 3.8) ===
    // Auto-suggests refund owed = paid - (collected × unit_price).
    // Refund stays pending until finance updates via Mark Refund Paid (separate flow).
    function opsOpenCancelModal(bookingId) {
      bookingId = bookingId || selectedBookingId;
      if (!bookingId) { notify('No booking selected', 'error'); return; }

      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      if (bk.status !== 'active') {
        notify('Only active bookings can be cancelled', 'error');
        return;
      }

      const paid = paymentsByBooking[bookingId] || 0;
      const collectedQty = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const unitPrice = Number(bk.unit_price || 0);
      const usedValue = collectedQty * unitPrice;
      const owed = Math.max(0, paid - usedValue);

      const refundLineHtml = owed > 0
        ? `<div style="margin-top:6px;font-weight:700;color:var(--red);">Refund owed: <strong>${formatRM(owed)}</strong> (will be marked refund-pending)</div>`
        : `<div style="margin-top:6px;font-weight:700;color:#2D5224;">No refund owed — booking will be cancelled / forfeited.</div>`;

      showModal(`
        <h3>Cancel Booking ${esc(bookingId)}</h3>
        <div class="info-box" style="background:rgba(196,64,64,0.08);border:1px solid var(--red);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.6;">
          <div>Customer paid <strong>${formatRM(paid)}</strong></div>
          <div>Collected <strong>${collectedQty.toLocaleString()}</strong> seedlings (value <strong>${formatRM(usedValue)}</strong>)</div>
          ${refundLineHtml}
        </div>

        <div class="form-grid">
          <label class="full">Cancel Reason <textarea id="ops-cancel-reason" rows="3" placeholder="Why is this booking being cancelled?"></textarea></label>
          <div class="full" style="font-size:11px;color:var(--text-muted);line-height:1.5;">
            Note: refund slip + actual amount paid is recorded later via <em>Mark Refund Paid</em> after finance processes the refund.
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-cancel-overlay')">Back</button>
          <button class="btn btn-primary" style="background:var(--red);border-color:var(--red);" onclick="opsSaveCancel('${esc(bookingId)}', ${owed})">Confirm Cancel</button>
        </div>
      `, 'ops-cancel-overlay');
    }

    async function opsSaveCancel(bookingId, owed) {
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      if (bk.status !== 'active') { notify('Only active bookings can be cancelled', 'error'); return; }

      const reason = (document.getElementById('ops-cancel-reason').value || '').trim();
      if (!reason) { notify('Cancel reason is required', 'error'); return; }

      const numOwed = Number(owed) || 0;
      const updateData = {
        status: 'cancelled',
        cancel_reason: reason,
        cancelled_at: new Date().toISOString(),
        cancelled_by: currentUser ? (currentUser.username || currentUser.name || null) : null,
        refund_status: numOwed > 0 ? 'pending' : 'forfeited',
        refund_owed: numOwed
      };
      const result = await sbMutate(sb.from('oilpalm_bookings').update(updateData).eq('id', bookingId).select());
      if (result === null) { notify('Cancel failed — please retry', 'error'); return; }

      await loadBookings();
      closeModal('ops-cancel-overlay');
      if (currentTab === 'bookings')      renderBookingsTab();
      else if (currentTab === 'summary')  renderSummaryTab();

      notify(numOwed > 0
        ? 'Cancelled — ' + formatRM(numOwed) + ' refund pending'
        : 'Cancelled — no refund owed',
        'success');
    }
    // === End Cancel Booking modal ===

    // === Mark Refund Paid modal (Task 3.8) ===
    // Two-stage cancellation: finance updates the actual refund amount + slip + date here.
    function opsOpenMarkRefundPaidModal(bookingId) {
      bookingId = bookingId || selectedBookingId;
      if (!bookingId) { notify('No booking selected', 'error'); return; }

      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      if (bk.status !== 'cancelled' || bk.refund_status !== 'pending') {
        notify('Only cancelled bookings with pending refund can be marked paid', 'error');
        return;
      }

      const owed = Number(bk.refund_owed || 0);
      const today = new Date().toISOString().slice(0, 10);

      showModal(`
        <h3>Mark Refund Paid · ${esc(bookingId)}</h3>
        <div class="info-box" style="background:rgba(212,175,55,0.1);border:1px solid var(--gold);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.6;">
          <div><strong>Refund owed:</strong> ${formatRM(owed)}</div>
          <div><strong>Cancel reason:</strong> ${esc(bk.cancel_reason || '—')}</div>
        </div>

        <div class="form-grid">
          <label>Actual Refund Amount (RM) <input id="ops-ref-amt" type="number" step="0.01" min="0" value="${owed.toFixed(2)}" /></label>
          <label>Date <input id="ops-ref-date" type="date" value="${today}" /></label>
          <label>Method
            <select id="ops-ref-method">
              <option value="cash">Cash</option>
              <option value="bank" selected>Bank Transfer</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
          <label>Reference <input id="ops-ref-ref" /></label>
          <label class="full">Slip (optional) <input type="file" id="ops-ref-slip" accept="image/*,application/pdf" /></label>
          <label class="full">Notes <textarea id="ops-ref-notes" rows="2"></textarea></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-refund-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opsSaveRefund('${esc(bookingId)}')">Save Refund</button>
        </div>
      `, 'ops-refund-overlay');
    }

    async function opsSaveRefund(bookingId) {
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      if (bk.status !== 'cancelled' || bk.refund_status !== 'pending') {
        notify('Refund already processed or booking not cancelled', 'error');
        return;
      }

      const amtRaw = parseFloat(document.getElementById('ops-ref-amt').value);
      const amt = isFinite(amtRaw) ? amtRaw : NaN;
      const dateVal = (document.getElementById('ops-ref-date').value || '').trim();
      const method = (document.getElementById('ops-ref-method').value || 'bank').trim();
      const ref = (document.getElementById('ops-ref-ref').value || '').trim();
      const notes = (document.getElementById('ops-ref-notes').value || '').trim();
      const slipEl = document.getElementById('ops-ref-slip');
      const slipFile = slipEl && slipEl.files && slipEl.files[0] ? slipEl.files[0] : null;

      if (!isFinite(amt) || amt < 0) { notify('Amount must be ≥ 0', 'error'); return; }
      if (!dateVal) { notify('Date is required', 'error'); return; }

      // Upload slip if provided — non-fatal per spec
      let slipUrl = null;
      if (slipFile) {
        try {
          const ext = slipFile.name.split('.').pop();
          const path = `refunds/${bookingId}/slip.${ext}`;
          const up = await sb.storage.from('oilpalm-photos').upload(path, slipFile, { upsert: true, contentType: slipFile.type });
          if (up.error) {
            console.warn('[ops-refund] slip upload failed:', up.error.message);
            notify('Slip upload failed (' + up.error.message + ') — refund will be saved without slip', 'warning');
          } else {
            slipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
          }
        } catch (e) {
          console.warn('[ops-refund] slip upload threw:', e);
          notify('Slip upload error — refund will be saved without slip', 'warning');
        }
      }

      const updateData = {
        refund_status: 'paid',
        refund_amount: amt,
        refund_method: method,
        refund_reference: ref || null,
        refund_slip_url: slipUrl,
        refund_paid_at: new Date(dateVal).toISOString(),
        refund_paid_by: currentUser ? (currentUser.username || currentUser.name || null) : null,
        refund_notes: notes || null
      };
      const result = await sbMutate(sb.from('oilpalm_bookings').update(updateData).eq('id', bookingId).select());
      if (result === null) { notify('Refund save failed — please retry', 'error'); return; }

      await loadBookings();
      closeModal('ops-refund-overlay');
      if (currentTab === 'bookings')      renderBookingsTab();
      else if (currentTab === 'summary')  renderSummaryTab();

      notify('Refund marked paid', 'success');
    }
    // === End Mark Refund Paid modal ===

    // === Record Collection modal (Task 3.7 — booking-driven) ===
    // Walk-in collections live in Task 3.9 (different entry path, no booking, no payment cap).

    // Compute the max qty the customer is currently allowed to collect on this booking.
    // Formula: floor((existingPaid + additionalNow) / unit_price) - alreadyCollected.
    // Used both for the live "Can collect N more" hint AND for the save-time cap check.
    function opsCalcMaxCollectable(bookingId, additionalPayAmt) {
      additionalPayAmt = additionalPayAmt || 0;
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) return 0;
      const paid = (paymentsByBooking[bookingId] || 0) + additionalPayAmt;
      const collected = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const unit = Number(bk.unit_price) || 0;
      if (unit <= 0) return 0;
      return Math.max(0, Math.floor(paid / unit) - collected);
    }

    // Mirrors oilpalmgrowth.html's autoFlipSoldOut() but scoped to a single batch.
    // Sales side has no mid-MN cull data (Growth owns batch_events), so the formula is
    // qty_mn_start − collections only. If a batch's cull-adjusted available is what
    // really matters, Growth's full scan on its next load will catch it. Best-effort.
    async function opsAutoFlipBatchSoldOut(batchId) {
      const b = batches.find(x => x.id === batchId);
      if (!b || b.status !== 'selling') return;
      const collectedAfter = collections
        .filter(c => c.batch_id === batchId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const avail = (Number(b.qty_mn_start) || 0) - collectedAfter;
      if (avail <= 0) {
        await sbMutate(sb.from('oilpalm_batches').update({ status: 'sold_out' }).eq('id', batchId).select());
      }
    }

    function opsOpenRecordCollectionModal(bookingId) {
      // bookingId optional — fall back to selectedBookingId (we're on booking detail page).
      bookingId = bookingId || selectedBookingId;
      if (!bookingId) { notify('No booking selected', 'error'); return; }

      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }
      const batch = batches.find(b => b.id === bk.batch_id);
      // Pre-flight: batch must be in Selling stage to collect
      if (!batch || batch.status !== 'selling') {
        notify('Batch must be in Selling stage to collect', 'error');
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const booked    = Number(bk.booked_qty || 0);
      const collected = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const remaining = Math.max(0, booked - collected);
      const paid      = paymentsByBooking[bookingId] || 0;
      const canCollect = opsCalcMaxCollectable(bookingId, 0);

      const cust = customers.find(c => c.id === bk.customer_id);
      const custLabel = cust ? esc(cust.name) : '—';

      showModal(`
        <h3>+ Record Collection</h3>
        <div class="info-box" id="ops-coll-info" style="background:rgba(212,175,55,0.1);border:1px solid var(--gold);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.6;">
          <div><strong>Booking:</strong> ${esc(bookingId)} · <strong>${custLabel}</strong></div>
          <div>Booked <strong>${booked.toLocaleString()}</strong> · Collected <strong>${collected.toLocaleString()}</strong> already · Remaining <strong>${remaining.toLocaleString()}</strong></div>
          <div>Customer paid <strong>${formatRM(paid)}</strong> · Unit price <strong>${formatRM(bk.unit_price || 0)}</strong></div>
          <div id="ops-coll-cancollect" style="margin-top:4px;font-weight:600;color:#2D5224;">Can collect <strong>${canCollect.toLocaleString()}</strong> more right now.</div>
        </div>

        <div class="form-grid">
          <label>Quantity <input id="ops-coll-qty" type="number" min="1" step="1" max="${remaining}" oninput="opsCollRecalcHint()" /></label>
          <label>Date <input id="ops-coll-date" type="date" value="${today}" /></label>
          <label class="full">L3.1 Form # <input id="ops-coll-l3" placeholder="From physical MPOB booklet" /></label>
          <label class="full">L3.1 Photo (required) <input type="file" id="ops-coll-l3-photo" accept="image/*,application/pdf" /></label>
          <label class="full">Collection Photo (required) <input type="file" id="ops-coll-photo" accept="image/*" /></label>
          <label class="full">Car Plate # <input id="ops-coll-plate" /></label>

          <label class="full" style="font-weight:700;color:var(--text);font-size:13px;margin-top:4px;">Additional Payment Now (optional)</label>
          <label>Amount (RM) <input id="ops-coll-pay-amt" type="number" step="0.01" min="0" oninput="opsCollRecalcHint()" /></label>
          <label>Method
            <select id="ops-coll-pay-method">
              <option value="cash">Cash</option>
              <option value="bank">Bank Transfer</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
          <label>Reference <input id="ops-coll-pay-ref" /></label>
          <label class="full">Slip (optional) <input type="file" id="ops-coll-pay-slip" accept="image/*,application/pdf" /></label>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('ops-collect-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="opsSaveCollection('${esc(bookingId)}')">Save Collection</button>
        </div>
      `, 'ops-collect-overlay');
    }

    // Live update of the "Can collect N more" hint as user types qty / additional payment.
    function opsCollRecalcHint() {
      // selectedBookingId is the booking we're on (modal is opened from booking detail page).
      const bookingId = selectedBookingId;
      if (!bookingId) return;
      const addAmtEl = document.getElementById('ops-coll-pay-amt');
      const addAmt   = addAmtEl ? (parseFloat(addAmtEl.value) || 0) : 0;
      const max = opsCalcMaxCollectable(bookingId, addAmt);
      const hint = document.getElementById('ops-coll-cancollect');
      if (!hint) return;
      const qtyEl = document.getElementById('ops-coll-qty');
      const qty   = qtyEl ? (parseInt(qtyEl.value, 10) || 0) : 0;
      // Color the hint red if user has typed a qty exceeding max
      const over = qty > 0 && qty > max;
      hint.style.color = over ? 'var(--red)' : '#2D5224';
      hint.innerHTML = over
        ? `Qty ${qty.toLocaleString()} exceeds payment-controlled cap. Can collect <strong>${max.toLocaleString()}</strong> more — record more payment first or reduce qty.`
        : `Can collect <strong>${max.toLocaleString()}</strong> more right now.`;
    }

    async function opsSaveCollection(bookingId) {
      const bk = bookings.find(x => x.id === bookingId);
      if (!bk) { notify('Booking not found', 'error'); return; }

      // Re-check batch stage (race window between modal open and save)
      const batch = batches.find(b => b.id === bk.batch_id);
      if (!batch || batch.status !== 'selling') {
        notify('Batch must be in Selling stage to collect', 'error');
        return;
      }

      const qty       = parseInt(document.getElementById('ops-coll-qty').value, 10);
      const dateVal   = (document.getElementById('ops-coll-date').value || '').trim();
      const l3        = (document.getElementById('ops-coll-l3').value || '').trim();
      const plate     = (document.getElementById('ops-coll-plate').value || '').trim();
      const l3PhotoEl = document.getElementById('ops-coll-l3-photo');
      const collPhotoEl = document.getElementById('ops-coll-photo');
      const l3PhotoFile   = l3PhotoEl   && l3PhotoEl.files   && l3PhotoEl.files[0]   ? l3PhotoEl.files[0]   : null;
      const collPhotoFile = collPhotoEl && collPhotoEl.files && collPhotoEl.files[0] ? collPhotoEl.files[0] : null;

      // Optional additional payment
      const payAmt    = parseFloat(document.getElementById('ops-coll-pay-amt').value);
      const payMethod = document.getElementById('ops-coll-pay-method').value || 'cash';
      const payRef    = (document.getElementById('ops-coll-pay-ref').value || '').trim();
      const paySlipEl = document.getElementById('ops-coll-pay-slip');
      const paySlipFile = paySlipEl && paySlipEl.files && paySlipEl.files[0] ? paySlipEl.files[0] : null;
      const hasPayment = isFinite(payAmt) && payAmt > 0;

      // === Validation (block on missing required fields) ===
      if (!qty || qty < 1)     { notify('Quantity must be at least 1', 'error'); return; }
      if (!dateVal)            { notify('Date is required', 'error'); return; }
      if (!l3)                 { notify('L3.1 Form # is required', 'error'); return; }
      if (!l3PhotoFile)        { notify('L3.1 photo required', 'error'); return; }
      if (!collPhotoFile)      { notify('Collection photo required', 'error'); return; }
      if (!plate)              { notify('Car Plate # is required', 'error'); return; }

      const booked    = Number(bk.booked_qty || 0);
      const collected = collections
        .filter(c => c.booking_id === bookingId)
        .reduce((s, c) => s + Number(c.qty || 0), 0);
      const remaining = Math.max(0, booked - collected);
      if (qty > remaining) {
        notify('Qty ' + qty + ' exceeds remaining ' + remaining + ' on this booking', 'error');
        return;
      }

      // === Guardrail 1: L3.1 dup check (DB has UNIQUE index too — friendly error first) ===
      const dupCheck = await sbQuery(sb.from('oilpalm_collections').select('id,l3_form_no').eq('l3_form_no', l3));
      if (dupCheck && dupCheck.length > 0) {
        notify('L3.1 #' + l3 + ' was already used. Cannot reuse.', 'error');
        return;
      }

      // === Guardrail 2: Payment-controlled cap ===
      // currentlyPaid INCLUDES the new payment about to be recorded (per spec).
      const additionalNow = hasPayment ? payAmt : 0;
      const maxCollectable = opsCalcMaxCollectable(bookingId, additionalNow);
      if (qty > maxCollectable) {
        const unit = Number(bk.unit_price) || 0;
        const paidNow = (paymentsByBooking[bookingId] || 0) + additionalNow;
        const paidFor = unit > 0 ? Math.floor(paidNow / unit) : 0;
        notify(
          'Customer paid for ' + paidFor.toLocaleString() + ' seedlings, already collected ' +
          collected.toLocaleString() + ', can collect ' + maxCollectable.toLocaleString() +
          ' more. Either reduce qty or record payment first.',
          'error'
        );
        return;
      }

      // === Atomic insert (CS047 pattern — money/photos first, then collection row) ===

      // Step 1: Generate collection ID
      const collectionId = await dbNextId('OL');
      if (!collectionId) { notify('Failed to generate collection ID', 'error'); return; }

      // Step 2: Upload BOTH photos (mandatory — abort if either fails)
      // L3.1 photo can be image OR PDF
      let l3Url = null;
      try {
        const ext = l3PhotoFile.name.split('.').pop();
        const path = `collections/${collectionId}/l3.${ext}`;
        const up = await sb.storage.from('oilpalm-photos').upload(path, l3PhotoFile, { upsert: true, contentType: l3PhotoFile.type });
        if (up.error) {
          console.warn('[ops-coll] L3.1 photo upload failed:', up.error.message);
          notify('L3.1 photo upload failed: ' + up.error.message, 'error');
          return;
        }
        l3Url = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      } catch (e) {
        console.warn('[ops-coll] L3.1 photo upload threw:', e);
        notify('L3.1 photo upload error — collection NOT recorded', 'error');
        return;
      }

      // Collection photo — image only per spec (G7)
      let collUrl = null;
      try {
        const ext = collPhotoFile.name.split('.').pop();
        const path = `collections/${collectionId}/seedlings.${ext}`;
        const up = await sb.storage.from('oilpalm-photos').upload(path, collPhotoFile, { upsert: true, contentType: collPhotoFile.type });
        if (up.error) {
          console.warn('[ops-coll] collection photo upload failed:', up.error.message);
          notify('Collection photo upload failed: ' + up.error.message, 'error');
          return;
        }
        collUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
      } catch (e) {
        console.warn('[ops-coll] collection photo upload threw:', e);
        notify('Collection photo upload error — collection NOT recorded', 'error');
        return;
      }

      // Step 3: If additional payment > 0, record it BEFORE the collection row.
      // (Money-first ordering — CS047 pattern. If collection insert later fails, we still
      //  have the payment on file and operator can re-attempt the collection.)
      if (hasPayment) {
        let paySlipUrl = null;
        if (paySlipFile) {
          const ext = paySlipFile.name.split('.').pop();
          const path = `payments/${bookingId}/${collectionId}.${ext}`;
          try {
            const up = await sb.storage.from('oilpalm-photos').upload(path, paySlipFile, { upsert: true, contentType: paySlipFile.type });
            if (up.error) {
              // Slip upload failure is non-fatal per G12 — record payment without slip
              console.warn('[ops-coll] slip upload failed:', up.error.message);
              notify('Slip upload failed (' + up.error.message + ') — payment will be recorded without slip', 'warning');
            } else {
              paySlipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
            }
          } catch (e) {
            console.warn('[ops-coll] slip upload threw:', e);
            notify('Slip upload error — payment will be recorded without slip', 'warning');
          }
        }

        const payId = await dbNextId('OP');
        if (!payId) { notify('Failed to generate payment ID — collection NOT recorded', 'error'); return; }

        const payInsert = {
          id: payId,
          booking_id: bookingId,
          collection_id: collectionId,   // payment is tied to the collection we're about to insert
          amount: payAmt,
          method: payMethod,
          payment_date: dateVal,
          reference: payRef || null,
          slip_url: paySlipUrl,
          logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
        };
        const payResult = await sbMutate(sb.from('oilpalm_payments').insert(payInsert).select());
        if (payResult === null) {
          notify('Payment insert failed — collection NOT recorded', 'error');
          return;
        }
      }

      // Step 4: Insert collection row (HAS company_id)
      const collInsert = {
        id: collectionId,
        company_id: getCompanyId(),
        customer_id: bk.customer_id,
        booking_id: bookingId,
        batch_id: bk.batch_id,             // denormalized — locked from booking's CURRENT batch
        qty,
        unit_price: bk.unit_price,         // denormalized — locked from booking's CURRENT price
        subtotal: qty * Number(bk.unit_price || 0),
        l3_form_no: l3,
        l3_photo_url: l3Url,
        collection_photo_url: collUrl,
        plate_no: plate,
        collection_date: dateVal,
        logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
      };
      const collResult = await sbMutate(sb.from('oilpalm_collections').insert(collInsert).select());
      if (collResult === null) {
        // Photos + payment are now orphaned, but per G14 we don't try to delete them.
        notify('Collection insert failed — payment (if any) was recorded; please retry the collection', 'error');
        return;
      }

      // Step 5: Best-effort booking completion flip (don't await — it's a side effect)
      if ((collected + qty) >= booked) {
        sbMutate(sb.from('oilpalm_bookings').update({ status: 'completed' }).eq('id', bookingId).select())
          .catch(e => console.warn('[ops-coll] booking completion flip failed:', e));
      }

      // Step 6: Reload state + render. Reload collections FIRST so opsAutoFlipBatchSoldOut
      // sees the new row when it computes the post-collection available count.
      await Promise.all([loadCollections(), loadPayments(), loadBookings(), loadBatches()]);

      // Best-effort batch sold_out auto-flip
      try { await opsAutoFlipBatchSoldOut(bk.batch_id); } catch (e) { console.warn('[ops-coll] auto-flip threw:', e); }
      // Reload batches once more if we may have flipped it
      await loadBatches();

      closeModal('ops-collect-overlay');
      if (currentTab === 'bookings')      renderBookingsTab();
      else if (currentTab === 'summary')  renderSummaryTab();
      else if (currentTab === 'collections') renderCollectionsTab();

      notify('Collection recorded — L3.1 ' + l3, 'success');
    }

    async function opsSaveAddPayment(bookingId) {
      const amount = parseFloat(document.getElementById('ops-addpay-amt').value);
      const method = document.getElementById('ops-addpay-method').value || 'cash';
      const ref    = (document.getElementById('ops-addpay-ref').value || '').trim();
      const dateVal = (document.getElementById('ops-addpay-date').value || '').trim();
      const slipFileEl = document.getElementById('ops-addpay-slip');
      const slipFile   = slipFileEl && slipFileEl.files && slipFileEl.files[0] ? slipFileEl.files[0] : null;

      if (!amount || amount <= 0) { notify('Amount must be > 0', 'error'); return; }
      if (!dateVal)               { notify('Date is required', 'error'); return; }

      // 1. Generate payment ID
      const payId = await dbNextId('OP');
      if (!payId) { notify('Failed to generate payment ID', 'error'); return; }

      // 2. Upload slip if provided (failure is non-fatal — payment still saves)
      let slipUrl = null;
      if (slipFile) {
        const ext  = slipFile.name.split('.').pop();
        const path = `payments/${bookingId}/${payId}.${ext}`;
        try {
          const up = await sb.storage.from('oilpalm-photos').upload(path, slipFile, { upsert: true, contentType: slipFile.type });
          if (up.error) {
            console.warn('[ops-addpay] slip upload failed:', up.error.message);
            notify('Slip upload failed (' + up.error.message + ') — payment saved without slip', 'warning');
          } else {
            slipUrl = sb.storage.from('oilpalm-photos').getPublicUrl(path).data.publicUrl;
          }
        } catch (e) {
          console.warn('[ops-addpay] slip upload threw:', e);
          notify('Slip upload error — payment saved without slip', 'warning');
        }
      }

      // 3. Insert payment row (NO company_id — table doesn't have one)
      const payInsert = {
        id: payId,
        booking_id: bookingId,
        collection_id: null,
        amount,
        method,
        payment_date: dateVal,
        reference: ref || null,
        slip_url: slipUrl,
        logged_by: currentUser ? (currentUser.username || currentUser.name || null) : null
      };
      const result = await sbMutate(sb.from('oilpalm_payments').insert(payInsert).select());
      if (result === null) return;

      // 4. Refresh + close + re-render
      await loadPayments();
      closeModal('ops-addpay-overlay');
      renderBookingsTab();
      notify('Payment ' + payId + ' added', 'success');
    }

    // === Collections tab (Task 3.10) ===
    function renderCollectionsTab() {
      const customerMap = Object.fromEntries(customers.map(c => [c.id, c]));
      const batchMap    = Object.fromEntries(batches.map(b => [b.id, b]));
      const varietyMap  = Object.fromEntries(varieties.map(v => [v.id, v.name]));

      // Apply filters
      const term = (collectionsFilter.customer || '').trim().toLowerCase();
      const termDigits = phoneDigitsOnly(term).replace(/^0+/, '');
      const fromDate = collectionsFilter.from || '';
      const toDate   = collectionsFilter.to   || '';

      const filtered = collections.filter(c => {
        // Date range filter (collection_date is ISO yyyy-mm-dd, plain string compare works)
        if (fromDate && (c.collection_date || '') < fromDate) return false;
        if (toDate   && (c.collection_date || '') > toDate)   return false;

        // Batch filter
        if (collectionsFilter.batch !== 'all') {
          if (c.batch_id !== collectionsFilter.batch) return false;
        }

        // Type filter (booking-driven vs walk-in)
        if (collectionsFilter.type === 'booking') {
          if (!c.booking_id) return false;
        } else if (collectionsFilter.type === 'walkin') {
          if (c.booking_id) return false;
        }

        // Customer search — match name OR phone digits
        if (term) {
          const cust = customerMap[c.customer_id];
          if (!cust) return false;
          const nameMatch = (cust.name || '').toLowerCase().includes(term);
          const phoneStored = phoneDigitsOnly(cust.phone || '').replace(/^0+/, '');
          const phoneMatch = termDigits && phoneStored.includes(termDigits);
          if (!nameMatch && !phoneMatch) return false;
        }
        return true;
      });

      // Sort: collection_date desc, then created_at desc
      filtered.sort((a, b) => {
        const dA = a.collection_date || '';
        const dB = b.collection_date || '';
        if (dA !== dB) return dA < dB ? 1 : -1;
        const cA = a.created_at || '';
        const cB = b.created_at || '';
        if (cA !== cB) return cA < cB ? 1 : -1;
        return 0;
      });

      const tbody = filtered.map(c => {
        const cust  = customerMap[c.customer_id];
        const batch = batchMap[c.batch_id];
        const isBooking = !!c.booking_id;
        const typeBadge = isBooking
          ? '<span class="ops-status-badge ops-status-active">BOOKING</span>'
          : '<span class="ops-status-badge ops-status-walkin">WALK-IN</span>';
        return `
          <tr onclick="opsOpenCollectionDetail('${esc(c.id)}')" style="cursor:pointer;">
            <td>${fmtDate(c.collection_date)}</td>
            <td>${esc(c.l3_form_no || '—')}</td>
            <td>${cust ? esc(cust.name) : '<span class="muted">—</span>'}</td>
            <td>${batch ? esc(batch.batch_number || batch.id) : '<span class="muted">—</span>'}</td>
            <td style="text-align:right;">${Number(c.qty || 0).toLocaleString()}</td>
            <td>${typeBadge}</td>
            <td>${esc(c.plate_no || '—')}</td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted);">No collections in this range.</td></tr>';

      // Batch dropdown — only batches that have at least one collection
      const batchIdsWithCollections = new Set(collections.map(c => c.batch_id).filter(Boolean));
      const batchOpts = batches
        .filter(b => batchIdsWithCollections.has(b.id))
        .slice()
        .sort((a, b) => (a.batch_number || '').localeCompare(b.batch_number || ''))
        .map(b => `<option value="${esc(b.id)}" ${collectionsFilter.batch === b.id ? 'selected' : ''}>${esc(b.batch_number || b.id)}</option>`)
