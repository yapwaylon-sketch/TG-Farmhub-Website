<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="https://tgfarmhub.com/assets/logo.png?v=2">
<title>Deliveries — TG FarmHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.7/build/js/intlTelInputWithUtils.min.js"></script>
<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   Delivery Page — Mobile-First
   ═══════════════════════════════════════════════════════════════ */
body { overflow: auto; height: auto; min-height: 100vh; }

/* Login */
#login-screen {
  display: flex; justify-content: center; align-items: center;
  height: 100vh; width: 100vw; background: var(--bg);
  position: fixed; inset: 0; z-index: 100;
}
.login-box {
  width: 90%; max-width: 340px; text-align: center;
  background: var(--bg-card); padding: 32px 24px; border-radius: 16px;
  border: 1px solid var(--border);
}
.login-box h2 { font-size: 22px; font-weight: 800; color: var(--white); margin-bottom: 4px; }
.login-box .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 12px 14px; margin-bottom: 12px;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
  color: var(--white); font-size: 15px; font-family: inherit;
}
.login-box input::placeholder { color: var(--text-dim); }
.login-box input:focus { outline: none; border-color: var(--green); }
.login-box .btn-login {
  width: 100%; padding: 12px; font-size: 15px; font-weight: 700;
  background: var(--green); color: #fff; border: none; border-radius: 10px;
  cursor: pointer; font-family: inherit; min-height: 48px;
}
.login-box .btn-login:active { opacity: 0.85; }

/* Main app */
#app-main { display: none; }

/* Header bar */
.delivery-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.delivery-header h1 { flex: 1; font-size: 18px; font-weight: 800; color: var(--white); margin: 0; }
.hdr-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text-muted); cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.hdr-btn:active { background: var(--border); }
.hdr-btn svg { width: 18px; height: 18px; }

/* Content area */
.delivery-content { padding: 12px 12px 80px; }

/* Delivery card */
.delivery-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-left: 4px solid var(--green); border-radius: 12px;
  padding: 16px; margin-bottom: 12px;
}
.dc-customer { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
.dc-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.dc-meta a {
  font-size: 13px; color: var(--green-light); text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}
.dc-meta a:active { opacity: 0.7; }
.dc-meta a svg { width: 14px; height: 14px; flex-shrink: 0; }
.dc-items { list-style: none; padding: 0; margin: 0 0 10px; }
.dc-items li {
  font-size: 14px; color: var(--text); padding: 3px 0;
  border-bottom: 1px solid var(--border);
}
.dc-items li:last-child { border-bottom: none; }
.dc-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.dc-total { font-size: 16px; font-weight: 700; color: var(--gold); }
.dc-badge {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 6px; background: var(--green-pale); color: var(--green-light);
}
.dc-badge.badge-do { background: rgba(100,149,237,0.15); color: #6495ED; }
.dc-badge.badge-cs { background: var(--gold-pale); color: var(--gold); }

.btn-deliver {
  width: 100%; padding: 14px; min-height: 52px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  background: var(--green); color: #fff; border: none; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-deliver:active { opacity: 0.85; }
.btn-deliver:disabled { opacity: 0.5; cursor: not-allowed; }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; margin-bottom: 16px; }
.btn-refresh-empty {
  padding: 10px 24px; font-size: 14px; font-weight: 600;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); cursor: pointer; font-family: inherit;
}

/* Completed section */
.completed-toggle {
  width: 100%; padding: 12px 16px; font-size: 14px; font-weight: 600;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-muted); cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.completed-toggle:active { background: var(--bg-hover); }
.completed-toggle .arrow { transition: transform 0.2s; }
.completed-toggle.open .arrow { transform: rotate(180deg); }
#completed-list { display: none; margin-top: 8px; }
#completed-list .delivery-card { border-left-color: var(--text-dim); opacity: 0.7; }

/* Document view */
#doc-view {
  display: none; position: fixed; inset: 0; z-index: 80;
  background: var(--bg); overflow-y: auto;
}
#doc-view .doc-toolbar {
  display: flex; gap: 8px; padding: 12px 16px;
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 81; flex-wrap: wrap;
}
#doc-view .doc-toolbar .btn-doc {
  flex: 1; min-width: 80px; min-height: 44px; padding: 10px;
  font-size: 13px; font-weight: 600; font-family: inherit;
  border: none; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-doc.btn-print { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
.btn-doc.btn-share { background: #25D366; color: #fff; }
.btn-doc.btn-done { background: var(--green); color: #fff; }

/* Document content (white, professional) */
#doc-content {
  background: #fff; color: #222; font-family: 'Arial','Helvetica Neue',sans-serif;
  max-width: 500px; margin: 16px auto; padding: 28px 24px;
  border-radius: 4px;
}
#doc-content table { width: 100%; border-collapse: collapse; margin: 8px 0; }
#doc-content th { background: #1a1a1a; color: #d4af37; padding: 7px 8px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
#doc-content th:last-child, #doc-content td:last-child { text-align: right; }
#doc-content td { padding: 6px 8px; border-bottom: 1px solid #e0e0e0; font-size: 12px; vertical-align: top; }
#doc-content .doc-header { text-align: center; margin-bottom: 16px; }
#doc-content .doc-header h2 { font-size: 16px; margin: 0; color: #1a3a1a; font-weight: 800; letter-spacing: 1px; }
#doc-content .doc-header p { font-size: 10px; color: #666; margin: 2px 0; }
#doc-content .doc-title { text-align: center; font-size: 14px; font-weight: 700; margin: 14px 0 6px; border-top: 2px solid #d4af37; border-bottom: 2px solid #d4af37; padding: 8px 4px; color: #1a1a1a; }
#doc-content .doc-doc-number { text-align: center; font-size: 16px; font-weight: 800; color: #1a3a1a; margin-bottom: 14px; }
#doc-content .doc-info-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; font-size: 12px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
#doc-content .doc-info-label { color: #666; font-weight: 600; white-space: nowrap; }
#doc-content .doc-info-value { color: #222; }
#doc-content .doc-totals { text-align: right; margin-top: 6px; padding-top: 8px; border-top: 1px solid #ccc; }
#doc-content .doc-totals div { font-size: 12px; margin-bottom: 3px; }
#doc-content .doc-grand-total { font-size: 16px !important; font-weight: 800; color: #1a1a1a; margin-top: 4px !important; padding-top: 6px; border-top: 2px solid #1a1a1a; }
#doc-content .doc-payment-section { margin-top: 18px; padding-top: 14px; border-top: 1px dashed #ccc; font-size: 12px; }
#doc-content .doc-sig-line { border-bottom: 1px solid #999; display: inline-block; width: 180px; margin-left: 8px; }
#doc-content .doc-footer { text-align: center; font-size: 9px; color: #999; margin-top: 24px; padding-top: 10px; border-top: 1px solid #e0e0e0; }

/* Print */
@media print {
  body * { visibility: hidden; }
  #doc-content, #doc-content * { visibility: visible; }
  #doc-content { position: absolute; left: 0; top: 0; margin: 0; padding: 20px; max-width: 100%; box-shadow: none; border-radius: 0; }
  #doc-view .doc-toolbar { display: none; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h2>&#127821; Deliveries</h2>
    <div class="login-sub">Sign in to view pending deliveries</div>
    <input type="text" id="login-username" placeholder="Username" autocomplete="off">
    <input type="password" id="login-pin" placeholder="Enter 6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" onkeydown="if(event.key==='Enter')doLogin();" oninput="if(this.value.length===6)doLogin();" onkeypress="if(event.charCode<48||event.charCode>57)event.preventDefault();">
    <button class="btn-login" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Main App -->
<div id="app-main">
  <!-- Header -->
  <div class="delivery-header">
    <h1>&#127821; Deliveries</h1>
    <button class="hdr-btn" onclick="refreshData()" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
    <button class="hdr-btn" onclick="doLogout()" title="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- Delivery List -->
  <div class="delivery-content">
    <div id="delivery-list"></div>

    <!-- Completed Today -->
    <button class="completed-toggle" id="completed-toggle" onclick="toggleCompleted()" style="display:none;">
      <span>Completed Today (<span id="completed-count">0</span>)</span>
      <span class="arrow">&#9660;</span>
    </button>
    <div id="completed-list"></div>
  </div>
</div>

<!-- Qty Confirmation Modal -->
<div id="del-qty-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:440px;" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal('del-qty-modal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-title">Confirm Delivered Quantities</div>
    <div class="modal-subtitle" style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">Adjust if items were damaged or short.</div>
    <div id="del-qty-items"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('del-qty-modal')">Cancel</button>
      <button class="btn btn-primary" id="del-qty-confirm-btn" onclick="delQtyConfirm()">Confirm</button>
    </div>
  </div>
</div>

<!-- Photo Modal -->
<div id="del-photo-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:380px;" onclick="event.stopPropagation()">
    <div class="modal-title">Delivery Photo</div>
    <div class="modal-subtitle" style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">Take a photo as proof of delivery.</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-primary" id="del-photo-take" style="min-height:48px;">Take Photo</button>
      <button class="btn btn-outline" id="del-photo-album" style="min-height:48px;">From Album</button>
    </div>
    <input type="file" id="del-photo-input" accept="image/*" capture="environment" style="display:none;">
    <input type="file" id="del-photo-input-album" accept="image/*" style="display:none;">
  </div>
</div>

<!-- Payment Decision Modal (CS only) -->
<div id="del-paydecision-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:380px;" onclick="event.stopPropagation()">
    <div class="modal-title">Payment Collection</div>
    <div id="del-paydecision-info" style="font-size:13px;margin-bottom:16px;"></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-primary" style="min-height:48px;" onclick="delPayDecision('now')">Collect Payment Now</button>
      <button class="btn btn-outline" style="min-height:48px;" onclick="delPayDecision('later')">Pay Later</button>
    </div>
  </div>
</div>

<!-- Payment Collection Modal -->
<div id="del-pay-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:380px;" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="delPayDecision('later')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-title">Receive Payment</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--text-muted);">Amount (RM)</label>
      <input type="number" id="del-pay-amount" step="0.01" min="0.01" style="width:100%;padding:10px;font-size:16px;font-weight:700;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text);">
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--text-muted);">Method</label>
      <select id="del-pay-method" style="width:100%;padding:10px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text);">
        <option value="cash">Cash</option>
        <option value="bank_transfer">Bank Transfer</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="delPayDecision('later')">Skip</button>
      <button class="btn btn-primary" id="del-pay-confirm-btn" onclick="delPayConfirm()">Confirm Payment</button>
    </div>
  </div>
</div>

<!-- Document View (full-screen overlay) -->
<div id="doc-view">
  <div class="doc-toolbar">
    <button class="btn-doc btn-print" onclick="printDoc()">&#128424; Print</button>
    <button class="btn-doc btn-share" onclick="shareDoc()">&#128172; Share</button>
    <button class="btn-doc btn-done" onclick="closeDoc()">Done</button>
  </div>
  <div id="doc-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
var currentUser = null;
var users = [];
var orders = [];
var orderItems = [];
var customers = [];
var salesProducts = [];
var varieties = [];
var allWorkers = [];
var refreshTimer = null;
var docCurrentOrder = null;

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════
async function loadUsers() {
  var data = await sbQuery(sb.from('users').select('*'));
  users = data || [];
}

function doLogin() {
  if (!checkLoginRateLimit()) return;
  var u = document.getElementById('login-username').value.trim().toLowerCase();
  var p = document.getElementById('login-pin').value.trim();
  if (!u || !p) { notify('Enter username and PIN', 'warning'); return; }

  var user = users.find(function(x) { return x.username && x.username.toLowerCase() === u && x.pin === p; });
  if (!user) {
    recordFailedLogin();
    notify('Invalid credentials', 'warning');
    return;
  }

  clearLoginAttempts();
  currentUser = user;
  localStorage.setItem('tgfarmhub_delivery_user', JSON.stringify({ id: user.id, username: user.username, displayName: user.displayName || user.username }));
  localStorage.setItem('tgfarmhub_delivery_last_user', user.username);
  showApp();
}

function tryRestoreSession() {
  try {
    var s = JSON.parse(localStorage.getItem('tgfarmhub_delivery_user'));
    if (s && s.id) {
      var u = users.find(function(x) { return x.id === s.id; });
      if (u) { currentUser = u; return true; }
    }
  } catch(e) {}
  // Pre-fill last username
  var lastUser = localStorage.getItem('tgfarmhub_delivery_last_user');
  if (lastUser) document.getElementById('login-username').value = lastUser;
  return false;
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('tgfarmhub_delivery_user');
  if (refreshTimer) clearInterval(refreshTimer);
  if (inactivityTimer) clearTimeout(inactivityTimer);
  document.getElementById('app-main').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  // Pre-fill last username on logout
  var lastUser = localStorage.getItem('tgfarmhub_delivery_last_user');
  if (lastUser) document.getElementById('login-username').value = lastUser;
  document.getElementById('login-pin').value = '';
}

var inactivityTimer = null;
var INACTIVITY_TIMEOUT = 60 * 60 * 1000; // 60 minutes

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-main').style.display = 'block';
  loadAllData();
  // Auto-refresh every 30 seconds
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshData, 30000);
  // Inactivity timeout
  resetInactivityTimer();
  ['touchstart', 'click', 'keydown', 'scroll'].forEach(function(evt) {
    document.addEventListener(evt, resetInactivityTimer, { passive: true });
  });
}

function resetInactivityTimer() {
  if (inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(function() {
    if (currentUser) {
      notify('Session expired due to inactivity', 'warning');
      doLogout();
    }
  }, INACTIVITY_TIMEOUT);
}

// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
async function loadAllData() {
  var results = await Promise.all([
    sbQuery(sb.from('sales_orders').select('*').eq('company_id', 'tg_agro_fruits').in('status', ['delivering', 'completed']).order('created_at', { ascending: false })),
    sbQuery(sb.from('sales_customers').select('*').eq('company_id', 'tg_agro_fruits')),
    sbQuery(sb.from('sales_products').select('*').eq('company_id', 'tg_agro_fruits')),
    sbQuery(sb.from('crop_varieties').select('id,name')),
    sbQuery(sb.from('workers').select('id,name'))
  ]);

  orders = results[0] || [];
  customers = results[1] || [];
  salesProducts = results[2] || [];
  varieties = results[3] || [];
  allWorkers = results[4] || [];

  // Load items only for displayed orders (not all historical items)
  var orderIds = orders.map(function(o) { return o.id; });
  if (orderIds.length > 0) {
    orderItems = await sbQuery(sb.from('sales_order_items').select('*').in('order_id', orderIds)) || [];
  } else {
    orderItems = [];
  }

  renderDeliveries();
}

async function refreshData() {
  await loadAllData();
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function findCustomer(id) {
  return customers.find(function(c) { return c.id === id; });
}

function findProduct(id) {
  return salesProducts.find(function(p) { return p.id === id; });
}

function getVarietyName(varId) {
  var v = varieties.find(function(x) { return x.id === varId; });
  return v ? v.name : '';
}

function getDriverName(driverId) {
  var w = allWorkers.find(function(x) { return x.id === driverId; });
  return w ? w.name : '';
}

function getTodayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function getItemDisplay(item) {
  var prod = findProduct(item.product_id);
  var prodName = prod ? prod.name : 'Unknown';
  var varietyName = prod && prod.variety_id ? getVarietyName(prod.variety_id) : '';
  var parts = [];
  if (varietyName) parts.push(varietyName);
  parts.push(prodName);
  if (item.index_min != null && item.index_max != null) {
    parts.push('(Index ' + item.index_min + '-' + item.index_max + ')');
  }
  var isPcs = item.order_pcs != null;
  var qty, unit;
  if (isPcs) {
    qty = item.order_pcs;
    unit = 'pcs';
    if (item.quantity > 0) qty += ' (' + item.quantity + (item.unit || 'kg') + ')';
  } else {
    qty = item.quantity != null ? item.quantity : 0;
    unit = item.unit || 'kg';
  }
  return { label: parts.join(' '), qty: qty, unit: unit };
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderDeliveries() {
  var today = getTodayStr();
  var delivering = [];
  var completedToday = [];

  orders.forEach(function(o) {
    if (o.status === 'delivering') {
      delivering.push(o);
    } else if (o.status === 'completed') {
      var checkDate = o.completed_at ? o.completed_at.slice(0, 10) : (o.delivery_date || '');
      if (checkDate === today) completedToday.push(o);
    }
  });

  var listEl = document.getElementById('delivery-list');
  var html = '';

  if (delivering.length === 0) {
    html += '<div class="empty-state">';
    html += '<div class="emoji">&#127881;</div>';
    html += '<p>No pending deliveries</p>';
    html += '<button class="btn-refresh-empty" onclick="refreshData()">Refresh</button>';
    html += '</div>';
  } else {
    delivering.forEach(function(o) {
      html += renderDeliveryCard(o);
    });
  }

  listEl.innerHTML = html;

  // Completed today
  var toggleBtn = document.getElementById('completed-toggle');
  var completedEl = document.getElementById('completed-list');
  document.getElementById('completed-count').textContent = completedToday.length;

  if (completedToday.length > 0) {
    toggleBtn.style.display = 'flex';
    var cHtml = '';
    completedToday.forEach(function(o) {
      cHtml += renderCompletedCard(o);
    });
    completedEl.innerHTML = cHtml;
  } else {
    toggleBtn.style.display = 'none';
    completedEl.innerHTML = '';
    completedEl.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════
// MARK DELIVERED — Atomic Flow
// Step 1: Qty confirmation → Step 2: Photo → Step 3: Payment (CS) → Commit
// ═══════════════════════════════════════════════════════════════
var delPending = null; // { orderId, items: [], photoUrl, payment: null }

// Step 1: Show qty confirmation modal
async function markDelivered(orderId) {
  var o = orders.find(function(x) { return x.id === orderId; });
  if (!o) return;
  var items = orderItems.filter(function(i) { return i.order_id === orderId; });
  // Guard: if local cache is empty, re-fetch from DB. Prevents blind-confirm → subtotal=0.
  if (!items.length) {
    var fresh = await sbQuery(sb.from('sales_order_items').select('*').eq('order_id', orderId));
    if (fresh && fresh.length) {
      fresh.forEach(function(f) { if (!orderItems.find(function(x) { return x.id === f.id; })) orderItems.push(f); });
      items = orderItems.filter(function(i) { return i.order_id === orderId; });
    }
  }
  if (!items.length) { notify('No items found — cannot mark delivered', 'error'); return; }

  delPending = { orderId: orderId, items: [], photoUrl: null, payment: null };

  var html = '';
  items.forEach(function(item, idx) {
    var display = getItemDisplay(item);
    var isPcs = item.order_pcs != null;
    var currentQty = isPcs ? (item.quantity || 0) : (item.quantity || 0);
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);">';
    html += '<div style="flex:1;font-size:13px;">' + esc(display.label);
    if (isPcs) html += '<br><span style="font-size:11px;color:var(--text-muted);">Ordered: ' + item.order_pcs + ' pcs</span>';
    html += '</div>';
    html += '<input type="number" step="0.01" min="0" value="' + currentQty + '" data-item-id="' + esc(item.id) + '" data-price="' + (item.unit_price || 0) + '" data-is-pcs="' + (isPcs ? '1' : '0') + '" class="del-qty-input" style="width:80px;padding:8px;text-align:center;font-size:14px;font-weight:700;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text);">';
    html += '<span style="font-size:12px;color:var(--text-muted);min-width:24px;">' + esc(isPcs ? 'kg' : (item.unit || 'kg')) + '</span>';
    html += '</div>';
  });
  document.getElementById('del-qty-items').innerHTML = html;
  document.getElementById('del-qty-modal').style.display = 'flex';
}

// Step 1 confirm
function delQtyConfirm() {
  if (!delPending) return;
  var inputs = document.querySelectorAll('.del-qty-input');
  var pendingItems = [];
  inputs.forEach(function(inp) {
    var qty = parseFloat(inp.value) || 0;
    var price = parseFloat(inp.getAttribute('data-price')) || 0;
    pendingItems.push({
      id: inp.getAttribute('data-item-id'),
      quantity: qty,
      line_total: qty * price
    });
  });
  delPending.items = pendingItems;
  closeModal('del-qty-modal');

  // Step 2: Photo
  delShowPhoto();
}

// Step 2: Photo modal
function delShowPhoto() {
  var modal = document.getElementById('del-photo-modal');
  modal.style.display = 'flex';

  document.getElementById('del-photo-take').onclick = function() {
    modal.style.display = 'none';
    var input = document.getElementById('del-photo-input');
    input.value = '';
    input.onchange = async function() {
      if (!input.files.length) {
        // Cancelled — abort flow
        delPending = null;
        notify('Delivery cancelled', 'info');
        return;
      }
      notify('Uploading photo...', 'info');
      var url = await delUploadPhoto(input.files[0]);
      delPending.photoUrl = url;
      delAfterPhoto();
    };
    input.click();
  };

  document.getElementById('del-photo-album').onclick = function() {
    modal.style.display = 'none';
    var input = document.getElementById('del-photo-input-album');
    input.value = '';
    input.onchange = async function() {
      if (!input.files.length) {
        delPending = null;
        notify('Delivery cancelled', 'info');
        return;
      }
      notify('Uploading photo...', 'info');
      var url = await delUploadPhoto(input.files[0]);
      delPending.photoUrl = url;
      delAfterPhoto();
    };
    input.click();
  };
}

// Photo upload helper
function delUploadPhoto(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = async function() {
      URL.revokeObjectURL(img.src);
      var canvas = document.createElement('canvas');
      var maxW = 1200;
      var w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(async function(blob) {
        var path = 'orders/' + delPending.orderId + '/delivery-' + Date.now() + '.jpg';
        var result = await sbUpload(function() {
          return sb.storage.from('sales-photos').upload(path, blob, { contentType: 'image/jpeg', upsert: true });
        });
        if (result.error) { notify('Photo upload failed', 'error'); resolve(null); return; }
        var urlResult = sb.storage.from('sales-photos').getPublicUrl(path);
        resolve(urlResult.data.publicUrl);
      }, 'image/jpeg', 0.8);
    };
    img.onerror = function() { URL.revokeObjectURL(img.src); resolve(null); };
    img.src = URL.createObjectURL(file);
  });
}

// After photo: CS → payment decision, DO → commit
function delAfterPhoto() {
  if (!delPending) return;
  var o = orders.find(function(x) { return x.id === delPending.orderId; });
  if (!o) return;

  if (o.doc_type === 'cash_sales') {
    // Recalculate balance from pending items
    var newGrand = 0;
    delPending.items.forEach(function(it) { newGrand += it.line_total; });
    var paid = parseFloat(o.amount_paid) || 0;
    var balance = newGrand - paid;
    if (balance > 0.01) {
      document.getElementById('del-paydecision-info').innerHTML =
        '<strong>Cash Sales — ' + esc(o.doc_number || o.id) + '</strong><br>' +
        'New total: <strong>' + formatRM(newGrand) + '</strong><br>' +
        'Outstanding: <strong style="color:var(--gold);">' + formatRM(balance) + '</strong>';
      document.getElementById('del-pay-amount').value = balance.toFixed(2);
      document.getElementById('del-pay-amount').max = balance.toFixed(2);
      document.getElementById('del-paydecision-modal').style.display = 'flex';
      return;
    }
  }

  // DO or already paid CS — commit directly
  delCommitAll();
}

// Step 3: Payment decision
function delPayDecision(choice) {
  closeModal('del-paydecision-modal');
  if (choice === 'now') {
    document.getElementById('del-pay-modal').style.display = 'flex';
  } else {
    // Pay later — commit without payment
    delCommitAll();
  }
}

// Step 3b: Payment confirm
async function delPayConfirm() {
  var amount = parseFloat(document.getElementById('del-pay-amount').value) || 0;
  var method = document.getElementById('del-pay-method').value;
  if (amount <= 0) { notify('Enter a valid amount', 'warning'); return; }

  var payId = await dbNextId('SY');
  delPending.payment = {
    id: payId,
    amount: amount,
    method: method
  };

  closeModal('del-pay-modal');
  delCommitAll();
}

// Final commit — single atomic write
async function delCommitAll() {
  if (!delPending) return;
  var pending = delPending;
  var orderId = pending.orderId;
  var o = orders.find(function(x) { return x.id === orderId; });
  if (!o) { delPending = null; return; }

  // Disable all Mark Delivered buttons
  var btns = document.querySelectorAll('.btn-deliver');
  btns.forEach(function(b) { b.disabled = true; });

  try {
    // 1. Update each item's quantity and line_total
    for (var i = 0; i < pending.items.length; i++) {
      var it = pending.items[i];
      await sbQuery(sb.from('sales_order_items').update({
        quantity: it.quantity,
        line_total: it.line_total
      }).eq('id', it.id).select());
      // Update local
      var localItem = orderItems.find(function(x) { return x.id === it.id; });
      if (localItem) { localItem.quantity = it.quantity; localItem.line_total = it.line_total; }
    }

    // 2. Recalculate subtotal and grand total — authoritative from DB after the item UPDATEs above.
    var freshItems = await sbQuery(sb.from('sales_order_items').select('line_total').eq('order_id', orderId));
    if (freshItems === null) {
      notify('Network error verifying totals — retry Mark Delivered', 'error');
      delPending = null; return;
    }
    if (!freshItems.length) {
      notify('Order has no items — cannot mark delivered', 'error');
      delPending = null; return;
    }
    var newSubtotal = freshItems.reduce(function(s, r) { return s + (parseFloat(r.line_total) || 0); }, 0);
    if (newSubtotal === 0) {
      notify('All items have zero value — check quantities and retry', 'error');
      delPending = null; return;
    }
    var returnsTotal = parseFloat(o.return_total) || 0;
    var newGrand = Math.max(0, newSubtotal - returnsTotal);

    // 3. Build order update
    var orderUpdate = {
      status: 'completed',
      completed_at: new Date().toISOString(),
      subtotal: newSubtotal,
      grand_total: newGrand
    };
    if (pending.photoUrl) orderUpdate.delivery_photo_url = pending.photoUrl;

    // 4. Insert payment if collected — abort with clear error if this fails.
    //    Drivers are on mobile/cell networks; we must never flip the order to paid
    //    without a matching payment row (silent cash-missing bug in the books).
    if (pending.payment) {
      var payData = {
        id: pending.payment.id,
        order_id: orderId,
        amount: pending.payment.amount,
        payment_date: getTodayStr(),
        method: pending.payment.method,
        created_by: currentUser ? currentUser.id : null,
        company_id: 'tg_agro_fruits'
      };
      var payResult = await sbQuery(sb.from('sales_payments').insert(payData).select());
      if (payResult === null) {
        notify('Payment save failed — order NOT completed, please retry', 'error');
        delPending = null;
        return;
      }

      var totalPaid = (parseFloat(o.amount_paid) || 0) + pending.payment.amount;
      orderUpdate.amount_paid = totalPaid;
      orderUpdate.payment_status = totalPaid >= newGrand ? 'paid' : 'partial';
    }

    // 5. Commit order status
    var result = await sbQuery(sb.from('sales_orders').update(orderUpdate).eq('id', orderId).select());
    if (result === null) {
      notify('Items and payment saved, but order status update failed — refresh and retry', 'error');
      delPending = null;
      return;
    }

    // 6. Update local state
    Object.assign(o, orderUpdate);

    notify('Delivery completed!', 'success');
    delPending = null;
    renderDeliveries();
    showDoc(orderId);

  } catch(e) {
    notify('Error: ' + e.message, 'error');
  } finally {
    btns.forEach(function(b) { b.disabled = false; });
  }
}

async function printDoc() {
  // On mobile, use RawBT for thermal printing
  if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
    var docEl = document.getElementById('doc-content');
    if (!docEl) { notify('No document to print', 'warning'); return; }
    notify('Preparing print...', 'info', 2000);
    try {
      var canvas = await html2canvas(docEl, {
        scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false
      });
      var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      window.location.href = 'rawbt:' + dataUrl;
    } catch (e) {
      notify('Print failed: ' + e.message, 'error');
    }
    return;
  }
  window.print();
}

async function shareDoc() {
  var docEl = document.getElementById('doc-content');
  if (!docEl || !docCurrentOrder) { notify('No document to share', 'warning'); return; }

  notify('Generating image...', 'info', 2000);

  try {
    var canvas = await html2canvas(docEl, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });

    var blob = await new Promise(function(resolve) {
      canvas.toBlob(function(b) { resolve(b); }, 'image/png');
    });

    var fileName = (docCurrentOrder.doc_number || docCurrentOrder.id) + '.png';

    // Try Web Share API (mobile)
    if (navigator.share && navigator.canShare) {
      var file = new File([blob], fileName, { type: 'image/png' });
      var shareData = { files: [file], title: fileName };
      if (navigator.canShare(shareData)) {
        try {
          await navigator.share(shareData);
          notify('Document shared!', 'success');
          return;
        } catch(e) {
          if (e.name === 'AbortError') return;
        }
      }
    }

    // Fallback: download
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
    notify('Image downloaded', 'success');

  } catch(e) {
    notify('Failed to generate image: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
(async function init() {
  await loadUsers();
  if (tryRestoreSession()) {
    showApp();
  }
})();
</script>
