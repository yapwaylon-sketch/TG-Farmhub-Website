<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://tgfarmhub.com/assets/logo.png?v=2">
<title>TG Agro Fruits — Packing Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   CSS Variables & Reset
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* Industrial Warehouse palette */
  --bg:           #0E0E0E;   /* page + column body */
  --card:         #1A1A1A;   /* order card + footer bar */
  --divider:      #222;      /* column separators */
  --footer-border:#333;      /* footer top border */
  --text:         #ffffff;
  --text-muted:   #888;      /* footer text */
  --text-items:   #aaa;      /* card items line */

  /* Status accents */
  --c-received:   #FF5722;   /* orange */
  --c-preparing:  #FFC107;   /* amber */
  --c-prepared:   #4CAF50;   /* green */
  --c-delivering: #2196F3;   /* blue */

  /* Legacy tokens still used by gate/loading/auth */
  --bg-subtle:    #1A1A1A;
  --surface:      #1A1A1A;
  --surface-2:    #222;
  --border:       rgba(70, 80, 70, 0.5);
  --border-light: rgba(90, 100, 90, 0.6);
  --text-dim:     #b0b8b0;
  --green:        #4CAF50;
  --red:          #E86060;
  --font:         'Inter', -apple-system, sans-serif;
  --mono:         'Inter', monospace;
  --gold:         #FFC107;
  --blue:         #2196F3;
  --radius:       12px;
  --radius-sm:    8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  background-image: linear-gradient(135deg, var(--bg) 0%, var(--bg-subtle) 50%, var(--bg) 100%);
  background-attachment: fixed;
  color: var(--text);
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════
   Loading Overlay
   ═══════════════════════════════════════════════════════════════ */
#loadingOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s ease, filter 0.6s ease;
}
#loadingOverlay.done { opacity: 0; filter: blur(8px); pointer-events: none; }
.loader-ring {
  width: 44px; height: 44px;
  border: 2.5px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
  margin-top: 20px;
  font-size: 0.85rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* ═══════════════════════════════════════════════════════════════
   Auth Error
   ═══════════════════════════════════════════════════════════════ */
#authError {
  display: none;
  position: fixed; inset: 0; z-index: 10000;
  background: var(--bg);
  flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--red);
  font-size: 1.3rem;
  font-weight: 600;
}
#authError .sub {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-top: 8px;
  font-weight: 400;
}
#pwGate {
  position: fixed; inset: 0; z-index: 10001;
  background: var(--bg);
  background-image: linear-gradient(135deg, var(--bg) 0%, var(--bg-subtle) 50%, var(--bg) 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--font);
}
#pwGate img { width: 96px; height: 96px; border-radius: 16px; margin-bottom: 24px; }
#pwGate h1 { color: var(--text); font-size: 1.8rem; font-weight: 600; margin-bottom: 8px; }
#pwGate .gate-sub { color: var(--text-muted); font-size: 1rem; margin-bottom: 32px; }
#pwGate input {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px 24px;
  color: var(--text);
  font-size: 1.2rem;
  font-family: var(--font);
  width: 320px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
#pwGate input:focus { border-color: var(--green); }
#pwGate button {
  margin-top: 16px;
  background: var(--green);
  border: none;
  border-radius: 12px;
  padding: 14px 48px;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s;
}
#pwGate button:hover { opacity: 0.9; }
#pwGate .gate-error {
  color: var(--red);
  font-size: 0.9rem;
  margin-top: 12px;
  min-height: 20px;
}

/* ═══════════════════════════════════════════════════════════════
   Industrial Warehouse Layout
   ═══════════════════════════════════════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

/* ── Header bar ───────────────────────────────────────────────── */
.iw-header {
  flex-shrink: 0;
  background: var(--c-received);
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  min-height: 50px;
}
.iw-header-title {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2.5px;
}
.iw-header-clock {
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.iw-fs-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: 16px;
  line-height: 1;
}
.iw-fs-btn:hover { background: rgba(255,255,255,0.15); }
.iw-fs-btn svg { width: 16px; height: 16px; display: block; }

/* ── Column grid ──────────────────────────────────────────────── */
.iw-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--divider);
  min-height: 0;
  overflow: hidden;
}
.iw-col {
  background: var(--bg);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.iw-col.dimmed { opacity: 0.55; }
.iw-col.empty .iw-col-body { opacity: 0.30; }

/* Column header (count + label) */
.iw-col-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 3px solid currentColor;
}
.iw-col-count {
  font-size: 48px;
  font-weight: 900;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.iw-col-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #fff;
}
.iw-col[data-status="received"]   .iw-col-head { color: var(--c-received); }
.iw-col[data-status="preparing"]  .iw-col-head { color: var(--c-preparing); }
.iw-col[data-status="prepared"]   .iw-col-head { color: var(--c-prepared); }
.iw-col[data-status="delivering"] .iw-col-head { color: var(--c-delivering); }

/* Column body — order cards stack */
.iw-col-body {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Order card ───────────────────────────────────────────────── */
.iw-card {
  background: var(--card);
  padding: 12px 14px;
  border-left: 4px solid currentColor;
  flex-shrink: 0;
}
.iw-col[data-status="received"]   .iw-card { color: var(--c-received); }
.iw-col[data-status="preparing"]  .iw-card { color: var(--c-preparing); }
.iw-col[data-status="prepared"]   .iw-card { color: var(--c-prepared); }
.iw-col[data-status="delivering"] .iw-card { color: var(--c-delivering); }

.iw-card-customer {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 3px;
}
.iw-card-items {
  font-size: 10px;
  color: var(--text-items);
  line-height: 1.5;
}
.iw-card-meta {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.8px;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  /* color is inherited from .iw-col[data-status=...] */
}

/* ── Footer bar ───────────────────────────────────────────────── */
.iw-footer {
  flex-shrink: 0;
  background: var(--card);
  border-top: 1px solid var(--footer-border);
  padding: 11px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.iw-footer-right {
  display: flex;
  gap: 14px;
}

/* ── No-data state (all four columns empty) ───────────────────── */
.iw-no-data {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 2px;
}

/* ── 4K TV scaling ─────────────────────────────────────────────── */
@media (min-width: 2560px) {
  .iw-header-title, .iw-header-clock { font-size: 16px; }
  .iw-col-count { font-size: 60px; }
  .iw-col-label { font-size: 13px; }
  .iw-card-customer { font-size: 16px; }
  .iw-card-items { font-size: 12px; }
  .iw-card-meta { font-size: 11px; }
  .iw-footer { font-size: 12px; }
}
@media (min-width: 3840px) {
  .iw-header-title, .iw-header-clock { font-size: 20px; }
  .iw-col-count { font-size: 76px; }
  .iw-col-label { font-size: 16px; }
  .iw-card-customer { font-size: 19px; }
  .iw-card-items { font-size: 14px; }
  .iw-card-meta { font-size: 13px; }
  .iw-footer { font-size: 12px; }
}
</style>
</head>
<body>

<!-- Password Gate -->
<div id="pwGate">
  <img src="https://tgfarmhub.com/assets/logo.png?v=2" alt="TG">
  <h1>Packing Station Display</h1>
  <div class="gate-sub">Enter password to continue</div>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="off" autofocus>
  <div class="gate-error" id="pwError"></div>
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loadStatus">Connecting to sales data...</div>
</div>

<!-- App -->
<div class="app" id="appContainer" style="display:none;">
  <!-- Header -->
  <div class="header-row">
    <header class="app-header">
      <img src="https://tgfarmhub.com/assets/logo.png?v=2" alt="TG Agro Fruits" class="header-logo">
      <div class="header-text">
        <div class="header-title">
          <span>TG Agro Fruits — Packing Station</span>
          <span class="live-dot"></span>
          <span class="live-label">Live</span>
        </div>
        <div class="header-meta">
          <span id="clockDisplay"></span>
          <span id="lastUpdate"></span>
        </div>
      </div>
      <button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()" title="Toggle fullscreen">
        <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path id="fsExpand" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
          <path id="fsShrink" d="M4 14h3a2 2 0 012 2v3m6-9h3a2 2 0 002-2V5m-9 0v3a2 2 0 01-2 2H4m16 4v3a2 2 0 01-2 2h-3" style="display:none"/>
        </svg>
      </button>
    </header>
  </div>

  <!-- Content -->
  <div class="content-area" id="contentArea"></div>

  <!-- Footer -->
  <div class="footer-bar">
    <span id="refreshInfo">Auto-refresh: 60s</span>
    <div class="page-dots" id="pageDots"></div>
    <span id="pageInfo"></span>
    <span id="dataTime"></span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PASSWORD GATE — session-based, re-prompts on browser restart
// ═══════════════════════════════════════════════════════════════
const TV_PASSWORD = "tgtukau892312";
const SESSION_KEY = "tg_tv_auth";

function checkPassword() {
  const input = document.getElementById("pwInput");
  const error = document.getElementById("pwError");
  if (input.value === TV_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, "1");
    document.getElementById("pwGate").style.display = "none";
    document.getElementById("loadingOverlay").style.display = "flex";
    init();
  } else {
    error.textContent = "Incorrect password";
    input.value = "";
    input.focus();
  }
}

// Allow Enter key to submit
document.getElementById("pwInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPassword();
});

// If already authenticated this session, skip the gate
const tvAuthed = sessionStorage.getItem(SESSION_KEY) === "1";
if (tvAuthed) {
  document.getElementById("pwGate").style.display = "none";
} else {
  // Hide loading overlay until password is entered
  document.getElementById("loadingOverlay").style.display = "none";
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = "https://qwlagcriiyoflseduvvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bGFnY3JpaXlvZmxzZWR1dnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDgxNDYsImV4cCI6MjA4NzkyNDE0Nn0.OJvzNykb_JjejFlWlEy7QUKJjL7bfiaQI0pPx62P5YA";
const HEADERS = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };

async function sbGet(table, select, params) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?select=" + encodeURIComponent(select);
  if (params) url += "&" + params;
  const res = await fetch(url, { headers: HEADERS });
  if (!res.ok) throw new Error("Failed to load " + table);
  return res.json();
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let orders = [];
let orderItems = [];
let customers = {};
let products = {};
let varieties = {};

let pages = [];
let currentPage = 0;
let rotateTimer = null;
let paused = false;

const STATUS_CONFIG = [
  { key: "pending",    label: "ORDER RECEIVED",    emoji: "\u23F3",       cssClass: "sg-pending",    borderClass: "border-pending",    dimmed: false },
  { key: "preparing",  label: "PREPARING",         emoji: "\uD83D\uDD04", cssClass: "sg-preparing",  borderClass: "border-preparing",  dimmed: false },
  { key: "prepared",   label: "PREPARED",          emoji: "\u2705",       cssClass: "sg-prepared",   borderClass: "border-prepared",   dimmed: false },
  { key: "delivering", label: "OUT FOR DELIVERY",  emoji: "\uD83D\uDE9A", cssClass: "sg-delivering", borderClass: "border-delivering", dimmed: true  },
  { key: "completed",  label: "COMPLETED",         emoji: "\uD83C\uDFC1", cssClass: "sg-completed",  borderClass: "border-completed",  dimmed: true  }
];

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
function getTodayAndTomorrow() {
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const fmt = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  return { today: fmt(today), tomorrow: fmt(tomorrow) };
}

async function loadData() {
  const { today, tomorrow } = getTodayAndTomorrow();

  const [ordersData, itemsData, customersData, productsData, varietiesData] = await Promise.all([
    sbGet("sales_orders", "*", "company_id=eq.tg_agro_fruits&delivery_date=gte." + today + "&delivery_date=lte." + tomorrow + "&order=delivery_date,delivery_time"),
    sbGet("sales_order_items", "*", "company_id=eq.tg_agro_fruits"),
    sbGet("sales_customers", "id,name", "company_id=eq.tg_agro_fruits"),
    sbGet("sales_products", "id,name,variety_id", "company_id=eq.tg_agro_fruits"),
    sbGet("crop_varieties", "id,name")
  ]);

  orders = ordersData || [];
  orderItems = itemsData || [];

  // Build lookup maps
  customers = {};
  (customersData || []).forEach(c => { customers[c.id] = c.name; });

  products = {};
  (productsData || []).forEach(p => { products[p.id] = p; });

  varieties = {};
  (varietiesData || []).forEach(v => { varieties[v.id] = v.name; });

  // Filter order items to only include items for loaded orders
  const orderIds = new Set(orders.map(o => o.id));
  orderItems = orderItems.filter(item => orderIds.has(item.order_id));
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  if (s == null) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function formatDeliveryDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);

  const isToday = d.toDateString() === today.toDateString();
  const isTomorrow = d.toDateString() === tomorrow.toDateString();

  if (isToday) return "Today";
  if (isTomorrow) return "Tomorrow";
  const dd = String(d.getDate()).padStart(2, '0');
  const mmm = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return dd + ' ' + mmm;
}

function formatTime(timeStr) {
  if (!timeStr) return "";
  const parts = timeStr.split(":");
  let h = parseInt(parts[0]);
  const m = parts[1] || "00";
  const ampm = h >= 12 ? "PM" : "AM";
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return h + ":" + m + " " + ampm;
}

function getItemDisplay(item) {
  const prod = products[item.product_id];
  const prodName = prod ? prod.name : "Unknown";
  const varietyName = prod && prod.variety_id ? varieties[prod.variety_id] : null;

  let parts = [];
  if (varietyName) parts.push(varietyName);

  // Product name (may include index range info)
  parts.push(prodName);

  // Index range
  if (item.index_min != null && item.index_max != null) {
    parts.push("(" + item.index_min + "-" + item.index_max + ")");
  }

  const label = parts.join(" ");
  const qty = item.quantity != null ? item.quantity : 0;
  const unit = item.unit || "kg";

  return { label, qty, unit };
}

function getFulfillmentBadge(order) {
  const type = (order.fulfillment_type || "delivery").toLowerCase();
  if (type === "collection" || type === "pickup") {
    return '<span class="fulfillment-badge">\uD83C\uDFEA Collection</span>';
  }
  return '<span class="fulfillment-badge">\uD83D\uDCE6 Delivery</span>';
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('fsExpand').style.display = isFs ? 'none' : '';
  document.getElementById('fsShrink').style.display = isFs ? '' : 'none';
});

// ═══════════════════════════════════════════════════════════════
// BUILD PAGES
// ═══════════════════════════════════════════════════════════════
function buildPages() {
  // Group orders by status
  const grouped = {};
  STATUS_CONFIG.forEach(s => { grouped[s.key] = []; });

  orders.forEach(order => {
    const status = (order.status || "pending").toLowerCase().replace(/\s+/g, '_');
    if (!grouped[status]) grouped[status] = [];

    // Attach items to order
    const items = orderItems.filter(i => i.order_id === order.id);
    grouped[status].push({ ...order, items });
  });

  // Sort each group FIFO (oldest first by created_at)
  Object.keys(grouped).forEach(key => {
    grouped[key].sort((a, b) => {
      const aT = a.created_at || '';
      const bT = b.created_at || '';
      return aT.localeCompare(bT);
    });
  });

  // Build content blocks: array of { type: 'header'|'cards', ... }
  const blocks = [];
  STATUS_CONFIG.forEach(sc => {
    const grp = grouped[sc.key];
    if (!grp || grp.length === 0) return;
    blocks.push({ type: 'header', config: sc, count: grp.length });
    blocks.push({ type: 'cards', config: sc, orders: grp });
  });

  if (blocks.length === 0) {
    pages = [];
    return;
  }

  // Estimate how many cards fit per page
  const maxCards = calcMaxCards();

  // Flatten into pages
  pages = [];
  let currentPageBlocks = [];
  let currentCardCount = 0;

  blocks.forEach(block => {
    if (block.type === 'header') {
      currentPageBlocks.push(block);
    } else if (block.type === 'cards') {
      const ordersList = block.orders;
      let idx = 0;

      while (idx < ordersList.length) {
        const remaining = maxCards - currentCardCount;
        if (remaining <= 0) {
          // Start new page
          pages.push({ blocks: currentPageBlocks });
          currentPageBlocks = [{ type: 'header', config: block.config, count: ordersList.length, continued: true }];
          currentCardCount = 0;
        }

        const take = Math.min(ordersList.length - idx, maxCards - currentCardCount);
        if (take <= 0) {
          pages.push({ blocks: currentPageBlocks });
          currentPageBlocks = [{ type: 'header', config: block.config, count: ordersList.length, continued: true }];
          currentCardCount = 0;
          continue;
        }

        const slice = ordersList.slice(idx, idx + take);
        currentPageBlocks.push({ type: 'cards', config: block.config, orders: slice });
        currentCardCount += slice.length;
        idx += take;
      }
    }
  });

  if (currentPageBlocks.length > 0) {
    pages.push({ blocks: currentPageBlocks });
  }
}

function calcMaxCards() {
  // Estimate based on viewport height
  const headerH = 90;
  const footerH = 40;
  const available = window.innerHeight - headerH - footerH - 40;
  // Each card ~110px, header ~45px, assume ~2 status groups visible
  const cardH = 110;
  const statusHeaderH = 45;
  const estimatedHeaders = 2;
  const usable = available - (estimatedHeaders * statusHeaderH);
  return Math.max(3, Math.floor(usable / cardH));
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderPages() {
  const container = document.getElementById("contentArea");
  const dotsEl = document.getElementById("pageDots");

  if (pages.length === 0) {
    container.innerHTML = '<div class="no-data">No orders for today or tomorrow</div>';
    dotsEl.innerHTML = '';
    document.getElementById("pageInfo").textContent = '';
    return;
  }

  container.innerHTML = pages.map((pg, i) => {
    let html = '<div class="sales-page' + (i === currentPage ? ' active' : '') + '" id="page-' + i + '">';

    pg.blocks.forEach(block => {
      const dimClass = block.config.dimmed ? ' dimmed' : '';
      if (block.type === 'header') {
        const contLabel = block.continued ? ' (cont.)' : '';
        html += '<div class="status-group-header ' + block.config.cssClass + dimClass + '">' +
          '<span class="emoji">' + block.config.emoji + '</span>' +
          '<span>' + block.config.label + contLabel + '</span>' +
          '<span class="count">(' + block.count + ')</span>' +
        '</div>';
      } else if (block.type === 'cards') {
        html += '<div class="orders-grid' + dimClass + '">';
        block.orders.forEach(order => {
          const custName = customers[order.customer_id] || "Unknown Customer";
          const dateFmt = formatDeliveryDate(order.delivery_date);
          const timeFmt = order.delivery_time ? formatTime(order.delivery_time) : "";
          const dateTimeStr = dateFmt + (timeFmt ? " " + timeFmt : "");

          html += '<div class="order-card ' + block.config.borderClass + '">';
          html += '<div class="order-header">';
          html += '<div class="order-customer">' + esc(custName) + '</div>';
          html += '<div class="order-datetime">' + esc(dateTimeStr) + '</div>';
          html += '</div>';

          // Items
          if (order.items && order.items.length > 0) {
            html += '<ul class="order-items">';
            order.items.forEach(item => {
              const display = getItemDisplay(item);
              html += '<li>' + esc(display.label) + ' — <span class="item-qty">' + display.qty + ' ' + esc(display.unit) + '</span></li>';
            });
            html += '</ul>';
          }

          // Footer: fulfillment badge + notes
          html += '<div class="order-footer">';
          html += getFulfillmentBadge(order);
          if (order.notes) {
            html += '<div class="order-notes" title="' + esc(order.notes) + '">' + esc(order.notes) + '</div>';
          }
          html += '</div>';
          html += '</div>'; // .order-card
        });
        html += '</div>'; // .orders-grid
      }
    });

    html += '</div>'; // .sales-page
    return html;
  }).join('');

  // Page dots
  if (pages.length > 1) {
    dotsEl.innerHTML = pages.map((_, i) =>
      '<div class="page-dot' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '"></div>'
    ).join('');
    dotsEl.querySelectorAll('.page-dot').forEach(dot => {
      dot.addEventListener('click', function() {
        const idx = parseInt(this.getAttribute('data-page'));
        if (idx === currentPage) return;
        showPage(idx);
        scheduleNextPage();
      });
    });
    document.getElementById("pageInfo").textContent = "Page " + (currentPage + 1) + "/" + pages.length;
  } else {
    dotsEl.innerHTML = '';
    document.getElementById("pageInfo").textContent = '';
  }
}

function showPage(idx) {
  const cur = document.getElementById("page-" + currentPage);
  if (cur) cur.classList.remove("active");

  currentPage = idx % pages.length;

  setTimeout(() => {
    const next = document.getElementById("page-" + currentPage);
    if (next) next.classList.add("active");

    document.querySelectorAll(".page-dot").forEach((d, i) => {
      d.classList.toggle("active", i === currentPage);
    });

    if (pages.length > 1) {
      document.getElementById("pageInfo").textContent = "Page " + (currentPage + 1) + "/" + pages.length;
    }
  }, 50);
}

function nextPage() {
  if (pages.length <= 1) return;
  showPage(currentPage + 1);
}

// ═══════════════════════════════════════════════════════════════
// PAGE ROTATION
// ═══════════════════════════════════════════════════════════════
function scheduleNextPage() {
  if (rotateTimer) clearTimeout(rotateTimer);
  if (paused) return;
  if (pages.length > 1) {
    rotateTimer = setTimeout(() => { nextPage(); scheduleNextPage(); }, 15000);
  }
}

// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const opts = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  document.getElementById("clockDisplay").textContent = now.toLocaleDateString('en-GB', opts);
}

function updateLastRefresh() {
  const now = new Date();
  const hm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  document.getElementById("dataTime").textContent = "Data: " + hm;
}

// ═══════════════════════════════════════════════════════════════
// INIT & REFRESH
// ═══════════════════════════════════════════════════════════════
async function init() {
  try {
    document.getElementById("loadStatus").textContent = "Loading sales data...";
    await loadData();
    buildPages();
    currentPage = 0;
    renderPages();
    updateLastRefresh();

    // Show app, hide loading
    document.getElementById("appContainer").style.display = "flex";
    document.getElementById("loadingOverlay").classList.add("done");

    // Start clock
    updateClock();
    setInterval(updateClock, 1000);

    // Start page rotation
    scheduleNextPage();

    // Data refresh every 60 seconds
    setInterval(refreshData, 60000);

    // Recalculate on resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const prevPage = currentPage;
        buildPages();
        currentPage = Math.min(prevPage, Math.max(0, pages.length - 1));
        renderPages();
        scheduleNextPage();
      }, 300);
    });

  } catch (e) {
    console.error("Init error:", e);
    document.getElementById("loadStatus").textContent = "Error loading data. Retrying in 10s...";
    setTimeout(init, 10000);
  }
}

async function refreshData() {
  try {
    await loadData();
    const prevPage = currentPage;
    buildPages();
    currentPage = Math.min(prevPage, Math.max(0, pages.length - 1));
    renderPages();
    updateLastRefresh();
    scheduleNextPage();
  } catch (e) {
    console.error("Refresh error:", e);
  }
}

// Go (only if already authenticated this session)
if (tvAuthed) init();
</script>
