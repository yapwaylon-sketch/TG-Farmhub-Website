<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://tgfarmhub.com/assets/logo.png?v=2">
<title>TG Agro Fruits — Packing Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   CSS Variables & Reset
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* Industrial Warehouse palette */
  --bg:           #0E0E0E;   /* page + column body */
  --card:         #1A1A1A;   /* order card + footer bar */
  --divider:      #222;      /* column separators */
  --footer-border:#333;      /* footer top border */
  --text:         #ffffff;
  --text-muted:   #888;      /* footer text */
  --text-items:   #aaa;      /* card items line */

  /* Status accents */
  --c-received:   #FF5722;   /* orange */
  --c-preparing:  #FFC107;   /* amber */
  --c-prepared:   #4CAF50;   /* green */
  --c-delivering: #2196F3;   /* blue */

  /* Legacy tokens still used by gate/loading/auth */
  --bg-subtle:    #1A1A1A;
  --surface:      #1A1A1A;
  --surface-2:    #222;
  --border:       rgba(70, 80, 70, 0.5);
  --border-light: rgba(90, 100, 90, 0.6);
  --text-dim:     #b0b8b0;
  --green:        #4CAF50;
  --red:          #E86060;
  --font:         'Inter', -apple-system, sans-serif;
  --mono:         'Inter', monospace;
  --gold:         #FFC107;
  --blue:         #2196F3;
  --radius:       12px;
  --radius-sm:    8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  background-image: linear-gradient(135deg, var(--bg) 0%, var(--bg-subtle) 50%, var(--bg) 100%);
  background-attachment: fixed;
  color: var(--text);
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════
   Loading Overlay
   ═══════════════════════════════════════════════════════════════ */
#loadingOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s ease, filter 0.6s ease;
}
#loadingOverlay.done { opacity: 0; filter: blur(8px); pointer-events: none; }
.loader-ring {
  width: 44px; height: 44px;
  border: 2.5px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
  margin-top: 20px;
  font-size: 0.85rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* ═══════════════════════════════════════════════════════════════
   Auth Error
   ═══════════════════════════════════════════════════════════════ */
#authError {
  display: none;
  position: fixed; inset: 0; z-index: 10000;
  background: var(--bg);
  flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--red);
  font-size: 1.3rem;
  font-weight: 600;
}
#authError .sub {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-top: 8px;
  font-weight: 400;
}
#pwGate {
  position: fixed; inset: 0; z-index: 10001;
  background: var(--bg);
  background-image: linear-gradient(135deg, var(--bg) 0%, var(--bg-subtle) 50%, var(--bg) 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--font);
}
#pwGate img { width: 96px; height: 96px; border-radius: 16px; margin-bottom: 24px; }
#pwGate h1 { color: var(--text); font-size: 1.8rem; font-weight: 600; margin-bottom: 8px; }
#pwGate .gate-sub { color: var(--text-muted); font-size: 1rem; margin-bottom: 32px; }
#pwGate input {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px 24px;
  color: var(--text);
  font-size: 1.2rem;
  font-family: var(--font);
  width: 320px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
#pwGate input:focus { border-color: var(--green); }
#pwGate button {
  margin-top: 16px;
  background: var(--green);
  border: none;
  border-radius: 12px;
  padding: 14px 48px;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.2s;
}
#pwGate button:hover { opacity: 0.9; }
#pwGate .gate-error {
  color: var(--red);
  font-size: 0.9rem;
  margin-top: 12px;
  min-height: 20px;
}

/* ═══════════════════════════════════════════════════════════════
   Industrial Warehouse Layout
   ═══════════════════════════════════════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

/* ── Header bar ───────────────────────────────────────────────── */
.iw-header {
  flex-shrink: 0;
  background: var(--c-received);
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  min-height: 50px;
}
.iw-header-title {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2.5px;
}
.iw-header-clock {
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.iw-fs-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: 16px;
  line-height: 1;
}
.iw-fs-btn:hover { background: rgba(255,255,255,0.15); }
.iw-fs-btn svg { width: 16px; height: 16px; display: block; }

/* ── Column grid ──────────────────────────────────────────────── */
.iw-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--divider);
  min-height: 0;
  overflow: hidden;
}
.iw-col {
  background: var(--bg);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.iw-col.dimmed { opacity: 0.55; }
.iw-col.empty .iw-col-body { opacity: 0.30; }

/* Column header (count + label) */
.iw-col-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 3px solid currentColor;
}
.iw-col-count {
  font-size: 48px;
  font-weight: 900;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.iw-col-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #fff;
}
.iw-col[data-status="received"]   .iw-col-head { color: var(--c-received); }
.iw-col[data-status="preparing"]  .iw-col-head { color: var(--c-preparing); }
.iw-col[data-status="prepared"]   .iw-col-head { color: var(--c-prepared); }
.iw-col[data-status="delivering"] .iw-col-head { color: var(--c-delivering); }

/* Column body — order cards stack */
.iw-col-body {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Order card ───────────────────────────────────────────────── */
.iw-card {
  background: var(--card);
  padding: 12px 14px;
  border-left: 4px solid currentColor;
  flex-shrink: 0;
}
.iw-col[data-status="received"]   .iw-card { color: var(--c-received); }
.iw-col[data-status="preparing"]  .iw-card { color: var(--c-preparing); }
.iw-col[data-status="prepared"]   .iw-card { color: var(--c-prepared); }
.iw-col[data-status="delivering"] .iw-card { color: var(--c-delivering); }

.iw-card-customer {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 3px;
}
.iw-card-items {
  font-size: 10px;
  color: var(--text-items);
  line-height: 1.5;
}
.iw-card-meta {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.8px;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  /* color is inherited from .iw-col[data-status=...] */
}

/* ── Footer bar ───────────────────────────────────────────────── */
.iw-footer {
  flex-shrink: 0;
  background: var(--card);
  border-top: 1px solid var(--footer-border);
  padding: 11px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.iw-footer-right {
  display: flex;
  gap: 14px;
}

/* ── No-data state (all four columns empty) ───────────────────── */
.iw-no-data {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 2px;
}

/* ── 4K TV scaling ─────────────────────────────────────────────── */
@media (min-width: 2560px) {
  .iw-header-title, .iw-header-clock { font-size: 16px; }
  .iw-col-count { font-size: 60px; }
  .iw-col-label { font-size: 13px; }
  .iw-card-customer { font-size: 16px; }
  .iw-card-items { font-size: 12px; }
  .iw-card-meta { font-size: 11px; }
  .iw-footer { font-size: 12px; }
}
@media (min-width: 3840px) {
  .iw-header-title, .iw-header-clock { font-size: 20px; }
  .iw-col-count { font-size: 76px; }
  .iw-col-label { font-size: 16px; }
  .iw-card-customer { font-size: 19px; }
  .iw-card-items { font-size: 14px; }
  .iw-card-meta { font-size: 13px; }
  .iw-footer { font-size: 12px; }
}
</style>
</head>
<body>

<!-- Password Gate -->
<div id="pwGate">
  <img src="https://tgfarmhub.com/assets/logo.png?v=2" alt="TG">
  <h1>Packing Station Display</h1>
  <div class="gate-sub">Enter password to continue</div>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="off" autofocus>
  <div class="gate-error" id="pwError"></div>
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loadStatus">Connecting to sales data...</div>
</div>

<!-- App -->
<div class="app" id="appContainer" style="display:none;">

  <!-- Orange header bar -->
  <header class="iw-header">
    <div class="iw-header-title">TG AGRO FRUITS · PACKING STATION · LIVE</div>
    <div style="display:flex;align-items:center;">
      <div class="iw-header-clock" id="clockDisplay"></div>
      <button class="iw-fs-btn" id="fsBtn" onclick="toggleFullscreen()" title="Toggle fullscreen">
        <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path id="fsExpand" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
          <path id="fsShrink" d="M4 14h3a2 2 0 012 2v3m6-9h3a2 2 0 002-2V5m-9 0v3a2 2 0 01-2 2H4m16 4v3a2 2 0 01-2 2h-3" style="display:none"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 4-column grid (rendered by JS) -->
  <div class="iw-grid" id="contentArea"></div>

  <!-- Footer bar -->
  <div class="iw-footer">
    <span id="refreshInfo">UPDATED 0S AGO · AUTO-REFRESH 60S</span>
    <div class="iw-footer-right">
      <span id="pageInfo"></span>
      <span id="completedInfo">0 COMPLETE TODAY</span>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PASSWORD GATE — session-based, re-prompts on browser restart
// ═══════════════════════════════════════════════════════════════
const TV_PASSWORD = "tgtukau892312";
const SESSION_KEY = "tg_tv_auth";

function checkPassword() {
  const input = document.getElementById("pwInput");
  const error = document.getElementById("pwError");
  if (input.value === TV_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, "1");
    document.getElementById("pwGate").style.display = "none";
    document.getElementById("loadingOverlay").style.display = "flex";
    init();
  } else {
    error.textContent = "Incorrect password";
    input.value = "";
    input.focus();
  }
}

// Allow Enter key to submit
document.getElementById("pwInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPassword();
});

// If already authenticated this session, skip the gate
const tvAuthed = sessionStorage.getItem(SESSION_KEY) === "1";
if (tvAuthed) {
  document.getElementById("pwGate").style.display = "none";
} else {
  // Hide loading overlay until password is entered
  document.getElementById("loadingOverlay").style.display = "none";
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = "https://qwlagcriiyoflseduvvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bGFnY3JpaXlvZmxzZWR1dnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDgxNDYsImV4cCI6MjA4NzkyNDE0Nn0.OJvzNykb_JjejFlWlEy7QUKJjL7bfiaQI0pPx62P5YA";
const HEADERS = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };

async function sbGet(table, select, params) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?select=" + encodeURIComponent(select);
  if (params) url += "&" + params;
  const res = await fetch(url, { headers: HEADERS });
  if (!res.ok) throw new Error("Failed to load " + table);
  return res.json();
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let orders = [];
let orderItems = [];
let customers = {};
let products = {};
let varieties = {};

let pages = [];
let currentPage = 0;
let rotateTimer = null;
let paused = false;

const STATUS_CONFIG = [
  { key: "pending",    label: "RECEIVED",   colKey: "received",   dimmed: false },
  { key: "preparing",  label: "PREPARING",  colKey: "preparing",  dimmed: false },
  { key: "prepared",   label: "PREPARED",   colKey: "prepared",   dimmed: false },
  { key: "delivering", label: "DELIVERING", colKey: "delivering", dimmed: true  },
  { key: "completed",  label: "COMPLETED",  colKey: null,         dimmed: true  }
];

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData() {
  // Show every active order regardless of delivery_date — packing team needs
  // visibility on all work-in-progress, including overdue orders.
  // Also load today's completed orders for the footer counter.
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  const activeStatuses = "(pending,preparing,prepared,delivering)";

  const [activeOrdersData, completedOrdersData, itemsData, customersData, productsData, varietiesData] = await Promise.all([
    sbGet("sales_orders", "*", "company_id=eq.tg_agro_fruits&status=in." + activeStatuses + "&order=delivery_date,delivery_time"),
    sbGet("sales_orders", "*", "company_id=eq.tg_agro_fruits&status=eq.completed&delivery_date=eq." + todayStr),
    sbGet("sales_order_items", "*", "company_id=eq.tg_agro_fruits"),
    sbGet("sales_customers", "id,name", "company_id=eq.tg_agro_fruits"),
    sbGet("sales_products", "id,name,variety_id", "company_id=eq.tg_agro_fruits"),
    sbGet("crop_varieties", "id,name")
  ]);

  const ordersData = [...(activeOrdersData || []), ...(completedOrdersData || [])];

  orders = ordersData || [];
  orderItems = itemsData || [];

  // Build lookup maps
  customers = {};
  (customersData || []).forEach(c => { customers[c.id] = c.name; });

  products = {};
  (productsData || []).forEach(p => { products[p.id] = p; });

  varieties = {};
  (varietiesData || []).forEach(v => { varieties[v.id] = v.name; });

  // Filter order items to only include items for loaded orders
  const orderIds = new Set(orders.map(o => o.id));
  orderItems = orderItems.filter(item => orderIds.has(item.order_id));
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  if (s == null) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function formatDeliveryDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);

  const isToday = d.toDateString() === today.toDateString();
  const isTomorrow = d.toDateString() === tomorrow.toDateString();

  if (isToday) return "Today";
  if (isTomorrow) return "Tomorrow";
  const dd = String(d.getDate()).padStart(2, '0');
  const mmm = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return dd + ' ' + mmm;
}

function formatTime(timeStr) {
  if (!timeStr) return "";
  const parts = timeStr.split(":");
  let h = parseInt(parts[0]);
  const m = parts[1] || "00";
  const ampm = h >= 12 ? "PM" : "AM";
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return h + ":" + m + " " + ampm;
}

function getItemDisplay(item) {
  const prod = products[item.product_id];
  const prodName = prod ? prod.name : "Unknown";
  const varietyName = prod && prod.variety_id ? varieties[prod.variety_id] : null;

  let parts = [];
  if (varietyName) parts.push(varietyName);

  // Product name (may include index range info)
  parts.push(prodName);

  // Index range
  if (item.index_min != null && item.index_max != null) {
    parts.push("(" + item.index_min + "-" + item.index_max + ")");
  }

  const label = parts.join(" ");
  const qty = item.quantity != null ? item.quantity : 0;
  const unit = item.unit || "kg";

  return { label, qty, unit };
}

function getFulfillmentBadge(order) {
  const type = (order.fulfillment_type || "delivery").toLowerCase();
  if (type === "collection" || type === "pickup") {
    return '<span class="fulfillment-badge">\uD83C\uDFEA Collection</span>';
  }
  return '<span class="fulfillment-badge">\uD83D\uDCE6 Delivery</span>';
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('fsExpand').style.display = isFs ? 'none' : '';
  document.getElementById('fsShrink').style.display = isFs ? '' : 'none';
});

// ═══════════════════════════════════════════════════════════════
// BUILD PAGES
// ═══════════════════════════════════════════════════════════════
// State holding the rendered grid model + completed count
let columns = [];           // [{ colKey, label, dimmed, total, pages: [[order, ...], ...] }, ...]
let completedToday = 0;     // count of orders with status="completed" delivered today

function isToday(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr + "T00:00:00");
  const t = new Date();
  return d.toDateString() === t.toDateString();
}

function buildPages() {
  // 1. Group orders by status key
  const grouped = {};
  STATUS_CONFIG.forEach(s => { grouped[s.key] = []; });

  orders.forEach(order => {
    const status = (order.status || "pending").toLowerCase().replace(/\s+/g, '_');
    if (!grouped[status]) grouped[status] = [];
    const items = orderItems.filter(i => i.order_id === order.id);
    grouped[status].push({ ...order, items });
  });

  // 2. FIFO sort within each group (oldest created_at first)
  Object.keys(grouped).forEach(key => {
    grouped[key].sort((a, b) => {
      const aT = a.created_at || '';
      const bT = b.created_at || '';
      return aT.localeCompare(bT);
    });
  });

  // 3. "Completed today" footer counter
  completedToday = (grouped["completed"] || []).filter(o => isToday(o.delivery_date)).length;

  // 4. Build the four visible columns with per-column pagination
  const cardsPerCol = calcCardsPerColumn();
  columns = STATUS_CONFIG
    .filter(sc => sc.colKey !== null)
    .map(sc => {
      const list = grouped[sc.key] || [];
      const colPages = [];
      if (list.length === 0) {
        colPages.push([]);
      } else {
        for (let i = 0; i < list.length; i += cardsPerCol) {
          colPages.push(list.slice(i, i + cardsPerCol));
        }
      }
      return {
        colKey: sc.colKey,
        label: sc.label,
        dimmed: sc.dimmed,
        total: list.length,
        pages: colPages
      };
    });

  // 5. Global pages = max page count across columns (each column rotates in lock-step)
  const maxPages = Math.max(1, ...columns.map(c => c.pages.length));
  pages = new Array(maxPages).fill(null).map((_, i) => ({ index: i }));
}

function calcCardsPerColumn() {
  // Each column has: header (~80px) + body
  // Card height ~70px (12+14 padding + 3 lines of text + 6px gap to next)
  const headerH = 50;     // orange header bar
  const footerH = 36;     // footer bar
  const colHeaderH = 80;  // count + label + 3px border + 14px margin
  const colPadding = 32;  // 16px top + 16px bottom
  const cardH = 78;       // card outer height including the 10px gap

  const available = window.innerHeight - headerH - footerH - colHeaderH - colPadding;
  return Math.max(2, Math.floor(available / cardH));
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderPages() {
  const container = document.getElementById("contentArea");
  const pageInfoEl = document.getElementById("pageInfo");
  const completedEl = document.getElementById("completedInfo");

  // Empty state — all four columns empty
  const allEmpty = columns.every(c => c.total === 0);
  if (allEmpty) {
    container.innerHTML = '<div class="iw-no-data">NO ACTIVE ORDERS</div>';
    pageInfoEl.textContent = '';
    completedEl.textContent = (completedToday || 0) + ' COMPLETE TODAY';
    return;
  }

  // Render four columns
  container.innerHTML = columns.map(col => {
    const pageIdx = currentPage < col.pages.length ? currentPage : -1;
    const slice = pageIdx >= 0 ? col.pages[pageIdx] : [];
    const dimClass = col.dimmed ? ' dimmed' : '';
    const emptyClass = col.total === 0 ? ' empty' : '';
    const countStr = String(col.total).padStart(2, '0');

    let cardsHtml = '';
    if (slice.length === 0 && col.total === 0) {
      cardsHtml = ''; // empty column body, dim handled by .empty
    } else {
      cardsHtml = slice.map(order => renderCard(order)).join('');
    }

    return (
      '<div class="iw-col' + dimClass + emptyClass + '" data-status="' + col.colKey + '">' +
        '<div class="iw-col-head">' +
          '<span class="iw-col-count">' + countStr + '</span>' +
          '<span class="iw-col-label">' + col.label + '</span>' +
        '</div>' +
        '<div class="iw-col-body">' + cardsHtml + '</div>' +
      '</div>'
    );
  }).join('');

  // Footer page indicator (only if any column actually paginates)
  if (pages.length > 1) {
    pageInfoEl.textContent = 'PAGE ' + (currentPage + 1) + ' \u00B7 ' + pages.length;
  } else {
    pageInfoEl.textContent = '';
  }
  completedEl.textContent = (completedToday || 0) + ' COMPLETE TODAY';
}

function renderCard(order) {
  const custName = customers[order.customer_id] || "Unknown Customer";

  // Items: compact "2× Pineapple · 1× Jackfruit"
  let itemsLine = '';
  if (order.items && order.items.length > 0) {
    itemsLine = order.items.map(item => {
      const display = getItemDisplay(item);
      const qty = display.qty;
      return qty + '\u00D7 ' + display.label;
    }).join(' \u00B7 ');
  }

  // Meta line: "10:30 · AF-SO012"
  const timeStr = order.delivery_time ? formatTime(order.delivery_time) : '';
  const docNo = order.doc_number || order.id || '';
  let metaLine = '';
  if (timeStr && docNo) metaLine = timeStr + ' \u00B7 ' + docNo;
  else if (timeStr) metaLine = timeStr;
  else if (docNo) metaLine = docNo;

  return (
    '<div class="iw-card">' +
      '<div class="iw-card-customer">' + esc(custName) + '</div>' +
      (itemsLine ? '<div class="iw-card-items">' + esc(itemsLine) + '</div>' : '') +
      (metaLine ? '<div class="iw-card-meta">' + esc(metaLine) + '</div>' : '') +
    '</div>'
  );
}

function showPage(idx) {
  if (pages.length === 0) return;
  currentPage = ((idx % pages.length) + pages.length) % pages.length;
  renderPages();
}

function nextPage() {
  if (pages.length <= 1) return;
  showPage(currentPage + 1);
}

// ═══════════════════════════════════════════════════════════════
// PAGE ROTATION
// ═══════════════════════════════════════════════════════════════
function scheduleNextPage() {
  if (rotateTimer) clearTimeout(rotateTimer);
  if (paused) return;
  if (pages.length > 1) {
    rotateTimer = setTimeout(() => { nextPage(); scheduleNextPage(); }, 15000);
  }
}

// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  // "10:42 AM · TUE 7 APR"
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dow = days[now.getDay()];
  const day = now.getDate();
  const mon = months[now.getMonth()];
  const text = h + ':' + m + ' ' + ampm + ' \u00B7 ' + dow + ' ' + day + ' ' + mon;
  const el = document.getElementById("clockDisplay");
  if (el) el.textContent = text;
}

let lastRefreshAt = Date.now();

function updateLastRefresh() {
  lastRefreshAt = Date.now();
  tickRefreshLabel();
}

function tickRefreshLabel() {
  const el = document.getElementById("refreshInfo");
  if (!el) return;
  const secs = Math.max(0, Math.floor((Date.now() - lastRefreshAt) / 1000));
  el.textContent = 'UPDATED ' + secs + 'S AGO · AUTO-REFRESH 60S';
}

// ═══════════════════════════════════════════════════════════════
// INIT & REFRESH
// ═══════════════════════════════════════════════════════════════
async function init() {
  try {
    document.getElementById("loadStatus").textContent = "Loading sales data...";
    await loadData();
    buildPages();
    currentPage = 0;
    renderPages();
    updateLastRefresh();

    // Show app, hide loading
    document.getElementById("appContainer").style.display = "flex";
    document.getElementById("loadingOverlay").classList.add("done");

    // Start clock
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(tickRefreshLabel, 1000);

    // Start page rotation
    scheduleNextPage();

    // Data refresh every 60 seconds
    setInterval(refreshData, 60000);

    // Recalculate on resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const prevPage = currentPage;
        buildPages();
        currentPage = Math.min(prevPage, Math.max(0, pages.length - 1));
        renderPages();
        scheduleNextPage();
      }, 300);
    });

  } catch (e) {
    console.error("Init error:", e);
    document.getElementById("loadStatus").textContent = "Error loading data. Retrying in 10s...";
    setTimeout(init, 10000);
  }
}

async function refreshData() {
  try {
    await loadData();
    const prevPage = currentPage;
    buildPages();
    currentPage = Math.min(prevPage, Math.max(0, pages.length - 1));
    renderPages();
    updateLastRefresh();
    scheduleNextPage();
  } catch (e) {
    console.error("Refresh error:", e);
  }
}

// Go (only if already authenticated this session)
if (tvAuthed) init();
</script>
